<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadCf - Tiers & Rankings</title>
    <style>
        /* --- DESIGN IM ECHTEN ICON-TIERS LOOK --- */
        :root {
            --bg-dark: #050811;
            --panel-bg: #0b111e;
            --card-bg: #0e1726;
            --border-color: #17253b;
            --text-main: #f0f6fc;
            --text-secondary: #62758d;
            --accent-cyan: #00bfff;
            --accent-purple: #a855f7;
            --neon-orange: #ff7b1a;
            --success-green: #238636;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Top Navigation */
        .navbar {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .brand-logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1.5px;
            cursor: pointer;
            user-select: none;
            color: #ffffff;
        }

        .brand-logo span {
            color: var(--accent-cyan);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }

        .nav-link.active, .nav-link:hover {
            color: var(--accent-cyan);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Sub-Navigation für Spielmodi */
        .sub-nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            background-color: rgba(11, 17, 30, 0.8);
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .mode-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            padding: 4px 2px;
            position: relative;
            transition: color 0.2s;
        }

        .mode-btn:hover {
            color: var(--text-main);
        }

        .mode-btn.active {
            color: var(--accent-cyan);
        }

        .mode-btn.active::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--accent-cyan);
            box-shadow: 0 0 12px var(--accent-cyan);
        }

        /* Haupt-Inhalt */
        .main-container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Action Buttons */
        .btn {
            background-color: #0e1726;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-cyan {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }
        .btn-cyan:hover {
            background: rgba(0, 191, 255, 0.1);
        }

        .btn-purple { border-color: var(--accent-purple); color: var(--accent-purple); }
        .btn-purple:hover { background: rgba(168, 85, 247, 0.1); }
        .btn-danger { border-color: #ff2a74; color: #ff2a74; }
        .btn-danger:hover { background: rgba(255, 42, 116, 0.1); }

        /* Suchfeld */
        .search-bar {
            background-color: #060913;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 6px;
            width: 180px;
            font-size: 13px;
        }
        .search-bar:focus { outline: none; border-color: var(--accent-cyan); }

        /* LEADERBOARD TABLE LOOK */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #080d1a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 20px;
        }

        .leaderboard-table th {
            background-color: rgba(23, 37, 59, 0.4);
            padding: 14px 20px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        .leaderboard-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            vertical-align: middle;
        }

        .leaderboard-table tr { transition: background-color 0.15s; }
        .leaderboard-table tr:hover { background-color: rgba(23, 37, 59, 0.2); }

        .rank-number { font-weight: 900; width: 40px; font-size: 16px; color: var(--text-secondary); }
        .rank-1 { color: #ffaa00; }
        .rank-2 { color: #cbd5e1; }
        .rank-3 { color: #b45309; }

        .username { font-weight: 700; color: #ffffff; font-size: 15px; }

        /* NEUES LOGO / BADGE SYSTEM */
        .badge-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .tier-badge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 44px;
        }

        /* ECHTE LOGOS ALS BILDER STYLE */
        .icon-wrapper {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background-color: #0e1726;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
            transition: transform 0.2s;
        }

        .mode-logo-img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            image-rendering: pixelated; /* Macht das Minecraft-Feeling perfekt knackig scharf */
        }

        /* Orange leuchtender Rahmen für High Tiers, Blauer Rahmen für Low Tiers */
        .border-ht { border: 1.5px solid #ff7b1a; box-shadow: 0 0 8px rgba(249, 115, 22, 0.25); }
        .border-line-ht { color: #ff7b1a; font-weight: 800; font-size: 11px; text-transform: uppercase; }

        .border-lt { border: 1.5px solid #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.25); }
        .border-line-lt { color: #38bdf8; font-weight: 800; font-size: 11px; text-transform: uppercase; }

        /* SPALTEN ANSICHT */
        .tier-columns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 20px; }
        .tier-column { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .tier-header { padding: 15px; text-align: center; font-weight: 800; font-size: 13px; border-bottom: 1px solid var(--border-color); background-color: rgba(23, 37, 59, 0.3); letter-spacing: 0.5px; }
        .t1-h { color: #ffaa00; } .t2-h { color: #cbd5e1; } .t3-h { color: #ff7b1a; } .t4-h { color: #38bdf8; } .t5-h { color: #94a3b8; }
        .tier-list-content { padding: 10px; min-height: 450px; display: flex; flex-direction: column; gap: 8px; }
        
        .tier-user-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .avatar { width: 32px; height: 32px; border-radius: 4px; image-rendering: pixelated; background-color: #1f2937; }

        /* MODALS */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-box { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; width: 360px; }
        .modal-header { font-size: 18px; font-weight: 800; text-align: center; margin-bottom: 20px; letter-spacing: 1px; }

        /* ADMIN CONTROL PANEL */
        .admin-panel { background-color: var(--panel-bg); border: 1px solid var(--accent-purple); border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .admin-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .admin-box-sub { background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; }
        .admin-form { display: flex; flex-direction: column; gap: 12px; }
        .admin-form input, .admin-form select { background-color: #060913; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; }
        .admin-player-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 6px; }
        .save-notice { color: #2ea043; font-size: 12px; font-weight: bold; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-left">
                <div class="brand-logo" onclick="switchMode('overall')">LOAD<span>TIERS</span></div>
                <div class="nav-links">
                    <div class="nav-link active" onclick="switchMode('overall')">RANKINGS</div>
                    <div class="nav-link">STAFF</div>
                    <div class="nav-link">DISCORD</div>
                </div>
            </div>
            <div class="nav-right">
                <div id="admin-status-text" style="font-size: 12px; color: var(--text-secondary)">Status: Guest</div>
                <button class="btn btn-cyan" onclick="openModal('points-modal')">⚡ Rank Points</button>
                <input type="text" class="search-bar" id="search-input" placeholder="Search player..." oninput="handleSearch()">
            </div>
        </nav>

        <!-- Spielmodi Tabs -->
        <div class="sub-nav">
            <button class="mode-btn active" id="mode-overall" onclick="switchMode('overall')">Overall</button>
            <button class="mode-btn" id="mode-sword" onclick="switchMode('sword')">Sword</button>
            <button class="mode-btn" id="mode-cpvp" onclick="switchMode('cpvp')">CPvP</button>
            <button class="mode-btn" id="mode-axe" onclick="switchMode('axe')">Axe</button>
            <button class="mode-btn" id="mode-smp" onclick="switchMode('smp')">SMP</button>
            <button class="mode-btn" id="mode-diapot" onclick="switchMode('diapot')">Diapot</button>
            <button class="mode-btn" id="mode-mace" onclick="switchMode('mace')">Mace</button>
            <button class="mode-btn" id="mode-uhc" onclick="switchMode('uhc')">UHC</button>
            <button class="mode-btn" id="mode-nethpot" onclick="switchMode('nethpot')">Nethpot</button>
        </div>

        <div class="main-container">
            <!-- Admin Dashboard -->
            <div id="admin-panel" class="admin-panel" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                    <h3 style="margin:0; color: var(--accent-purple);" id="admin-panel-title">Admin Dashboard</h3>
                    <button class="btn btn-danger" onclick="logoutAdmin()" style="padding: 5px 12px;">Logout</button>
                </div>
                <div class="admin-sections">
                    <div class="admin-box-sub">
                        <h4 style="margin-top:0; color: var(--accent-cyan);">Spieler hinzufügen / updaten</h4>
                        <div class="admin-form">
                            <input type="text" id="new-player-name" placeholder="Minecraft Name">
                            <select id="new-player-mode">
                                <option value="sword">Sword</option><option value="cpvp">CPvP</option>
                                <option value="axe">Axe</option><option value="smp">SMP</option>
                                <option value="diapot">Diapot</option><option value="mace">Mace</option>
                                <option value="uhc">UHC</option><option value="nethpot">Nethpot</option>
                            </select>
                            <select id="new-player-tier">
                                <option value="HT1">HT1</option><option value="LT1">LT1</option>
                                <option value="HT2">HT2</option><option value="LT2">LT2</option>
                                <option value="HT3">HT3</option><option value="LT3">LT3</option>
                                <option value="HT4">HT4</option><option value="LT4">LT4</option>
                                <option value="HT5">HT5</option><option value="LT5">LT5</option>
                            </select>
                            <button class="btn btn-cyan" onclick="addOrUpdatePlayer()">Spieler Speichern</button>
                            <div id="player-save-status" class="save-notice">✔ Erfolgreich im Browser gespeichert!</div>
                        </div>
                        <h4 style="color: var(--text-secondary); margin-bottom: 8px; margin-top: 15px;">Spieler löschen</h4>
                        <div id="admin-delete-list" style="max-height: 150px; overflow-y: auto;"></div>
                    </div>
                    <div class="admin-box-sub" id="l4lyx-only-section" style="display: none;">
                        <h4 style="margin-top:0; color: var(--accent-purple);">👑 Admin Erstellung (Nur L4lyx)</h4>
                        <div class="admin-form">
                            <input type="text" id="new-admin-user" placeholder="Admin Username">
                            <input type="password" id="new-admin-pass" placeholder="Passwort">
                            <button class="btn btn-purple" onclick="createNewAdminAccount()">Account Erstellen</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dynamische Tabellen / Spalten -->
            <div id="content-area"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="points-modal" class="modal-overlay" onclick="closeModal('points-modal')">
        <div class="modal-box" onclick="event.stopPropagation()" style="width: 400px;">
            <div class="modal-header">⚡ RANK POINTS</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="padding:10px; background:#0e1726; border-radius:6px; display:flex; justify-content:space-between;"><span>HT1</span><span style="color:var(--accent-cyan)">60 PTS</span></div>
                <div style="padding:10px; background:#0e1726; border-radius:6px; display:flex; justify-content:space-between;"><span>LT1</span><span style="color:var(--accent-cyan)">45 PTS</span></div>
                <div style="padding:10px; background:#0e1726; border-radius:6px; display:flex; justify-content:space-between;"><span>HT2</span><span style="color:var(--accent-cyan)">30 PTS</span></div>
                <div style="padding:10px; background:#0e1726; border-radius:6px; display:flex; justify-content:space-between;"><span>LT2</span><span style="color:var(--accent-cyan)">20 PTS</span></div>
                <div style="padding:10px; background:#0e1726; border-radius:6px; display:flex; justify-content:space-between;"><span>HT3</span><span style="color:var(--accent-cyan)">10 PTS</span></div>
                <div style="padding:10px; background:#0e1726; border-radius:6px; display:flex; justify-content:space-between;"><span>LT3</span><span style="color:var(--accent-cyan)">6 PTS</span></div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">🔑 Admin Login</div>
            <input type="text" id="login-user" placeholder="Username" style="width:100%; padding:10px; margin-bottom:10px; background:#060913; border:1px solid var(--border-color); color:white; border-radius:6px; box-sizing:border-box;">
            <input type="password" id="login-pass" placeholder="Passwort" style="width:100%; padding:10px; margin-bottom:15px; background:#060913; border:1px solid var(--border-color); color:white; border-radius:6px; box-sizing:box-box;">
            <button class="btn btn-purple" style="width:100%; justify-content:center;" onclick="submitLogin()">Login</button>
        </div>
    </div>

    <script>
        // DIE RECHTEN MINECRAFT LOGO INTERNET-LINKS FÜR DEINE MODI
        const modeIcons = {
            sword: "https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png",
            cpvp: "https://minecraft.wiki/images/End_Crystal_JE2_BE2.png",
            axe: "https://minecraft.wiki/images/Diamond_Axe_JE3_BE3.png",
            smp: "https://minecraft.wiki/images/Oak_Log_%28UD%29_JE5_BE3.png",
            diapot: "https://minecraft.wiki/images/Splash_Potion_of_Healing_JE2_BE2.png",
            mace: "https://minecraft.wiki/images/Mace_JE1_BE1.png",
            uhc: "https://minecraft.wiki/images/Golden_Apple_JE2_BE2.png",
            nethpot: "https://minecraft.wiki/images/Netherite_Chestplate_JE3_BE2.png"
        };

        const pointValues = {
            'HT1': 60, 'LT1': 45, 'HT2': 30, 'LT2': 20, 'HT3': 10,
            'LT3': 6,  'HT4': 4,  'LT4': 3,  'HT5': 2,  'LT5': 1
        };

        const defaultPlayers = [
            { name: "LetsJanTV", ranks: { cpvp: "HT3", sword: "HT3", uhc: "HT4", mace: "HT4" } },
            { name: "L4lyx", ranks: { cpvp: "HT4", sword: "LT3", uhc: "LT4" } },
            { name: "__moha__", ranks: { cpvp: "LT3", sword: "HT5", uhc: "LT4" } },
            { name: "EXD_Fouly", ranks: { cpvp: "HT3" } },
            { name: "GoonUkraine", ranks: { cpvp: "HT4", sword: "LT4" } },
            { name: "Slayerx_1", ranks: { cpvp: "HT4", sword: "HT5" } },
            { name: "king768", ranks: { cpvp: "HT4" } },
            { name: "Lowriss768", ranks: { cpvp: "HT4" } },
            { name: "GabrielLopes122", ranks: { cpvp: "HT4" } },
            { name: "Aenvar", ranks: { sword: "LT4" } }
        ];

        const defaultAdmins = { "L4lyx": "Tini2013!" };

        let players = JSON.parse(localStorage.getItem('loadtiers_players')) || defaultPlayers;
        let adminAccounts = JSON.parse(localStorage.getItem('loadtiers_admins')) || defaultAdmins;
        let currentMode = 'overall';
        let loggedInUser = null;

        function saveToLocalStorage() {
            localStorage.setItem('loadtiers_players', JSON.stringify(players));
            localStorage.setItem('loadtiers_admins', JSON.stringify(adminAccounts));
        }

        function calculateTotalPoints(player) {
            let total = 0;
            for (let mode in player.ranks) total += pointValues[player.ranks[mode]] || 0;
            return total;
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            render();
        }

        function render() {
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            if (currentMode === 'overall') { renderLeaderboard(searchVal); } 
            else { renderColumns(searchVal); }
            if (loggedInUser) { renderAdminDeleteList(); }
        }

        function renderLeaderboard(filter = "") {
            const contentArea = document.getElementById('content-area');
            let sorted = [...players].map(p => ({ ...p, totalPts: calculateTotalPoints(p) })).sort((a, b) => b.totalPts - a.totalPts);
            if (filter) sorted = sorted.filter(p => p.name.toLowerCase().includes(filter));

            let html = `
                <table class="leaderboard-table">
                    <thead>
                        <tr><th style="width:60px;">#</th><th>Player</th><th>Tiers</th><th style="text-align:right; width:100px;">Pts</th></tr>
                    </thead>
                    <tbody>
            `;

            sorted.forEach((p, index) => {
                let rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
                
                let badgesHtml = '';
                for (let mode in p.ranks) {
                    let tier = p.ranks[mode];
                    if(!tier) continue;
                    let isHT = tier.startsWith('HT');
                    let borderClass = isHT ? 'border-ht' : 'border-lt';
                    let textClass = isHT ? 'border-line-ht' : 'border-line-lt';
                    let imgUrl = modeIcons[mode] || modeIcons.sword;

                    // HIER ERSETZEN WIR DIE EMOJIS DURCH DIE INTEGRIERTEN MINECRAFT BILDER
                    badgesHtml += `
                        <div class="tier-badge-container">
                            <div class="icon-wrapper ${borderClass}">
                                <img src="${imgUrl}" class="mode-logo-img" alt="${mode}">
                            </div>
                            <span class="${textClass}">${tier}</span>
                        </div>
                    `;
                }

                html += `
                    <tr>
                        <td class="rank-number ${rankClass}">#${index + 1}</td>
                        <td>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <img class="avatar" src="https://minotar.net/avatar/${p.name}/32" onerror="this.src='https://minotar.net/avatar/MHF_Steve/32'">
                                <span class="username">${p.name}</span>
                            </div>
                        </td>
                        <td><div class="badge-list">${badgesHtml}</div></td>
                        <td style="text-align:right; font-weight:900; color:var(--accent-cyan); font-size:16px;">${p.totalPts}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            contentArea.innerHTML = html;
        }

        function renderColumns(filter = "") {
            const contentArea = document.getElementById('content-area');
            let html = `<div class="tier-columns">`;
            for (let i = 1; i <= 5; i++) {
                html += `
                    <div class="tier-column">
                        <div class="tier-header t${i}-h">TIER ${i}</div>
                        <div class="tier-list-content">
                `;
                let columnPlayers = players.filter(p => {
                    let t = p.ranks[currentMode];
                    return t && t.css === undefined && t.includes(i.toString()) && p.name.toLowerCase().includes(filter);
                });

                columnPlayers.forEach(p => {
                    let tier = p.ranks[currentMode];
                    let isHT = tier.startsWith('HT');
                    html += `
                        <div class="tier-user-card">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <img class="avatar" src="https://minotar.net/avatar/${p.name}/32">
                                <span style="font-weight:600; font-size:13px;">${p.name}</span>
                            </div>
                            <span style="color:${isHT ? '#ff7b1a':'#38bdf8'}; font-weight:800; font-size:11px;">${tier}</span>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            html += `</div>`;
            contentArea.innerHTML = html;
        }

        function renderAdminDeleteList() {
            const listDiv = document.getElementById('admin-delete-list');
            listDiv.innerHTML = '';
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'admin-player-row';
                div.innerHTML = `<span>${p.name}</span><button class="btn btn-danger" style="padding:2px 8px;" onclick="deletePlayer('${p.name}')">Löschen</button>`;
                listDiv.appendChild(div);
            });
        }

        function handleSearch() {
            const val = document.getElementById('search-input').value.trim();
            if (val.toLowerCase() === 'login') {
                document.getElementById('search-input').value = '';
                openModal('login-modal');
            } else { render(); }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function submitLogin() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value;
            if (adminAccounts[u] && adminAccounts[u] === p) {
                loggedInUser = u;
                document.getElementById('admin-status-text').innerText = `Status: ${u}`;
                document.getElementById('admin-panel').style.display = 'block';
                if (u === 'L4lyx') document.getElementById('l4lyx-only-section').style.display = 'block';
                closeModal('login-modal');
                render();
            }
        }

        function logoutAdmin() {
            loggedInUser = null;
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('admin-status-text').innerText = "Status: Guest";
            render();
        }

        function createNewAdminAccount() {
            const u = document.getElementById('new-admin-user').value.trim();
            const p = document.getElementById('new-admin-pass').value;
            if(!u || !p) return;
            adminAccounts[u] = p;
            saveToLocalStorage();
            document.getElementById('new-admin-user').value = '';
            document.getElementById('new-admin-pass').value = '';
            alert(`Admin Account für ${u} wurde erstellt!`);
        }

        function addOrUpdatePlayer() {
            const name = document.getElementById('new-player-name').value.trim();
            const mode = document.getElementById('new-player-mode').value;
            const tier = document.getElementById('new-player-tier').value;
            if (!name) return;

            let existing = players.find(p => p.name.toLowerCase() === name.toLowerCase());
            if (existing) { existing.ranks[mode] = tier; } 
            else { let n = { name: name, ranks: {} }; n.ranks[mode] = tier; players.push(n); }

            saveToLocalStorage();
            document.getElementById('new-player-name').value = '';
            let s = document.getElementById('player-save-status');
            s.style.display = 'block'; setTimeout(() => s.style.display = 'none', 2000);
            render();
        }

        function deletePlayer(name) {
            players = players.filter(p => p.name !== name);
            saveToLocalStorage();
            render();
        }

        render();
    </script>
</body>
</html>
