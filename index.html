                <body>
                    <div class="app">
                        <div class="panel">
                            <h1>CoinFlip</h1>
                            <div>Guthaben</div>
                            <div class="balance" id="balance">$1000</div>

                            <label for="bet">Einsatz (USD)</label>
                            <input id="bet" type="number" min="1" value="10" />

                            <label>Wähle</label>
                            <div class="choices">
                                <button id="heads" class="btn small">Kopf</button>
                                <button id="tails" class="btn small">Zahl</button>
                            </div>

                            <div class="footer">
                                <div style="color:var(--muted);font-size:13px">Local-Storage wird verwendet</div>
                                <button id="reset" class="small" style="background:transparent;border:1px solid rgba(255,255,255,0.04)">Reset</button>
                            </div>

                            <div class="log" id="log"></div>
                        </div>

                        <div class="panel coin-wrap">
                            <div class="stage">
                                <div id="coin" class="coin">KOPF</div>
                                <div id="resultBadge" class="result" style="display:none"></div>
                            </div>
                        </div>
                    </div>

                    <script>
                        // Konfiguration
                        const WEBHOOK = 'https://discord.com/api/webhooks/1515289134275760200/wkVz4SUZB8DCG-Y_V_VofKwv-YRPglkJXFGHM_DepnXVfRn0dhxSXwtyPx8s1dXpHO4h';

                        // State
                        const balanceEl = document.getElementById('balance');
                        const betEl = document.getElementById('bet');
                        const headsBtn = document.getElementById('heads');
                        const tailsBtn = document.getElementById('tails');
                        const coinEl = document.getElementById('coin');
                        const resultBadge = document.getElementById('resultBadge');
                        const logEl = document.getElementById('log');
                        const resetBtn = document.getElementById('reset');

                        function loadBalance(){
                            const v = localStorage.getItem('cf_balance');
                            return v ? Number(v) : 1000;
                        }

                        function saveBalance(v){
                            localStorage.setItem('cf_balance', String(v));
                            balanceEl.textContent = '$' + v.toFixed(2).replace(/\.00$/,'');
                        }

                        let balance = loadBalance();
                        saveBalance(balance);

                        function log(text){
                            const line = document.createElement('div');
                            line.textContent = new Date().toLocaleTimeString() + ' — ' + text;
                            logEl.prepend(line);
                        }

                        function sendWebhook(message){
                            if(!WEBHOOK_ENABLED){
                                console.log('Webhook disabled (debug). Message would be:', message);
                                return Promise.resolve();
                            }
                            // send a simple content message to the Discord webhook
                            return fetch(WEBHOOK, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({content: message})
                            }).catch(err=>console.warn('Webhook error', err));
                        }

                        function doFlip(choice){
                            const bet = Number(betEl.value || 0);
                            if(!Number.isFinite(bet) || bet <= 0){alert('Bitte gib einen gültigen Einsatz ein.');return}
                            if(bet > balance){alert('Einsatz höher als Guthaben.');return}

                            // animate
                            coinEl.classList.remove('flip');
                            void coinEl.offsetWidth;
                            resultBadge.style.display = 'none';

                            coinEl.classList.add('flip');

                            // random result after animation
                            setTimeout(()=>{
                                const r = Math.random() < 0.5 ? 'Kopf' : 'Zahl';
                                coinEl.textContent = r.toUpperCase();
                                const won = ( (r === 'Kopf' && choice === 'heads') || (r === 'Zahl' && choice === 'tails') );

                                if(won){ balance += bet; showWin(bet, r); }
                                else { balance -= bet; showLoss(bet, r); }

                                saveBalance(balance);

                                const msg = `CoinFlip: Einsatz $${bet} — Wahl: ${choice==='heads'?'Kopf':'Zahl'} — Ergebnis: ${r} — ${won? 'GEWONNEN' : 'VERLOREN'} — Neues Guthaben: $${balance}`;
                                sendWebhook(msg);
                                log(msg);

                            }, 1200);
                        }

                        function showWin(bet, r){
                            resultBadge.style.display='block';
                            resultBadge.textContent = `GEWONNEN +$${bet}`;
                            burstConfetti();
                        }

                        function showLoss(bet, r){
                            resultBadge.style.display='block';
                            resultBadge.textContent = `VERLOREN -$${bet}`;
                        }

                        headsBtn.addEventListener('click', ()=>doFlip('heads'));
                        tailsBtn.addEventListener('click', ()=>doFlip('tails'));

                        resetBtn.addEventListener('click', ()=>{
                            if(confirm('Guthaben zurücksetzen auf $1000?')){ balance = 1000; saveBalance(balance); log('Guthaben zurückgesetzt'); }
                        });

                        // Simple confetti burst
                        function burstConfetti(){
                            const colors = ['#ff6b6b','#ffd166','#06d6a0','#4d96ff','#c084fc'];
                            const stage = document.querySelector('.stage');
                            for(let i=0;i<30;i++){
                                const d = document.createElement('div');
                                d.className = 'confetti-piece';
                                d.style.left = (50 + (Math.random()*160-80)) + '%';
                                d.style.top = (40 + Math.random()*20) + '%';
                                d.style.background = colors[Math.floor(Math.random()*colors.length)];
                                d.style.opacity = '1';
                                d.style.transform = `translateY(0) rotate(${Math.random()*360}deg)`;
                                stage.appendChild(d);
                                const dx = (Math.random()*300-150);
                                const dy = (Math.random()* -300 - 60);
                                d.animate([
                                    {transform:`translateY(0) rotate(${Math.random()*360}deg)`, opacity:1},
                                    {transform:`translate(${dx}px, ${dy}px) rotate(${Math.random()*720}deg)`, opacity:0}
                                ], {duration:1200+Math.random()*800, easing:'cubic-bezier(.2,.8,.2,1)'}).onfinish = ()=>d.remove();
                            }
                        }
                    </script>
                </body>
            </html>
