<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadTiers - Tiers & Rankings</title>
    <style>
        :root {
            --bg-dark: #050811;
            --panel-bg: #0b111e;
            --card-bg: #0e1726;
            --border-color: #17253b;
            --text-main: #f0f6fc;
            --text-secondary: #62758d;
            --accent-cyan: #00bfff;
            --accent-purple: #a855f7;
            --neon-orange: #ff7b1a;
        }
 
        * { box-sizing: border-box; }
 
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
        }
 
        /* PARTIKEL */
        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
 
        .app-wrapper { position: relative; z-index: 1; }
 
        /* Navbar */
        .navbar {
            background-color: rgba(11, 17, 30, 0.92);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .brand-logo { font-size: 22px; font-weight: 900; letter-spacing: 1.5px; cursor: pointer; color: #fff; }
        .brand-logo span { color: var(--accent-cyan); }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: .5px; transition: color .2s; }
        .nav-link.active, .nav-link:hover { color: var(--accent-cyan); }
        .nav-right { display: flex; align-items: center; gap: 15px; }
 
        /* Sub-Nav */
        .sub-nav {
            display: flex; justify-content: center; gap: 25px;
            background-color: rgba(11, 17, 30, 0.8);
            padding: 16px; border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px); flex-wrap: wrap;
        }
        .mode-btn {
            background: none; border: none; color: var(--text-secondary);
            font-weight: 700; font-size: 13px; letter-spacing: 1px;
            cursor: pointer; text-transform: uppercase; padding: 4px 2px;
            position: relative; transition: color .2s;
        }
        .mode-btn:hover { color: var(--text-main); }
        .mode-btn.active { color: var(--accent-cyan); }
        .mode-btn.active::after {
            content: ''; position: absolute; bottom: -18px; left: 0;
            width: 100%; height: 3px;
            background-color: var(--accent-cyan);
            box-shadow: 0 0 12px var(--accent-cyan);
        }
 
        .main-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
 
        /* Buttons */
        .btn {
            background-color: #0e1726; border: 1px solid var(--border-color);
            color: var(--text-main); padding: 8px 16px; border-radius: 6px;
            cursor: pointer; font-weight: 700; font-size: 12px;
            display: inline-flex; align-items: center; gap: 6px; transition: all .2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-cyan { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .btn-cyan:hover { background: rgba(0, 191, 255, .1); box-shadow: 0 0 10px rgba(0,191,255,.2); }
        .btn-purple { border-color: var(--accent-purple); color: var(--accent-purple); }
        .btn-danger { border-color: #ff2a74; color: #ff2a74; }
        .search-bar {
            background-color: #060913; border: 1px solid var(--border-color);
            color: var(--text-main); padding: 8px 14px; border-radius: 6px;
            width: 180px; font-size: 13px;
        }
 
        /* Leaderboard */
        .leaderboard-table {
            width: 100%; border-collapse: collapse;
            background-color: #080d1a; border: 1px solid var(--border-color);
            border-radius: 8px; overflow: hidden; margin-top: 20px;
            animation: fadeIn .3s ease;
        }
        .leaderboard-table th {
            background-color: rgba(23,37,59,.4); padding: 14px 20px;
            text-align: left; font-size: 11px; text-transform: uppercase;
            color: var(--text-secondary); border-bottom: 1px solid var(--border-color);
        }
        .leaderboard-table td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; cursor: pointer; }
        .leaderboard-table tr:hover { background-color: rgba(23,37,59,.25); }
 
        .rank-number { font-weight: 900; font-size: 16px; color: var(--text-secondary); }
        .rank-1 { color: #ffaa00; } .rank-2 { color: #cbd5e1; } .rank-3 { color: #b45309; }
        .username { font-weight: 700; color: #fff; }
 
        /* Badges */
        .badge-list { display: flex; gap: 12px; flex-wrap: wrap; }
        .tier-badge-container { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 44px; }
        .icon-wrapper {
            width: 36px; height: 36px; border-radius: 8px;
            background-color: #0e1726; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 8px rgba(0,0,0,.6);
        }
        .mode-logo-img { width: 24px; height: 24px; object-fit: contain; image-rendering: pixelated; }
        .border-ht { border: 1.5px solid #ff7b1a; box-shadow: 0 0 8px rgba(249,115,22,.25); }
        .border-line-ht { color: #ff7b1a; font-weight: 800; font-size: 11px; }
        .border-lt { border: 1.5px solid #38bdf8; box-shadow: 0 0 8px rgba(56,189,248,.25); }
        .border-line-lt { color: #38bdf8; font-weight: 800; font-size: 11px; }
 
        /* Tier Spalten */
        .tier-columns { display: grid; grid-template-columns: repeat(5,1fr); gap: 15px; margin-top: 20px; animation: fadeIn .3s ease; }
        .tier-column { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .tier-header { padding: 15px; text-align: center; font-weight: 800; font-size: 13px; border-bottom: 1px solid var(--border-color); background: rgba(23,37,59,.3); }
        .t1-h { color: #ffaa00; } .t2-h { color: #cbd5e1; } .t3-h { color: #ff7b1a; } .t4-h { color: #38bdf8; } .t5-h { color: #94a3b8; }
        .tier-list-content { padding: 10px; min-height: 200px; display: flex; flex-direction: column; gap: 8px; }
        .tier-user-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .avatar { width: 32px; height: 32px; border-radius: 4px; image-rendering: pixelated; }
 
        /* Modals */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.85); backdrop-filter: blur(5px);
            justify-content: center; align-items: center; z-index: 2000;
        }
 
        /* Rank Points Modal */
        .points-modal-box {
            background-color: #080d19; border: 1.5px solid #1a2a42; border-radius: 16px;
            padding: 30px; width: 460px; position: relative; animation: modalScaleUp .2s ease;
        }
        .points-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
        .points-row-box {
            background-color: #0b1220; border: 1px solid #16243d; border-radius: 10px;
            padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
        }
        .points-value-badge {
            background-color: #070b14; border: 1px solid #142036; border-radius: 6px;
            padding: 4px 10px; font-size: 12px; font-weight: 700; color: #6c7f99;
        }
 
        /* Mini Profile Modal */
        .profile-card {
            background-color: #060b13; border: 1.5px solid #111e33; border-radius: 20px;
            width: 440px; padding: 30px; position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,.8);
            animation: modalScaleUp .2s cubic-bezier(.34,1.56,.64,1);
            display: flex; flex-direction: column; align-items: center;
        }
        .profile-avatar-wrapper {
            width: 80px; height: 80px; border-radius: 16px; border: 2px solid #111e33;
            overflow: hidden; margin-bottom: 15px; background: #0b111e;
        }
        .profile-avatar { width: 100%; height: 100%; image-rendering: pixelated; }
        .profile-name { font-size: 22px; font-weight: 800; color: #fff; margin: 0 0 15px 0; }
        .profile-stats-box { background: #09101d; border: 1px solid #152640; border-radius: 12px; padding: 8px 30px; text-align: center; margin-bottom: 25px; }
        .profile-stats-label { font-size: 10px; text-transform: uppercase; color: #435875; font-weight: 800; letter-spacing: 1px; }
        .profile-stats-value { font-size: 18px; font-weight: 800; color: #fff; }
        .profile-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; width: 100%; border-top: 1px solid #13223a; padding-top: 25px; margin-bottom: 20px; }
        .profile-mode-card { background: #09101d; border: 1px solid #132238; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .profile-mode-img { width: 26px; height: 26px; image-rendering: pixelated; object-fit: contain; }
        .profile-mode-name { font-size: 9px; text-transform: uppercase; color: #4b5f7a; font-weight: 700; }
        .profile-mode-tier { font-size: 15px; font-weight: 800; }
        .profile-rank-bottom { font-size: 32px; font-weight: 900; color: #fff; margin-top: 10px; letter-spacing: -1px; }
 
        /* Staff */
        .staff-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 20px; animation: fadeIn .3s ease; }
        .staff-card {
            background-color: #060b14; border: 1.5px solid #121d30; border-radius: 14px;
            padding: 16px; display: flex; align-items: center; gap: 14px;
            transition: border-color .2s, box-shadow .2s;
        }
        .staff-card:hover { border-color: #1e3557; box-shadow: 0 4px 15px rgba(0,0,0,.4); }
        .staff-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #162235; border: 1px solid #1f304a; }
        .staff-info { display: flex; flex-direction: column; gap: 4px; }
        .staff-name { font-weight: 800; color: #fff; font-size: 14px; }
        .staff-badge { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; text-transform: uppercase; letter-spacing: .5px; width: fit-content; }
        .badge-owner   { background: rgba(239,68,68,.15);  color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
        .badge-coowner { background: rgba(249,115,22,.15); color: #f97316; border: 1px solid rgba(249,115,22,.3); }
        .badge-overseer{ background: rgba(168,85,247,.15); color: #a855f7; border: 1px solid rgba(168,85,247,.3); }
        .badge-manager { background: rgba(234,179,8,.15);  color: #eab308; border: 1px solid rgba(234,179,8,.3); }
        .badge-dev     { background: rgba(6,182,212,.15);  color: #06b6d4; border: 1px solid rgba(6,182,212,.3); }
        .badge-admin   { background: rgba(34,197,94,.15);  color: #22c55e; border: 1px solid rgba(34,197,94,.3); }
        .badge-tester  { background: rgba(148,163,184,.15);color: #94a3b8; border: 1px solid rgba(148,163,184,.3); }
 
        /* Admin */
        .admin-panel { background-color: var(--panel-bg); border: 1px solid var(--accent-purple); border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .admin-sections { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-top: 15px; }
        .admin-box-sub { background: rgba(0,0,0,.2); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; }
        .admin-form { display: flex; flex-direction: column; gap: 12px; }
        .admin-form input, .admin-form select { background-color: #060913; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; }
        .admin-player-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes modalScaleUp { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
 
<canvas id="particle-canvas"></canvas>
 
<div class="app-wrapper">
    <nav class="navbar">
        <div class="nav-left">
            <div class="brand-logo" onclick="changeMainView('rankings')">LOAD<span>TIERS</span></div>
            <div class="nav-links">
                <div class="nav-link active" id="nav-rankings" onclick="changeMainView('rankings')">Rankings</div>
                <div class="nav-link" id="nav-staff" onclick="changeMainView('staff')">Staff</div>
                <div class="nav-link" onclick="loginAdmin()">Discord</div>
            </div>
        </div>
        <div class="nav-right">
            <div id="admin-status-text" style="font-size:12px;color:var(--text-secondary)">Status: Guest</div>
            <button class="btn btn-cyan" onclick="openModal('points-modal')">⚡ Rank Points</button>
            <input type="text" class="search-bar" id="search-input" placeholder="Search..." oninput="handleSearch()">
        </div>
    </nav>
 
    <div class="sub-nav" id="modes-sub-nav">
        <button class="mode-btn active" id="mode-overall"  onclick="switchMode('overall')">Overall</button>
        <button class="mode-btn" id="mode-sword"   onclick="switchMode('sword')">Sword</button>
        <button class="mode-btn" id="mode-cpvp"    onclick="switchMode('cpvp')">CPvP</button>
        <button class="mode-btn" id="mode-axe"     onclick="switchMode('axe')">Axe</button>
        <button class="mode-btn" id="mode-smp"     onclick="switchMode('smp')">SMP</button>
        <button class="mode-btn" id="mode-diapot"  onclick="switchMode('diapot')">Diapot</button>
        <button class="mode-btn" id="mode-mace"    onclick="switchMode('mace')">Mace</button>
        <button class="mode-btn" id="mode-uhc"     onclick="switchMode('uhc')">UHC</button>
        <button class="mode-btn" id="mode-nethpot" onclick="switchMode('nethpot')">Nethpot</button>
    </div>
 
    <div class="main-container">
 
        <div id="admin-panel" class="admin-panel" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-color);padding-bottom:10px;">
                <h3 style="margin:0;color:var(--accent-purple);">Admin Dashboard</h3>
                <div style="display:flex;gap:10px;align-items:center;">
                    <span id="save-status" style="font-size:11px;color:#22c55e;"></span>
                    <button class="btn btn-danger" onclick="logoutAdmin()" style="padding:5px 12px;">Logout</button>
                </div>
            </div>
            <div class="admin-sections">
                <div class="admin-box-sub">
                    <h4 style="margin-top:0;color:var(--accent-cyan);">Spieler verwalten</h4>
                    <div class="admin-form">
                        <input type="text" id="new-player-name" placeholder="Minecraft Name">
                        <select id="new-player-mode">
                            <option value="sword">Sword</option><option value="cpvp">CPvP</option><option value="axe">Axe</option><option value="smp">SMP</option><option value="diapot">Diapot</option><option value="mace">Mace</option><option value="uhc">UHC</option><option value="nethpot">Nethpot</option>
                        </select>
                        <select id="new-player-tier">
                            <option value="HT1">HT1</option><option value="LT1">LT1</option><option value="HT2">HT2</option><option value="LT2">LT2</option><option value="HT3">HT3</option><option value="LT3">LT3</option><option value="HT4">HT4</option><option value="LT4">LT4</option><option value="HT5">HT5</option><option value="LT5">LT5</option>
                        </select>
                        <button class="btn btn-cyan" onclick="addOrUpdatePlayer()">Speichern</button>
                    </div>
                    <div id="admin-delete-list" style="max-height:150px;overflow-y:auto;margin-top:10px;"></div>
                </div>
                <div class="admin-box-sub">
                    <h4 style="margin-top:0;color:#22c55e;">Staff verwalten</h4>
                    <div class="admin-form">
                        <input type="text" id="staff-name-in" placeholder="Anzeige-Name">
                        <input type="text" id="staff-discord-in" placeholder="Discord ID">
                        <select id="staff-title-in">
                            <option value="NETWORK OWNER">Network Owner</option>
                            <option value="CO OWNER">Co Owner</option>
                            <option value="NETWORK OVERSEER">Network Overseer</option>
                            <option value="MANAGER">Manager</option>
                            <option value="DEVELOPER">Developer</option>
                            <option value="ADMINISTRATOR">Administrator</option>
                            <option value="TESTER">Tester</option>
                        </select>
                        <button class="btn btn-cyan" style="border-color:#22c55e;color:#22c55e;" onclick="addStaff()">Staff Hinzufügen</button>
                    </div>
                    <div id="admin-staff-delete-list" style="max-height:150px;overflow-y:auto;margin-top:10px;"></div>
                </div>
                <div class="admin-box-sub" id="l4lyx-only-section" style="display:none;">
                    <h4 style="margin-top:0;color:var(--accent-purple);">👑 Neue Admins (Nur L4lyx)</h4>
                    <div class="admin-form">
                        <input type="text" id="new-admin-user" placeholder="Admin Username">
                        <input type="password" id="new-admin-pass" placeholder="Passwort">
                        <button class="btn btn-purple" onclick="createNewAdminAccount()">Erstellen</button>
                    </div>
                </div>
            </div>
        </div>
 
        <div id="content-area"></div>
    </div>
</div>
 
<div id="profile-modal" class="modal-overlay" onclick="closeModal('profile-modal')">
    <div class="profile-card" onclick="event.stopPropagation()">
        <div class="profile-avatar-wrapper">
            <img id="p-modal-avatar" class="profile-avatar" src="">
        </div>
        <h2 class="profile-name" id="p-modal-name"></h2>
        <div class="profile-stats-box">
            <div class="profile-stats-label">Overall</div>
            <div class="profile-stats-value" id="p-modal-points"></div>
        </div>
        <div class="profile-grid" id="p-modal-grid"></div>
        <div class="profile-rank-bottom" id="p-modal-rank-num"></div>
    </div>
</div>
 
<div id="points-modal" class="modal-overlay" onclick="closeModal('points-modal')">
    <div class="points-modal-box" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:25px;">
            <span style="color:#ffaa00;font-size:18px;">⚡</span>
            <h2 style="margin:0;font-size:20px;font-weight:800;text-transform:uppercase;">Rank Points</h2>
        </div>
        <div class="points-grid">
            <div class="points-row-box"><span style="color:#ff7b1a;font-weight:800;">HT1</span><div class="points-value-badge">60 PTS</div></div>
            <div class="points-row-box"><span style="color:#708aff;font-weight:800;">LT1</span><div class="points-value-badge">45 PTS</div></div>
            <div class="points-row-box"><span style="color:#ff7b1a;font-weight:800;">HT2</span><div class="points-value-badge">30 PTS</div></div>
            <div class="points-row-box"><span style="color:#708aff;font-weight:800;">LT2</span><div class="points-value-badge">20 PTS</div></div>
            <div class="points-row-box"><span style="color:#ff7b1a;font-weight:800;">HT3</span><div class="points-value-badge">10 PTS</div></div>
            <div class="points-row-box"><span style="color:#708aff;font-weight:800;">LT3</span><div class="points-value-badge">6 PTS</div></div>
            <div class="points-row-box"><span style="color:#ff7b1a;font-weight:800;">HT4</span><div class="points-value-badge">4 PTS</div></div>
            <div class="points-row-box"><span style="color:#708aff;font-weight:800;">LT4</span><div class="points-value-badge">3 PTS</div></div>
            <div class="points-row-box"><span style="color:#ff7b1a;font-weight:800;">HT5</span><div class="points-value-badge">2 PTS</div></div>
            <div class="points-row-box"><span style="color:#708aff;font-weight:800;">LT5</span><div class="points-value-badge">1 PTS</div></div>
        </div>
    </div>
</div>
 
<div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
    <div style="background-color:var(--panel-bg);border:1px solid var(--border-color);border-radius:12px;padding:25px;width:360px;" onclick="event.stopPropagation()">
        <h3 style="text-align:center;margin-top:0;">🔑 Admin Login</h3>
        <input type="text" id="login-user" placeholder="Username" style="width:100%;padding:10px;margin-bottom:10px;background:#060913;border:1px solid var(--border-color);color:white;border-radius:6px;">
        <input type="password" id="login-pass" placeholder="Passwort" style="width:100%;padding:10px;margin-bottom:15px;background:#060913;border:1px solid var(--border-color);color:white;border-radius:6px;">
        <button class="btn btn-purple" style="width:100%;justify-content:center;" onclick="submitLogin()">Login</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
// ═══════════════════════════════════════════════════════
//  FIREBASE CONFIGURATION
// ═══════════════════════════════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyBswyuV0HblMDvmrh6McmPRb26Hz99XhAY",
    authDomain: "loadtiers.firebaseapp.com",
    projectId: "loadtiers",
    storageBucket: "loadtiers.firebasestorage.app",
    messagingSenderId: "705641531162",
    appId: "1:705641531162:web:907ad79f61d54cf4b5cea3",
    measurementId: "G-CQ8KT3ZQQ3"
};

// Firebase & Firestore initialisieren
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ═══════════════════════════════════════════════════════
//  PARTIKEL HINTERGRUND
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resizeCanvas() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
const COLORS = ['#00bfff', '#a855f7', '#ff7b1a', '#38bdf8', '#ffffff'];
const particles = [];
for (let i = 0; i < 130; i++) {
    particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 1.8 + 0.3,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: Math.random() * 0.45 + 0.08
    });
}
function animParticles() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.fill();
    });
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y; const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 100) {
                ctx.beginPath(); ctx.strokeStyle = '#00bfff'; ctx.globalAlpha = (1 - d / 100) * 0.07; ctx.lineWidth = 0.5;
                ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
            }
        }
    }
    ctx.globalAlpha = 1; requestAnimationFrame(animParticles);
}
animParticles();

// ═══════════════════════════════════════════════════════
//  DATEN & CONFIG
// ═══════════════════════════════════════════════════════
const modeIcons = {
    sword: 'https://i.imgur.com/f4TGbi9.png', cpvp: 'https://i.imgur.com/rXpkFYb.png',
    axe: 'https://i.imgur.com/yDimAH6.png', smp: 'https://i.imgur.com/XBvvJBS.png',
    diapot: 'https://i.imgur.com/1TgH0p8.png', mace: 'https://i.imgur.com/9oQz88r.png',
    uhc: 'https://i.imgur.com/X1OzkD3.png', nethpot: 'https://i.imgur.com/6uUitGf.png'
};
const pointValues = { HT1:60, LT1:45, HT2:30, LT2:20, HT3:10, LT3:6, HT4:4, LT4:3, HT5:2, LT5:1 };

let players = [];
let staffList = [];
let currentView = 'rankings';
let currentMode = 'overall';
let loggedInUser = null;

// ═══════════════════════════════════════════════════════
//  REALTIME CLOUD INTERACTION (Echtzeit-Abfragen)
// ═══════════════════════════════════════════════════════

db.collection("players").onSnapshot((snapshot) => {
    players = [];
    snapshot.forEach((doc) => {
        players.push({ name: doc.id, ranks: doc.data().ranks || {} });
    });
    render();
});

db.collection("staff").onSnapshot((snapshot) => {
    staffList = [];
    snapshot.forEach((doc) => {
        staffList.push({ id: doc.id, ...doc.data() });
    });
    render();
});

function addOrUpdatePlayer() {
    const name = document.getElementById('new-player-name').value.trim();
    const mode = document.getElementById('new-player-mode').value;
    const tier = document.getElementById('new-player-tier').value;
    if(!name) return;

    let existing = players.find(p => p.name.toLowerCase() === name.toLowerCase());
    let updatedRanks = existing ? { ...existing.ranks } : {};
    updatedRanks[mode] = tier;

    db.collection("players").doc(name).set({ ranks: updatedRanks })
    .then(() => {
        document.getElementById('new-player-name').value = '';
        showSaveStatus();
    });
}

function deletePlayer(name) {
    db.collection("players").doc(name).delete().then(() => showSaveStatus());
}

function addStaff() {
    const name = document.getElementById('staff-name-in').value.trim();
    const discord = document.getElementById('staff-discord-in').value.trim();
    const title = document.getElementById('staff-title-in').value;
    if(!name) return;

    db.collection("staff").add({ name, discord, title })
    .then(() => {
        document.getElementById('staff-name-in').value = '';
        document.getElementById('staff-discord-in').value = '';
        showSaveStatus();
    });
}

function deleteStaff(id) {
    db.collection("staff").doc(id).delete().then(() => showSaveStatus());
}

function createNewAdminAccount() {
    const user = document.getElementById('new-admin-user').value.trim();
    const pass = document.getElementById('new-admin-pass').value.trim();
    if(!user || !pass) return;
    
    alert("Admin Account erstellt (Wird in Kürze voll funktionstüchtig sein!)");
    document.getElementById('new-admin-user').value = '';
    document.getElementById('new-admin-pass').value = '';
}

function showSaveStatus() {
    const s = document.getElementById('save-status');
    if (s) {
        s.textContent = '✓ Live Aktualisiert';
        setTimeout(() => s.textContent = '', 2000);
    }
}

// ═══════════════════════════════════════════════════════
//  MODALS & INTERFACE LOGIC
// ═══════════════════════════════════════════════════════
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function loginAdmin() { openModal('login-modal'); }
function logoutAdmin() {
    loggedInUser = null;
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('l4lyx-only-section').style.display = 'none';
    document.getElementById('admin-status-text').textContent = "Status: Guest";
    render();
}

function submitLogin() {
    const u = document.getElementById('login-user').value;
    const p = document.getElementById('login-pass').value;
    
    // Login für L4lyx
    if(u === "L4lyx" && p === "L4lyx12") {
        loggedInUser = u;
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('l4lyx-only-section').style.display = 'block';
        document.getElementById('admin-status-text').textContent = "Status: Admin (" + u + ")";
        closeModal('login-modal');
        render();
    } else {
        alert("Falsche Login-Daten!");
    }
}

function calcPts(p) {
    let t = 0;
    for (let m in p.ranks) t += pointValues[p.ranks[m]] || 0;
    return t;
}

function changeMainView(view) {
    currentView = view;
    document.getElementById('nav-rankings').classList.remove('active');
    document.getElementById('nav-staff').classList.remove('active');
    if (view === 'rankings') {
        document.getElementById('nav-rankings').classList.add('active');
        document.getElementById('modes-sub-nav').style.display = 'flex';
    } else {
        document.getElementById('nav-staff').classList.add('active');
        document.getElementById('modes-sub-nav').style.display = 'none';
    }
    render();
}

function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mode-' + mode).classList.add('active');
    render();
}

function handleSearch() { render(); }

function render() {
    const f = document.getElementById('search-input').value.toLowerCase();
    if (currentView === 'rankings') {
        if (currentMode === 'overall') renderLeaderboard(f);
        else renderColumns(f);
    } else {
        renderStaff(f);
    }
    if (loggedInUser) renderAdminLists();
}

// ═══════════════════════════════════════════════════════
//  RENDER FUNKTIONEN
// ═══════════════════════════════════════════════════════
function renderLeaderboard(filter = '') {
    let sorted = [...players]
        .map(p => ({ ...p, totalPts: calcPts(p) }))
        .sort((a, b) => b.totalPts - a.totalPts);
    if (filter) sorted = sorted.filter(p => p.name.toLowerCase().includes(filter));

    let html = `<table class="leaderboard-table">
        <thead><tr><th>#</th><th>Player</th><th>Tiers</th><th style="text-align:right;">Pts</th></tr></thead><tbody>`;

    sorted.forEach((p, i) => {
        const rc = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
        let badges = '';
        for (let mode in p.ranks) {
            const tier = p.ranks[mode]; if (!tier) continue;
            const ht = tier.startsWith('HT');
            badges += `
                <div class="tier-badge-container">
                    <div class="icon-wrapper ${ht ? 'border-ht' : 'border-lt'}">
                        <img src="${modeIcons[mode]}" class="mode-logo-img" onerror="this.style.display='none'">
                    </div>
                    <span class="${ht ? 'border-line-ht' : 'border-line-lt'}">${tier}</span>
                </div>`;
        }
        html += `
            <tr onclick="openProfile('${p.name}', ${i + 1})">
                <td class="rank-number ${rc}">#${i + 1}</td>
                <td><div style="display:flex;align-items:center;gap:12px;">
                    <img class="avatar" src="https://minotar.net/avatar/${p.name}/32" onerror="this.src='https://minotar.net/avatar/steve/32'">
                    <span class="username">${p.name}</span>
                </div></td>
                <td><div class="badge-list">${badges}</div></td>
                <td style="text-align:right;font-weight:900;color:var(--accent-cyan);font-size:16px;">${p.totalPts}</td>
            </tr>`;
    });
    document.getElementById('content-area').innerHTML = html + '</tbody></table>';
}

function renderColumns(filter = '') {
    const tiers = ['HT1','LT1','HT2','LT2','HT3','LT3','HT4','LT4','HT5','LT5'];
    let html = `<div class="tier-columns">`;
    
    tiers.forEach(t => {
        let thClass = t.startsWith('HT') ? 't3-h' : 't4-h';
        if(t.includes('1')) thClass = t.startsWith('HT') ? 't1-h' : 't2-h';
        
        html += `<div class="tier-column">
            <div class="tier-header ${thClass}">${t}</div>
            <div class="tier-list-content">`;
            
        let filtered = players.filter(p => p.ranks[currentMode] === t);
        if(filter) filtered = filtered.filter(p => p.name.toLowerCase().includes(filter));
        
        filtered.forEach(p => {
            html += `
                <div class="tier-user-card" onclick="openProfile('${p.name}', '?')">
                    <span style="font-weight:700;font-size:13px;">${p.name}</span>
                    <img class="avatar" src="https://minotar.net/avatar/${p.name}/32" onerror="this.src='https://minotar.net/avatar/steve/32'">
                </div>`;
        });
        html += `</div></div>`;
    });
    document.getElementById('content-area').innerHTML = html + `</div>`;
}

function renderStaff(filter = '') {
    let list = [...staffList];
    if(filter) list = list.filter(s => s.name.toLowerCase().includes(filter));
    
    let html = `<div class="staff-grid">`;
    list.forEach(s => {
        let bCls = 'badge-admin';
        const t = s.title.toUpperCase();
        if(t.includes('OWNER')) bCls = 'badge-owner';
        else if(t.includes('CO')) bCls = 'badge-coowner';
        else if(t.includes('OVERSEER')) bCls = 'badge-overseer';
        else if(t.includes('MANAGER')) bCls = 'badge-manager';
        else if(t.includes('DEV')) bCls = 'badge-dev';
        else if(t.includes('TESTER')) bCls = 'badge-tester';

        html += `
            <div class="staff-card">
                <img class="staff-img" src="https://minotar.net/avatar/${s.name}/44" onerror="this.src='https://minotar.net/avatar/steve/44'">
                <div class="staff-info">
                    <div class="staff-name">${s.name}</div>
                    <div class="staff-badge ${bCls}">${s.title}</div>
                </div>
            </div>`;
    });
    document.getElementById('content-area').innerHTML = html + `</div>`;
}

function openProfile(username, rankNumber) {
    const p = players.find(x => x.name === username);
    if (!p) return;

    document.getElementById('p-modal-avatar').src = `https://minotar.net/avatar/${p.name}/80`;
    document.getElementById('p-modal-name').textContent = p.name + ' ★';
    document.getElementById('p-modal-points').textContent = calcPts(p) + ' points';
    document.getElementById('p-modal-rank-num').textContent = '#' + rankNumber;

    let g = '';
    for (let mode in modeIcons) {
        const tier = p.ranks[mode];
        if(tier) {
            g += `<div class="profile-mode-card">
                <img src="${modeIcons[mode]}" class="profile-mode-img">
                <div class="profile-mode-name">${mode}</div>
                <div class="profile-mode-tier" style="color:${tier.startsWith('HT')?'#ff7b1a':'#38bdf8'}">${tier}</div>
            </div>`;
        }
    }
    document.getElementById('p-modal-grid').innerHTML = g;
    openModal('profile-modal');
}

function renderAdminLists() {
    let pDoc = '';
    players.forEach(p => {
        pDoc += `<div class="admin-player-row"><span>${p.name}</span><button class="btn btn-danger" style="padding:2px 6px;font-size:10px;" onclick="deletePlayer('${p.name}')">X</button></div>`;
    });
    document.getElementById('admin-delete-list').innerHTML = pDoc;

    let sDoc = '';
    staffList.forEach(s => {
        sDoc += `<div class="admin-player-row"><span>${s.name} (${s.title})</span><button class="btn btn-danger" style="padding:2px 6px;font-size:10px;" onclick="deleteStaff('${s.id}')">X</button></div>`;
    });
    document.getElementById('admin-staff-delete-list').innerHTML = sDoc;
}

// Initialer Aufruf
changeMainView('rankings');
</script>
</body>
</html>
