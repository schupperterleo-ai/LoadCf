<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Database - L4lyx</title>
    <style>
        /* --- HIER IST DAS CSS DESIGN --- */
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --neon-blue: #45f3ff;
            --neon-red: #ff2a74;
            --text-color: #c5c6c7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .neon-text {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-guest {
            color: var(--neon-red);
            font-weight: bold;
        }

        .status-admin {
            color: var(--neon-blue);
            font-weight: bold;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        /* Suchleiste & Inputs */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            background: #151a21;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-blue);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-primary {
            background-color: var(--neon-blue);
            color: black;
        }

        .btn-danger {
            background-color: var(--neon-red);
            color: white;
        }

        /* Admin Sektion */
        .admin-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid var(--neon-blue);
        }

        .form-group {
            display: flex;
            gap: 10px;
        }

        .form-group input {
            margin-bottom: 0;
        }

        /* Spielerliste */
        .player-list {
            list-style: none;
            padding: 0;
        }

        .player-item {
            background: var(--card-bg);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Login Modal (Standardmäßig versteckt) */
        .modal {
            display: none; /* Wichtig: Versteckt das Fenster am Anfang */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            border: 2px solid var(--neon-blue);
        }

        .modal-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .error-msg {
            color: var(--neon-red);
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">PLAYER <span class="neon-text">DB</span></div>
            <div class="status-bar">
                Status: <span id="auth-status" class="status-guest">Guest</span>
                <button id="logout-btn" class="btn btn-danger" style="display: none; padding: 5px 10px;" onclick="logout()">Logout</button>
            </div>
        </header>

        <section class="search-section">
            <input type="text" id="search-input" placeholder="Search player (type 'login' to sign in)..." oninput="checkSearchTrigger()">
        </section>

        <section id="admin-controls" class="admin-section" style="display: none;">
            <h3>Admin Panel</h3>
            <div class="form-group">
                <input type="text" id="player-name" placeholder="Player Name">
                <input type="text" id="player-rank" placeholder="Rank (e.g., MVP, VIP)">
                <button onclick="addPlayer()" class="btn btn-primary">Add Player</button>
            </div>
        </section>

        <section class="player-section">
            <h2>Registered Players</h2>
            <ul id="player-list" class="player-list">
                </ul>
        </section>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h3>Admin Login</h3>
            <div id="login-error" class="error-msg" style="display: none;">Falsche Anmeldedaten!</div>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <div class="modal-buttons">
                <button onclick="attemptLogin()" class="btn btn-primary">Login</button>
                <button onclick="closeLoginModal()" class="btn btn-danger">Abbrechen</button>
            </div>
        </div>
    </div>

    <script>
        // --- HIER IST DIE JAVASCRIPT LOGIK ---
        
        // Beispiel-Daten für Spieler
        let players = [
            { id: 1, name: "Willi", rank: "Admin" },
            { id: 2, name: "Dennis", rank: "MVP" },
            { id: 3, name: "Marie", rank: "VIP" }
        ];

        let isAdmin = false;

        // Prüft, ob im Suchfeld "login" eingegeben wurde
        function checkSearchTrigger() {
            const searchVal = document.getElementById('search-input').value.trim();
            if (searchVal.toLowerCase() === 'login') {
                document.getElementById('search-input').value = ''; // Feld leeren
                openLoginModal();
            } else {
                renderPlayers(searchVal);
            }
        }

        function openLoginModal() {
            document.getElementById('login-modal').style.display = 'flex';
            document.getElementById('username').focus();
        }

        function closeLoginModal() {
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // Login Überprüfung
        function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'L4lyx' && pass === 'Tini2013!') {
                isAdmin = true;
                closeLoginModal();
                updateUI();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            isAdmin = false;
            updateUI();
        }

        // Schaltet Admin-Funktionen frei oder sperrt sie
        function updateUI() {
            const statusText = document.getElementById('auth-status');
            const adminControls = document.getElementById('admin-controls');
            const logoutBtn = document.getElementById('logout-btn');

            if (isAdmin) {
                statusText.innerText = "L4lyx (Admin)";
                statusText.className = "status-admin";
                adminControls.style.display = "block";
                logoutBtn.style.display = "inline-block";
            } else {
                statusText.innerText = "Guest";
                statusText.className = "status-guest";
                adminControls.style.display = "none";
                logoutBtn.style.display = "none";
            }
            renderPlayers(); // Liste neu laden, um Edit-Knöpfe zu zeigen/verstecken
        }

        // Spieler anzeigen (und filtern per Suche)
        function renderPlayers(filter = "") {
            const list = document.getElementById('player-list');
            list.innerHTML = "";

            const filtered = players.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));

            filtered.forEach(player => {
                const li = document.createElement('li');
                li.className = "player-item";
                
                let actionsHtml = "";
                // Edit und Delete Knöpfe nur zeigen, wenn man eingeloggt ist
                if (isAdmin) {
                    actionsHtml = `
                        <div>
                            <button onclick="editPlayer(${player.id})" class="btn btn-primary" style="padding: 5px 10px; margin-right: 5px;">Edit</button>
                            <button onclick="deletePlayer(${player.id})" class="btn btn-danger" style="padding: 5px 10px;">X</button>
                        </div>
                    `;
                }

                li.innerHTML = `
                    <div>
                        <strong>${player.name}</strong> - <span style="color: #45f3ff;">${player.rank}</span>
                    </div>
                    ${actionsHtml}
                `;
                list.appendChild(li);
            });
        }

        // Spieler hinzufügen (Nur Admin)
        function addPlayer() {
            const nameInput = document.getElementById('player-name');
            const rankInput = document.getElementById('player-rank');

            if (nameInput.value.trim() === "") return;

            const newPlayer = {
                id: Date.now(),
                name: nameInput.value,
                rank: rankInput.value || "Player"
            };

            players.push(newPlayer);
            nameInput.value = "";
            rankInput.value = "";
            renderPlayers();
        }

        // Spieler löschen (Nur Admin)
        function deletePlayer(id) {
            players = players.filter(p => p.id !== id);
            renderPlayers();
        }

        // Spieler editieren (Nur Admin)
        function editPlayer(id) {
            const player = players.find(p => p.id === id);
            if (!player) return;

            const newName = prompt("Neuer Name für " + player.name + ":", player.name);
            const newRank = prompt("Neuer Rang für " + player.name + ":", player.rank);

            if (newName !== null && newName.trim() !== "") {
                player.name = newName;
            }
            if (newRank !== null && newRank.trim() !== "") {
                player.rank = newRank;
            }
            
            renderPlayers();
        }

        // Start-Aufruf beim Laden der Seite
        renderPlayers();
    </script>
</body>
</html>
