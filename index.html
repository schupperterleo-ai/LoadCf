<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadSpace | Bio-Link Hosting Platform</title>
    <style>
        /* --- BRANDING & REON RED AESTHETIC --- */
        :root {
            --bg-dark: #040101;
            --panel-bg: #0c0303;
            --panel-border: rgba(255, 51, 51, 0.15);
            --neon-red: #ff3333;
            --neon-glow: rgba(255, 51, 51, 0.5);
            --text-main: #ffffff;
            --text-muted: #7d5353;
            --green-glow: #00ff66;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            cursor: none; /* Custom Fadenkreuz überall */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BACKGROUND NETWORK GRID --- */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 51, 51, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 51, 51, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
        }

        /* --- FADENKREUZ CURSOR --- */
        #main-cursor {
            width: 22px; height: 22px;
            border: 2px solid var(--neon-red);
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 10px var(--neon-glow);
        }
        #main-cursor::after {
            content: ''; position: absolute;
            top: 50%; left: 50%; width: 4px; height: 4px;
            background: #fff; border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* --- NAV BAR --- */
        header {
            position: relative; z-index: 10;
            height: 70px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--panel-border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px;
        }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }

        .host-trigger-btn {
            background: transparent;
            border: 1px solid var(--neon-red);
            color: #fff;
            padding: 10px 22px;
            font-size: 11px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.5px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.1);
            transition: all 0.2s ease;
        }
        .host-trigger-btn:hover {
            background: var(--neon-red);
            box-shadow: 0 0 25px var(--neon-glow);
            transform: translateY(-2px);
        }

        /* --- DASHBOARD PORTAL --- */
        .container {
            position: relative; z-index: 5;
            max-width: 1200px; margin: 40px auto;
            padding: 0 20px;
        }
        .section-title {
            font-size: 12px; text-transform: uppercase;
            color: var(--text-muted); letter-spacing: 2px;
            margin-bottom: 25px; font-weight: 800;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* CARD DESIGN */
        .profile-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px; padding: 25px;
            text-align: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center;
        }
        .profile-card:hover {
            border-color: var(--neon-red);
            box-shadow: 0 8px 25px rgba(255, 51, 51, 0.15);
            transform: translateY(-4px);
        }
        .card-avatar {
            width: 65px; height: 65px; border-radius: 50%;
            border: 2px solid var(--panel-border); margin-bottom: 15px;
            background: #1a0a0a; display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .card-name { font-size: 16px; font-weight: 800; margin-bottom: 6px; text-transform: uppercase; }
        .card-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 20px; font-weight: 600; }
        
        .visit-btn {
            width: 100%; background: rgba(0,0,0,0.4);
            border: 1px solid var(--panel-border); color: #fff;
            padding: 10px; border-radius: 4px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.2s;
        }
        .profile-card:hover .visit-btn {
            border-color: var(--neon-red); background: rgba(255, 51, 51, 0.05);
        }

        /* --- HOSTING CREATION MODAL (POPUP) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 1, 1, 0.9); backdrop-filter: blur(8px);
            z-index: 1000; display: none; justify-content: center; align-items: center;
        }
        .modal-box {
            background: var(--panel-bg); border: 1px solid var(--neon-red);
            width: 100%; max-width: 450px; padding: 30px; border-radius: 10px;
            box-shadow: 0 0 30px var(--neon-glow);
        }
        .modal-title { font-size: 18px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }
        
        .input-grp { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .input-grp label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
        .input-grp input {
            background: #000; border: 1px solid var(--panel-border);
            padding: 12px; color: #fff; border-radius: 4px; font-weight: 600;
        }
        .input-grp input:focus { outline: none; border-color: var(--neon-red); }

        .form-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .form-btn { padding: 12px; border: none; border-radius: 4px; font-weight: 800; text-transform: uppercase; font-size: 11px; }
        .btn-cancel { background: #1a0a0a; color: var(--text-muted); }
        .btn-submit { background: var(--neon-red); color: #fff; box-shadow: 0 0 10px var(--neon-glow); }

        /* --- FULLSCREEN BIO VIEWER SYSTEM --- */
        #bio-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050202; z-index: 5000; display: none;
            justify-content: center; align-items: center;
        }
        .close-bio-panel {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,51,51,0.1); border: 1px solid var(--neon-red);
            color: #fff; padding: 8px 15px; font-size: 10px; font-weight: 800;
            text-transform: uppercase; border-radius: 4px; z-index: 5100;
        }

        /* Embedded Guns.lol Style Inner Wrapper */
        .bio-inner-content {
            background: rgba(18, 5, 5, 0.6); border: 1px solid rgba(255, 51, 51, 0.2);
            width: 100%; max-width: 420px; padding: 35px; border-radius: 12px;
            text-align: center; backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .bio-avatar { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--neon-red); margin-bottom: 15px; box-shadow: 0 0 15px var(--neon-glow); }
        .bio-title { font-size: 24px; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 10px var(--neon-red); margin-bottom: 5px; }
        .bio-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 25px; }
        
        .bio-links-holder { display: flex; flex-direction: column; gap: 10px; }
        .bio-btn-link {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,51,51,0.15);
            padding: 14px; color: #fff; text-decoration: none; border-radius: 6px;
            font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            display: block; transition: all 0.2s;
        }
        .bio-btn-link:hover { border-color: var(--neon-red); background: rgba(255,51,51,0.05); transform: scale(1.02); }
    </style>
</head>
<body>

    <!-- CORE AMBIENT HINTERGRUND -->
    <div class="grid-bg"></div>
    <div id="main-cursor"></div>

    <!-- MAIN PLATFORM HEADER -->
    <header>
        <div class="logo">Load<span>Space</span></div>
        <button class="host-trigger-btn" onclick="toggleHostModal(true)">[ Host New Page ]</button>
    </header>

    <!-- CONTENT PORTAL -->
    <div class="container">
        <div class="section-title">Hosted Bio Link Network</div>
        <div class="cards-grid" id="platform-grid">
            
            <!-- CODE-BASIERTE PROFILE (Möglichkeit A: Trag hier deine Kumpels fest ein) -->
            <div class="profile-card" onclick="openBio('Linus Löffel', 'Java Developer & SysAdmin', 'https://github.com', 'https://discord.com')">
                <div class="card-avatar">💻</div>
                <div class="card-name">Linus Löffel</div>
                <div class="card-sub">Developer System</div>
                <button class="visit-btn">Besuchen</button>
            </div>

            <div class="profile-card" onclick="openBio('Dennis', 'Signal Contact & Trader', 'https://tradingview.com', 'https://signal.org')">
                <div class="card-avatar">📈</div>
                <div class="card-name">Dennis</div>
                <div class="card-sub">Market Partner</div>
                <button class="visit-btn">Besuchen</button>
            </div>

            <div class="profile-card" onclick="openBio('Marie', 'Music Specialist', 'https://spotify.com', 'https://youtube.com')">
                <div class="card-avatar">🎵</div>
                <div class="card-name">Marie</div>
                <div class="card-sub">Creative Matrix</div>
                <button class="visit-btn">Besuchen</button>
            </div>

        </div>
    </div>

    <!-- POPUP MODAL: HOST FORMULAR -->
    <div class="modal-overlay" id="host-modal">
        <div class="modal-box">
            <div class="modal-title">Deploy Bio Site</div>
            
            <div class="input-grp">
                <label>Profil Name</label>
                <input type="text" id="form-name" placeholder="z.B. Keks">
            </div>
            <div class="input-grp">
                <label>Beschreibung / Tagline</label>
                <input type="text" id="form-desc" placeholder="z.B. Minecraft Modder">
            </div>
            <div class="input-grp">
                <label>Social Link 1 (URL)</label>
                <input type="text" id="form-link1" placeholder="https://discord.gg/...">
            </div>
            <div class="input-grp">
                <label>Social Link 2 (URL)</label>
                <input type="text" id="form-link2" placeholder="https://github.com/...">
            </div>

            <div class="form-btns">
                <button class="form-btn btn-cancel" onclick="toggleHostModal(false)">Abbrechen</button>
                <button class="form-btn btn-submit" onclick="submitNewHost()">Deploy Page</button>
            </div>
        </div>
    </div>

    <!-- FULLSCREEN EMBEDDED GUNS.LOL BIO VIEW INTERFACE -->
    <div id="bio-viewer">
        <button class="close-bio-panel" onclick="closeBio()">✖ Close Station</button>
        
        <div class="bio-inner-content">
            <!-- Platzhalter-Avatar, der im Guns-Style glüht -->
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150" alt="Bio Head" class="bio-avatar">
            <div class="bio-title" id="view-title">User</div>
            <div class="bio-desc" id="view-desc">Description</div>
            
            <div class="bio-links-holder" id="view-links">
                <!-- Links werden dynamisch reingeschrieben -->
            </div>
        </div>
    </div>

    <!-- --- WEB APPLICATION ENGINE --- -->
    <script>
        // 1. NEON CURSOR CONTROL
        const mouseCrosshair = document.getElementById('main-cursor');
        document.addEventListener('mousemove', (e) => {
            mouseCrosshair.style.left = e.clientX + 'px';
            mouseCrosshair.style.top = e.clientY + 'px';
        });

        // 2. MODAL INTERAFFECTION
        function toggleHostModal(show) {
            document.getElementById('host-modal').style.display = show ? 'flex' : 'none';
        }

        // 3. STORAGE & GENERATION MECHANICS (Möglichkeit B)
        function loadStorageProfiles() {
            const platformGrid = document.getElementById('platform-grid');
            let saved = JSON.parse(localStorage.getItem('loadspace_pages')) || [];
            
            saved.forEach(profile => {
                const newCard = document.createElement('div');
                newCard.className = 'profile-card';
                // Escape Strings für Event-Handler
                const nameEsc = profile.name.replace(/'/g, "\\'");
                const descEsc = profile.desc.replace(/'/g, "\\'");
                
                newCard.setAttribute('onclick', `openBio('${nameEsc}', '${descEsc}', '${profile.l1}', '${profile.l2}')`);
                newCard.innerHTML = `
                    <div class="card-avatar" style="border-color: var(--neon-red);">🔥</div>
                    <div class="card-name">${profile.name}</div>
                    <div class="card-sub">Hosted User Space</div>
                    <button class="visit-btn">Besuchen</button>
                `;
                platformGrid.appendChild(newCard);
            });
        }

        function submitNewHost() {
            const name = document.getElementById('form-name').value.trim();
            const desc = document.getElementById('form-desc').value.trim();
            const l1 = document.getElementById('form-link1').value.trim() || 'https://google.com';
            const l2 = document.getElementById('form-link2').value.trim() || 'https://google.com';

            if(!name || !desc) {
                alert("Bitte mindestens Name und Beschreibung ausfüllen!");
                return;
            }

            let currentSaved = JSON.parse(localStorage.getItem('loadspace_pages')) || [];
            currentSaved.push({ name, desc, l1, l2 });
            localStorage.setItem('loadspace_pages', JSON.stringify(currentSaved));

            // Formular säubern & neu laden
            toggleHostModal(false);
            location.reload();
        }

        // 4. EMBED BIO VIEWER ENGINE (Öffnet das coole Guns.lol Profil)
        function openBio(name, desc, link1, link2) {
            document.getElementById('view-title').innerText = name;
            document.getElementById('view-desc').innerText = desc;
            
            const linksBox = document.getElementById('view-links');
            linksBox.innerHTML = `
                <a href="${link1}" target="_blank" class="bio-btn-link">Primary Network Connect</a>
                <a href="${link2}" target="_blank" class="bio-btn-link">Secondary Feed Node</a>
            `;

            document.getElementById('bio-viewer').style.display = 'flex';
        }

        function closeBio() {
            document.getElementById('bio-viewer').style.display = 'none';
        }

        // Initialisierung beim Start
        loadStorageProfiles();
    </script>
</body>
</html>
