<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadCf - Tiers & Rankings</title>
    <style>
        :root {
            --bg-dark: #050811;
            --panel-bg: #0b111e;
            --card-bg: #0e1726;
            --border-color: #17253b;
            --text-main: #f0f6fc;
            --text-secondary: #62758d;
            --accent-cyan: #00bfff;
            --accent-purple: #a855f7;
            --neon-orange: #ff7b1a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .brand-logo { font-size: 22px; font-weight: 900; letter-spacing: 1.5px; cursor: pointer; color: #ffffff; }
        .brand-logo span { color: var(--accent-cyan); }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 0.5px; transition: color 0.2s; }
        .nav-link.active, .nav-link:hover { color: var(--accent-cyan); }
        .nav-right { display: flex; align-items: center; gap: 15px; }

        /* Sub-Nav Tabs */
        .sub-nav { display: flex; justify-content: center; gap: 25px; background-color: rgba(11, 17, 30, 0.8); padding: 16px; border-bottom: 1px solid var(--border-color); backdrop-filter: blur(10px); }
        .mode-btn { background: none; border: none; color: var(--text-secondary); font-weight: 700; font-size: 13px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; padding: 4px 2px; position: relative; transition: color 0.2s; }
        .mode-btn:hover { color: var(--text-main); }
        .mode-btn.active { color: var(--accent-cyan); }
        .mode-btn.active::after { content: ''; position: absolute; bottom: -18px; left: 0; width: 100%; height: 3px; background-color: var(--accent-cyan); box-shadow: 0 0 12px var(--accent-cyan); }

        .main-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }

        /* Buttons & Search */
        .btn { background-color: #0e1726; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-cyan { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .btn-cyan:hover { background: rgba(0, 191, 255, 0.1); box-shadow: 0 0 10px rgba(0, 191, 255, 0.2); }
        .btn-purple { border-color: var(--accent-purple); color: var(--accent-purple); }
        .btn-danger { border-color: #ff2a74; color: #ff2a74; }
        .search-bar { background-color: #060913; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 14px; border-radius: 6px; width: 180px; font-size: 13px; }

        /* Leaderboard Table */
        .leaderboard-table { width: 100%; border-collapse: collapse; background-color: #080d1a; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; margin-top: 20px; animation: fadeIn 0.3s ease; }
        .leaderboard-table th { background-color: rgba(23, 37, 59, 0.4); padding: 14px 20px; text-align: left; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); }
        .leaderboard-table td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; cursor: pointer; }
        .leaderboard-table tr:hover { background-color: rgba(23, 37, 59, 0.25); }

        .rank-number { font-weight: 900; font-size: 16px; color: var(--text-secondary); }
        .rank-1 { color: #ffaa00; } .rank-2 { color: #cbd5e1; } .rank-3 { color: #b45309; }
        .username { font-weight: 700; color: #ffffff; }

        /* Badges */
        .badge-list { display: flex; gap: 12px; }
        .tier-badge-container { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 44px; }
        .icon-wrapper { width: 36px; height: 36px; border-radius: 8px; background-color: #0e1726; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 8px rgba(0,0,0,0.6); }
        .mode-logo-img { width: 24px; height: 24px; object-fit: contain; image-rendering: pixelated; }
        .border-ht { border: 1.5px solid #ff7b1a; box-shadow: 0 0 8px rgba(249, 115, 22, 0.25); }
        .border-line-ht { color: #ff7b1a; font-weight: 800; font-size: 11px; }
        .border-lt { border: 1.5px solid #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.25); }
        .border-line-lt { color: #38bdf8; font-weight: 800; font-size: 11px; }

        /* Spalten */
        .tier-columns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 20px; animation: fadeIn 0.3s ease; }
        .tier-column { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .tier-header { padding: 15px; text-align: center; font-weight: 800; font-size: 13px; border-bottom: 1px solid var(--border-color); background: rgba(23, 37, 59, 0.3); }
        .t1-h { color: #ffaa00; } .t2-h { color: #cbd5e1; } .t3-h { color: #ff7b1a; } .t4-h { color: #38bdf8; } .t5-h { color: #94a3b8; }
        .tier-list-content { padding: 10px; min-height: 450px; display: flex; flex-direction: column; gap: 8px; }
        .tier-user-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .avatar { width: 32px; height: 32px; border-radius: 4px; image-rendering: pixelated; }

        /* Modals */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 2000; }
        
        /* Rank Points Design (image_b760d4.png) */
        .points-modal-box { background-color: #080d19; border: 1.5px solid #1a2a42; border-radius: 16px; padding: 30px; width: 460px; position: relative; animation: modalScaleUp 0.2s ease; }
        .points-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
        .points-row-box { background-color: #0b1220; border: 1px solid #16243d; border-radius: 10px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
        .points-value-badge { background-color: #070b14; border: 1px solid #142036; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; color: #6c7f99; }

        /* MINI PROFILE MODAL DESIGN (image_b70736.png) */
        .profile-card {
            background-color: #060b13;
            border: 1.5px solid #111e33;
            border-radius: 20px;
            width: 440px;
            padding: 30px;
            position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            animation: modalScaleUp 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .profile-avatar-wrapper {
            width: 80px; height: 80px; border-radius: 16px; border: 2px solid #111e33; overflow: hidden; margin-bottom: 15px; background: #0b111e;
        }
        .profile-avatar { width: 100%; height: 100%; image-rendering: pixelated; }
        .profile-name { font-size: 22px; font-weight: 800; color: #ffffff; margin: 0 0 15px 0; display: flex; align-items: center; gap: 6px; }
        .profile-stats-box {
            background: #09101d; border: 1px solid #152640; border-radius: 12px; padding: 8px 30px; text-align: center; margin-bottom: 25px;
        }
        .profile-stats-label { font-size: 10px; text-transform: uppercase; color: #435875; font-weight: 800; letter-spacing: 1px; }
        .profile-stats-value { font-size: 18px; font-weight: 800; color: #ffffff; }
        .profile-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; border-top: 1px solid #13223a; padding-top: 25px; margin-bottom: 20px;
        }
        .profile-mode-card {
            background: #09101d; border: 1px solid #132238; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative;
        }
        .profile-mode-img { width: 26px; height: 26px; image-rendering: pixelated; object-fit: contain; }
        .profile-mode-name { font-size: 9px; text-transform: uppercase; color: #4b5f7a; font-weight: 700; }
        .profile-mode-tier { font-size: 15px; font-weight: 800; }
        .profile-rank-bottom { font-size: 32px; font-weight: 900; color: #ffffff; margin-top: 10px; letter-spacing: -1px; }

        /* STAFF GRID LOOK (image_b70ae1.png) */
        .staff-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 20px; animation: fadeIn 0.3s ease; }
        .staff-card {
            background-color: #060b14; border: 1.5px solid #121d30; border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .staff-card:hover { border-color: #1e3557; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .staff-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #162235; border: 1px solid #1f304a; }
        .staff-info { display: flex; flex-direction: column; gap: 4px; }
        .staff-name { font-weight: 800; color: #ffffff; font-size: 14px; }
        
        /* Staff Badges */
        .staff-badge {
            font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; text-transform: uppercase; letter-spacing: 0.5px; width: fit-content;
        }
        .badge-owner { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-coowner { background: rgba(249, 115, 22, 0.15); color: #f97316; border: 1px solid rgba(249, 115, 22, 0.3); }
        .badge-overseer { background: rgba(168, 85, 247, 0.15); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); }
        .badge-manager { background: rgba(234, 179, 8, 0.15); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3); }
        .badge-dev { background: rgba(6, 182, 212, 0.15); color: #06b6d4; border: 1px solid rgba(6, 182, 212, 0.3); }
        .badge-admin { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .badge-tester { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.3); }

        /* Admin Dashboard Layout */
        .admin-panel { background-color: var(--panel-bg); border: 1px solid var(--accent-purple); border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .admin-sections { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 15px; }
        .admin-box-sub { background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; }
        .admin-form { display: flex; flex-direction: column; gap: 12px; }
        .admin-form input, .admin-form select { background-color: #060913; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; }
        .admin-player-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 6px; font-size:12px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes modalScaleUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <div class="brand-logo" onclick="changeMainView('rankings')">LOAD<span>TIERS</span></div>
                <div class="nav-links">
                    <div class="nav-link active" id="nav-rankings" onclick="changeMainView('rankings')">RANKINGS</div>
                    <div class="nav-link" id="nav-staff" onclick="changeMainView('staff')">STAFF</div>
                    <div class="nav-link">DISCORD</div>
                </div>
            </div>
            <div class="nav-right">
                <div id="admin-status-text" style="font-size: 12px; color: var(--text-secondary)">Status: Guest</div>
                <button class="btn btn-cyan" onclick="openModal('points-modal')">⚡ Rank Points</button>
                <input type="text" class="search-bar" id="search-input" placeholder="Search..." oninput="handleSearch()">
            </div>
        </nav>

        <div class="sub-nav" id="modes-sub-nav">
            <button class="mode-btn active" id="mode-overall" onclick="switchMode('overall')">Overall</button>
            <button class="mode-btn" id="mode-sword" onclick="switchMode('sword')">Sword</button>
            <button class="mode-btn" id="mode-cpvp" onclick="switchMode('cpvp')">CPvP</button>
            <button class="mode-btn" id="mode-axe" onclick="switchMode('axe')">Axe</button>
            <button class="mode-btn" id="mode-smp" onclick="switchMode('smp')">SMP</button>
            <button class="mode-btn" id="mode-diapot" onclick="switchMode('diapot')">Diapot</button>
            <button class="mode-btn" id="mode-mace" onclick="switchMode('mace')">Mace</button>
            <button class="mode-btn" id="mode-uhc" onclick="switchMode('uhc')">UHC</button>
            <button class="mode-btn" id="mode-nethpot" onclick="switchMode('nethpot')">Nethpot</button>
        </div>

        <div class="main-container">
            <!-- Admin Dashboard -->
            <div id="admin-panel" class="admin-panel" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                    <h3 style="margin:0; color: var(--accent-purple);">Admin Dashboard</h3>
                    <button class="btn btn-danger" onclick="logoutAdmin()" style="padding: 5px 12px;">Logout</button>
                </div>
                <div class="admin-sections">
                    <!-- Sektion 1: Spieler -->
                    <div class="admin-box-sub">
                        <h4 style="margin-top:0; color: var(--accent-cyan);">Spieler verwalten</h4>
                        <div class="admin-form">
                            <input type="text" id="new-player-name" placeholder="Minecraft Name">
                            <select id="new-player-mode">
                                <option value="sword">Sword</option><option value="cpvp">CPvP</option><option value="axe">Axe</option><option value="smp">SMP</option><option value="diapot">Diapot</option><option value="mace">Mace</option><option value="uhc">UHC</option><option value="nethpot">Nethpot</option>
                            </select>
                            <select id="new-player-tier">
                                <option value="HT1">HT1</option><option value="LT1">LT1</option><option value="HT2">HT2</option><option value="LT2">LT2</option><option value="HT3">HT3</option><option value="LT3">LT3</option><option value="HT4">HT4</option><option value="LT4">LT4</option><option value="HT5">HT5</option><option value="LT5">LT5</option>
                            </select>
                            <button class="btn btn-cyan" onclick="addOrUpdatePlayer()">Speichern</button>
                        </div>
                        <div id="admin-delete-list" style="max-height: 110px; overflow-y: auto; margin-top:10px;"></div>
                    </div>
                    <!-- Sektion 2: Staff -->
                    <div class="admin-box-sub">
                        <h4 style="margin-top:0; color: #22c55e;">Staff verwalten</h4>
                        <div class="admin-form">
                            <input type="text" id="staff-name-in" placeholder="Name (z.B. L4lyx @help)">
                            <input type="text" id="staff-discord-in" placeholder="Discord ID">
                            <input type="text" id="staff-avatar-in" placeholder="Avatar Bild-URL">
                            <select id="staff-title-in">
                                <option value="NETWORK OWNER">Network Owner</option>
                                <option value="CO OWNER">Co Owner</option>
                                <option value="NETWORK OVERSEER">Network Overseer</option>
                                <option value="MANAGER">Manager</option>
                                <option value="DEVELOPER">Developer</option>
                                <option value="ADMINISTRATOR">Administrator</option>
                                <option value="TESTER">Tester</option>
                            </select>
                            <button class="btn btn-cyan" style="border-color:#22c55e; color:#22c55e;" onclick="addStaff()">Staff Hinzufügen</button>
                        </div>
                        <div id="admin-staff-delete-list" style="max-height: 110px; overflow-y: auto; margin-top:10px;"></div>
                    </div>
                    <!-- Sektion 3: L4lyx Accounts -->
                    <div class="admin-box-sub" id="l4lyx-only-section" style="display: none;">
                        <h4 style="margin-top:0; color: var(--accent-purple);">👑 Neue Admins (Nur L4lyx)</h4>
                        <div class="admin-form">
                            <input type="text" id="new-admin-user" placeholder="Admin Username">
                            <input type="password" id="new-admin-pass" placeholder="Passwort">
                            <button class="btn btn-purple" onclick="createNewAdminAccount()">Erstellen</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Hier landet die Tabelle oder die Staff-Ansicht -->
            <div id="content-area"></div>
        </div>
    </div>

    <!-- MINI PROFILE MODAL (image_b70736.png) -->
    <div id="profile-modal" class="modal-overlay" onclick="closeModal('profile-modal')">
        <div class="profile-card" onclick="event.stopPropagation()">
            <div class="profile-avatar-wrapper">
                <img id="p-modal-avatar" class="profile-avatar" src="">
            </div>
            <h2 class="profile-name" id="p-modal-name"></h2>
            <div class="profile-stats-box">
                <div class="profile-stats-label">Overall</div>
                <div class="profile-stats-value" id="p-modal-points"></div>
            </div>
            <div class="profile-grid" id="p-modal-grid"></div>
            <div class="profile-rank-bottom" id="p-modal-rank-num"></div>
        </div>
    </div>

    <!-- RANK POINTS MODAL -->
    <div id="points-modal" class="modal-overlay" onclick="closeModal('points-modal')">
        <div class="points-modal-box" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:25px;">
                <span style="color:#ffaa00; font-size:18px;">⚡</span>
                <h2 style="margin:0; font-size:20px; font-weight:800; text-transform:uppercase;">Rank Points</h2>
            </div>
            <div class="points-grid">
                <div class="points-row-box"><span style="color:#ff7b1a; font-weight:800;">HT1</span><div class="points-value-badge">60 PTS</div></div>
                <div class="points-row-box"><span style="color:#708aff; font-weight:800;">LT1</span><div class="points-value-badge">45 PTS</div></div>
                <div class="points-row-box"><span style="color:#ff7b1a; font-weight:800;">HT2</span><div class="points-value-badge">30 PTS</div></div>
                <div class="points-row-box"><span style="color:#708aff; font-weight:800;">LT2</span><div class="points-value-badge">20 PTS</div></div>
                <div class="points-row-box"><span style="color:#ff7b1a; font-weight:800;">HT3</span><div class="points-value-badge">10 PTS</div></div>
                <div class="points-row-box"><span style="color:#708aff; font-weight:800;">LT3</span><div class="points-value-badge">6 PTS</div></div>
                <div class="points-row-box"><span style="color:#ff7b1a; font-weight:800;">HT4</span><div class="points-value-badge">4 PTS</div></div>
                <div class="points-row-box"><span style="color:#708aff; font-weight:800;">LT4</span><div class="points-value-badge">3 PTS</div></div>
                <div class="points-row-box"><span style="color:#ff7b1a; font-weight:800;">HT5</span><div class="points-value-badge">2 PTS</div></div>
                <div class="points-row-box"><span style="color:#708aff; font-weight:800;">LT5</span><div class="points-value-badge">1 PTS</div></div>
            </div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div style="background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; width: 360px;" onclick="event.stopPropagation()">
            <h3 style="text-align:center; margin-top:0;">🔑 Admin Login</h3>
            <input type="text" id="login-user" placeholder="Username" style="width:100%; padding:10px; margin-bottom:10px; background:#060913; border:1px solid var(--border-color); color:white; border-radius:6px; box-sizing:border-box;">
            <input type="password" id="login-pass" placeholder="Passwort" style="width:100%; padding:10px; margin-bottom:15px; background:#060913; border:1px solid var(--border-color); color:white; border-radius:6px; box-sizing:border-box;">
            <button class="btn btn-purple" style="width:100%; justify-content:center;" onclick="submitLogin()">Login</button>
        </div>
    </div>

    <script>
        const modeIcons = {
            sword: "https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png",
            cpvp: "https://minecraft.wiki/images/End_Crystal_JE2_BE2.png",
            axe: "https://minecraft.wiki/images/Diamond_Axe_JE3_BE3.png",
            smp: "https://minecraft.wiki/images/Oak_Log_%28UD%29_JE5_BE3.png",
            diapot: "https://minecraft.wiki/images/Splash_Potion_of_Healing_JE2_BE2.png",
            mace: "https://minecraft.wiki/images/Mace_JE1_BE1.png",
            uhc: "https://minecraft.wiki/images/Golden_Apple_JE2_BE2.png",
            nethpot: "https://minecraft.wiki/images/Netherite_Chestplate_JE3_BE2.png"
        };

        const pointValues = { 'HT1': 60, 'LT1': 45, 'HT2': 30, 'LT2': 20, 'HT3': 10, 'LT3': 6, 'HT4': 4, 'LT4': 3, 'HT5': 2, 'LT5': 1 };

        // Standard Staff Liste nach Vorlage
        const defaultStaff = [
            { name: "TheRealJero @for help", discord: "jero_help", title: "NETWORK OWNER", avatar: "https://minotar.net/avatar/MHF_Steve/44" },
            { name: "Lucky @for timeout", discord: "lucky_timeout", title: "NETWORK OWNER", avatar: "https://minotar.net/avatar/MHF_Alex/44" },
            { name: "Sebastian @ for Tech Supp...", discord: "seb_tech", title: "CO OWNER", avatar: "https://minotar.net/avatar/MHF_Steve/44" },
            { name: "FleXy @ For alL", discord: "flexy_all", title: "CO OWNER", avatar: "https://minotar.net/avatar/MHF_Alex/44" }
        ];

        const defaultPlayers = [
            { name: "LetsJanTV", ranks: { cpvp: "HT3", sword: "HT3", uhc: "HT4", mace: "HT4" } },
            { name: "L4lyx", ranks: { cpvp: "HT4", sword: "LT3", uhc: "LT4" } },
            { name: "__moha__", ranks: { cpvp: "LT3", sword: "HT5", uhc: "LT4" } }
        ];

        let players = JSON.parse(localStorage.getItem('loadtiers_players')) || defaultPlayers;
        let staffList = JSON.parse(localStorage.getItem('loadtiers_staff')) || defaultStaff;
        let adminAccounts = JSON.parse(localStorage.getItem('loadtiers_admins')) || { "L4lyx": "Tini2013!" };
        
        let currentView = 'rankings'; 
        let currentMode = 'overall';
        let loggedInUser = null;

        function save() {
            localStorage.setItem('loadtiers_players', JSON.stringify(players));
            localStorage.setItem('loadtiers_staff', JSON.stringify(staffList));
            localStorage.setItem('loadtiers_admins', JSON.stringify(adminAccounts));
        }

        function calculateTotalPoints(player) {
            let total = 0;
            for (let mode in player.ranks) total += pointValues[player.ranks[mode]] || 0;
            return total;
        }

        function changeMainView(view) {
            currentView = view;
            document.getElementById('nav-rankings').classList.remove('active');
            document.getElementById('nav-staff').classList.remove('active');
            
            if(view === 'rankings') {
                document.getElementById('nav-rankings').classList.add('active');
                document.getElementById('modes-sub-nav').style.display = 'flex';
            } else {
                document.getElementById('nav-staff').classList.add('active');
                document.getElementById('modes-sub-nav').style.display = 'none';
            }
            render();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            render();
        }

        function render() {
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            if (currentView === 'rankings') {
                if (currentMode === 'overall') { renderLeaderboard(searchVal); } else { renderColumns(searchVal); }
            } else {
                renderStaff(searchVal);
            }
            if (loggedInUser) { renderAdminLists(); }
        }

        function renderLeaderboard(filter = "") {
            const contentArea = document.getElementById('content-area');
            let sorted = [...players].map(p => ({ ...p, totalPts: calculateTotalPoints(p) })).sort((a, b) => b.totalPts - a.totalPts);
            if (filter) sorted = sorted.filter(p => p.name.toLowerCase().includes(filter));

            let html = `<table class="leaderboard-table"><thead><tr><th>#</th><th>Player</th><th>Tiers</th><th style="text-align:right;">Pts</th></tr></thead><tbody>`;
            sorted.forEach((p, index) => {
                let rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
                let badgesHtml = '';
                for (let mode in p.ranks) {
                    let tier = p.ranks[mode]; if(!tier) continue;
                    let isHT = tier.startsWith('HT');
                    badgesHtml += `
                        <div class="tier-badge-container">
                            <div class="icon-wrapper ${isHT ? 'border-ht' : 'border-lt'}">
                                <img src="${modeIcons[mode] || modeIcons.sword}" class="mode-logo-img">
                            </div>
                            <span class="${isHT ? 'border-line-ht' : 'border-line-lt'}">${tier}</span>
                        </div>
                    `;
                }
                html += `
                    <tr onclick="openProfile('${p.name}', ${index + 1})">
                        <td class="rank-number ${rankClass}">#${index + 1}</td>
                        <td><div style="display:flex; align-items:center; gap:12px;"><img class="avatar" src="https://minotar.net/avatar/${p.name}/32"><span class="username">${p.name}</span></div></td>
                        <td><div class="badge-list">${badgesHtml}</div></td>
                        <td style="text-align:right; font-weight:900; color:var(--accent-cyan); font-size:16px;">${p.totalPts}</td>
                    </tr>
                `;
            });
            contentArea.innerHTML = html + `</tbody></table>`;
        }

        function openProfile(username, rankNumber) {
            let p = players.find(player => player.name === username);
            if(!p) return;

            document.getElementById('p-modal-avatar').src = `https://minotar.net/avatar/${p.name}/80`;
            document.getElementById('p-modal-name').innerHTML = `${p.name} ★`;
            document.getElementById('p-modal-points').innerText = `${calculateTotalPoints(p)} points`;
            document.getElementById('p-modal-rank-num').innerText = `#${rankNumber}`;

            let gridHtml = '';
            for(let mode in modeIcons) {
                let tier = p.ranks[mode] || '—';
                let isHT = tier.startsWith('HT');
                let borderStyle = tier !== '—' ? (isHT ? 'border: 1px solid #ff7b1a; box-shadow: 0 0 6px rgba(249,115,22,0.2);' : 'border: 1px solid #38bdf8; box-shadow: 0 0 6px rgba(56,189,248,0.2);') : '';
                let colorStyle = tier !== '—' ? (isHT ? 'color:#ff7b1a;' : 'color:#38bdf8;') : 'color:#4b5f7a;';

                gridHtml += `
                    <div class="profile-mode-card" style="${borderStyle}">
                        <img src="${modeIcons[mode]}" class="profile-mode-img" style="${tier === '—' ? 'opacity:0.3;' : ''}">
                        <span class="profile-mode-name">${mode}</span>
                        <span class="profile-mode-tier" style="${colorStyle}">${tier}</span>
                    </div>
                `;
            }
            document.getElementById('p-modal-grid').innerHTML = gridHtml;
            openModal('profile-modal');
        }

        function renderColumns(filter = "") {
            const contentArea = document.getElementById('content-area');
            let html = `<div class="tier-columns">`;
            for (let i = 1; i <= 5; i++) {
                html += `<div class="tier-column"><div class="tier-header t${i}-h">TIER i</div><div class="tier-list-content">`;
                players.filter(p => p.ranks[currentMode] && p.ranks[currentMode].includes(i.toString()) && p.name.toLowerCase().includes(filter)).forEach(p => {
                    let tier = p.ranks[currentMode];
                    html += `
                        <div class="tier-user-card">
                            <div style="display:flex; align-items:center; gap:8px;"><img class="avatar" src="https://minotar.net/avatar/${p.name}/32"><span style="font-weight:600; font-size:13px;">${p.name}</span></div>
                            <span style="color:${tier.startsWith('HT') ? '#ff7b1a':'#38bdf8'}; font-weight:800; font-size:11px;">${tier}</span>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            contentArea.innerHTML = html + `</div>`;
        }

        function renderStaff(filter = "") {
            const contentArea = document.getElementById('content-area');
            let list = [...staffList];
            if (filter) list = list.filter(s => s.name.toLowerCase().includes(filter));

            let html = `<div class="staff-grid">`;
            list.forEach(s => {
                let badgeClass = "badge-tester";
                let t = s.title.toUpperCase();
                if(t.includes("OWNER")) badgeClass = "badge-owner";
                else if(t.includes("CO")) badgeClass = "badge-coowner";
                else if(t.includes("OVERSEER")) badgeClass = "badge-overseer";
                else if(t.includes("MANAGER")) badgeClass = "badge-manager";
                else if(t.includes("DEV")) badgeClass = "badge-dev";
                else if(t.includes("ADMIN")) badgeClass = "badge-admin";

                html += `
                    <div class="staff-card">
                        <img class="staff-img" src="${s.avatar}" onerror="this.src='https://minotar.net/avatar/MHF_Steve/44'">
                        <div class="staff-info">
                            <div class="staff-name">${s.name}</div>
                            <div style="font-size:11px; color:var(--text-secondary); margin-bottom:2px;">@${s.discord}</div>
                            <div class="staff-badge ${badgeClass}">? ${s.title}</div>
                        </div>
                    </div>
                `;
            });
            contentArea.innerHTML = html + `</div>`;
        }

        function renderAdminLists() {
            const pList = document.getElementById('admin-delete-list'); pList.innerHTML = '';
            players.forEach(p => {
                let d = document.createElement('div'); d.className = 'admin-player-row';
                d.innerHTML = `<span>${p.name}</span><button class="btn btn-danger" style="padding:2px 6px;" onclick="deletePlayer('${p.name}')">X</button>`;
                pList.appendChild(d);
            });

            const sList = document.getElementById('admin-staff-delete-list'); sList.innerHTML = '';
            staffList.forEach(s => {
                let d = document.createElement('div'); d.className = 'admin-player-row';
                d.innerHTML = `<span>${s.name}</span><button class="btn btn-danger" style="padding:2px 6px;" onclick="deleteStaff('${s.name}')">X</button>`;
                sList.appendChild(d);
            });
        }

        function addStaff() {
            let name = document.getElementById('staff-name-in').value.trim();
            let dc = document.getElementById('staff-discord-in').value.trim();
            let av = document.getElementById('staff-avatar-in').value.trim();
            let title = document.getElementById('staff-title-in').value;
            if(!name || !dc) return;
            if(!av) av = `https://minotar.net/avatar/${name}/44`;

            staffList.push({ name: name, discord: dc, avatar: av, title: title });
            save(); render();
            document.getElementById('staff-name-in').value = '';
            document.getElementById('staff-discord-in').value = '';
            document.getElementById('staff-avatar-in').value = '';
        }

        function deleteStaff(name) { staffList = staffList.filter(s => s.name !== name); save(); render(); }
        function addOrUpdatePlayer() {
            let name = document.getElementById('new-player-name').value.trim();
            let mode = document.getElementById('new-player-mode').value;
            let tier = document.getElementById('new-player-tier').value;
            if(!name) return;
            let ex = players.find(p => p.name.toLowerCase() === name.toLowerCase());
            if(ex) ex.ranks[mode] = tier; else { let n = { name: name, ranks: {} }; n.ranks[mode] = tier; players.push(n); }
            save(); render(); document.getElementById('new-player-name').value = '';
        }
        function deletePlayer(name) { players = players.filter(p => p.name !== name); save(); render(); }
        function handleSearch() { let val = document.getElementById('search-input').value.trim(); if(val.toLowerCase() === 'login') { document.getElementById('search-input').value = ''; openModal('login-modal'); } else { render(); } }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function submitLogin() {
            let u = document.getElementById('login-user').value.trim();
            let p = document.getElementById('login-pass').value;
            if (adminAccounts[u] && adminAccounts[u] === p) {
                loggedInUser = u;
                document.getElementById('admin-status-text').innerText = `Status: ${u}`;
                document.getElementById('admin-panel').style.display = 'block';
                if(u === 'L4lyx') document.getElementById('l4lyx-only-section').style.display = 'block';
                closeModal('login-modal'); render();
            }
        }
        function logoutAdmin() { loggedInUser = null; document.getElementById('admin-panel').style.display = 'none'; document.getElementById('admin-status-text').innerText = "Status: Guest"; render(); }
        function createNewAdminAccount() { let u = document.getElementById('new-admin-user').value.trim(); let p = document.getElementById('new-admin-pass').value; if(!u || !p) return; adminAccounts[u] = p; save(); alert(`Admin ${u} erstellt!`); }

        render();
    </script>
</body>
</html>
