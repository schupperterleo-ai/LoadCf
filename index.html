<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadCf - Player DB</title>
    <style>
        /* --- CSS DESIGN EXAKT WIE AUF DEN BILDERN --- */
        body {
            background-color: #0d1117; /* GitHub Dark Background */
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 800px;
            max-width: 90%;
            background-color: #161b22; /* Slightly Lighter Dark */
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 28px;
            font-weight: 600;
        }

        .neon-purple {
            color: #a040f0;
            text-shadow: 0 0 10px #a040f0;
        }

        .status-guest {
            color: #40c0e0; /* Bright blue-cyan */
        }

        .status-admin {
            color: #a040f0;
            text-shadow: 0 0 5px #a040f0;
        }

        /* Suchleiste - WIE AUF BILD 2 */
        .search-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: #0d1117;
            border: 2px solid #30363d; /* Subtle borders until focused */
            border-radius: 6px;
            color: #c9d1d9;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]#search-input {
            border: 2px solid #40c0e0; /* Teal-Cyan border, WIE AUF BILD 2 */
        }

        input:focus {
            outline: none;
            border-color: #a040f0; /* Purple border on focus */
        }

        /* Spielerliste & Player-Cards - WIE AUF DEN BILDERN */
        .player-list {
            list-style: none;
            padding: 0;
        }

        .player-item {
            background-color: #161b22;
            border: 2px solid #40c0e0; /* Teal-Cyan glowing borders */
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: box-shadow 0.2s;
        }

        .player-item:hover {
            box-shadow: 0 0 10px rgba(64, 192, 224, 0.5);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #30363d;
            border: 1px solid #40c0e0;
        }

        .player-name {
            font-weight: 600;
        }

        .player-rank {
            color: #40c0e0; /* Rank color matches borders */
            font-size: 14px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: #a040f0; /* Purple main action */
            color: white;
        }

        .btn-danger {
            background-color: #ff2a74;
            color: white;
        }

        /* Admin Sektion (Sperren, Hinzufügen, Edit) */
        .admin-section {
            background-color: #161b22;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 2px solid #a040f0; /* Purple to show admin status */
        }

        /* Login Modal (WIE AUF BILD 2) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #161b22;
            padding: 24px;
            border-radius: 6px;
            width: 320px;
            border: 2px solid #a040f0;
        }

        .error-msg {
            color: #ff2a74;
            margin-bottom: 12px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">PLAYER <span class="neon-purple">DB</span></div>
            <div class="status-bar">
                Status: <span id="auth-status" class="status-guest">Guest</span>
                <button id="logout-btn" class="btn btn-danger" style="display: none; padding: 5px 10px;" onclick="logout()">Logout</button>
            </div>
        </header>

        <section class="search-container">
            <input type="text" id="search-input" placeholder="Search player (type 'login' to sign in)..." oninput="checkSearchTrigger()">
        </section>

        <section id="admin-controls" class="admin-section" style="display: none;">
            <h3>Admin Panel</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="player-name" placeholder="Player Name">
                <input type="text" id="player-rank" placeholder="Rank (e.g., MVP)">
                <button onclick="addPlayer()" class="btn btn-primary">Add Player</button>
            </div>
        </section>

        <section class="player-section">
            <h2>Registered Players</h2>
            <ul id="player-list" class="player-list">
                </ul>
        </section>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h3>Admin Login</h3>
            <div id="login-error" class="error-msg" style="display: none;">Falsche Anmeldedaten!</div>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                <button onclick="attemptLogin()" class="btn btn-primary">Login</button>
                <button onclick="closeLoginModal()" class="btn btn-danger">Abbrechen</button>
            </div>
        </div>
    </div>

    <script>
        // --- JAVASCRIPT LOGIK MIT DEINEN BEISPIELDATEN ---
        let players = [
            { id: 1, name: "schupperterleo-ai L4lyx", rank: "L4lyx" },
            { id: 2, name: "Dennis", rank: "Admin" },
            { id: 3, name: "Marie", rank: "VIP" }
        ];

        let isAdmin = false;

        // Login-Trigger per Suchfeld
        function checkSearchTrigger() {
            const searchVal = document.getElementById('search-input').value.trim();
            if (searchVal.toLowerCase() === 'login') {
                document.getElementById('search-input').value = ''; 
                openLoginModal();
            } else {
                renderPlayers(searchVal);
            }
        }

        function openLoginModal() {
            document.getElementById('login-modal').style.display = 'flex';
            document.getElementById('username').focus();
        }

        function closeLoginModal() {
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // Login Überprüfung mit DEINEN Daten
        function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'L4lyx' && pass === 'Tini2013!') {
                isAdmin = true;
                closeLoginModal();
                updateUI();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            isAdmin = false;
            updateUI();
        }

        // UI-Update (Admin vs. Guest)
        function updateUI() {
            const statusText = document.getElementById('auth-status');
            const adminControls = document.getElementById('admin-controls');
            const logoutBtn = document.getElementById('logout-btn');

            if (isAdmin) {
                statusText.innerText = "L4lyx (Admin)";
                statusText.className = "status-admin";
                adminControls.style.display = "block";
                logoutBtn.style.display = "inline-block";
            } else {
                statusText.innerText = "Guest";
                statusText.className = "status-guest";
                adminControls.style.display = "none";
                logoutBtn.style.display = "none";
            }
            renderPlayers(); // Liste neu laden
        }

        // Spieler anzeigen & filtern
        function renderPlayers(filter = "") {
            const list = document.getElementById('player-list');
            list.innerHTML = "";

            const filtered = players.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));

            filtered.forEach(player => {
                const li = document.createElement('li');
                li.className = "player-item";
                
                let actionsHtml = "";
                // Edit/Delete nur für Admin
                if (isAdmin) {
                    actionsHtml = `
                        <div>
                            <button onclick="editPlayer(${player.id})" class="btn btn-primary" style="padding: 5px 10px; margin-right: 5px;">Edit</button>
                            <button onclick="deletePlayer(${player.id})" class="btn btn-danger" style="padding: 5px 10px;">X</button>
                        </div>
                    `;
                }

                li.innerHTML = `
                    <div class="player-info">
                        <div class="player-icon"></div>
                        <div>
                            <span class="player-name">${player.name}</span><br>
                            <span class="player-rank">${player.rank}</span>
                        </div>
                    </div>
                    ${actionsHtml}
                `;
                list.appendChild(li);
            });
        }

        // Hinzufügen (Nur Admin)
        function addPlayer() {
            const nameInput = document.getElementById('player-name');
            const rankInput = document.getElementById('player-rank');

            if (nameInput.value.trim() === "") return;

            const newPlayer = {
                id: Date.now(),
                name: nameInput.value,
                rank: rankInput.value || "Player"
            };

            players.push(newPlayer);
            nameInput.value = "";
            rankInput.value = "";
            renderPlayers();
        }

        // Löschen (Nur Admin)
        function deletePlayer(id) {
            players = players.filter(p => p.id !== id);
            renderPlayers();
        }

        // Editieren (Nur Admin)
        function editPlayer(id) {
            const player = players.find(p => p.id === id);
            if (!player) return;

            const newName = prompt("Neuer Name für " + player.name + ":", player.name);
            const newRank = prompt("Neuer Rang für " + player.name + ":", player.rank);

            if (newName !== null && newName.trim() !== "") player.name = newName;
            if (newRank !== null && newRank.trim() !== "") player.rank = newRank;
            
            renderPlayers();
        }

        renderPlayers(); // Initiale Anzeige
    </script>
</body>
</html>
