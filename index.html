<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadTiers - Tiers & Rankings</title>
    
    <link rel="icon" type="image/png" href="https://i.imgur.com/f4TGbi9.png">

    <style>
        :root {
            --bg-dark: #050811;
            --panel-bg: #0b111e;
            --card-bg: #0e1726;
            --border-color: #17253b;
            --text-main: #f0f6fc;
            --text-secondary: #62758d;
            --accent-cyan: #00bfff;
            --accent-purple: #a855f7;
            --neon-orange: #ff7b1a;
            --neon-red: #ff2a74;
        }
 
        * { box-sizing: border-box; }
 
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
            cursor: none; /* Deaktiviert den Standard-Mauszeiger für den Custom Cursor */
        }

        /* CUSTOM NEON CURSOR */
        #custom-cursor {
            width: 10px;
            height: 10px;
            background: var(--accent-cyan);
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 99999;
            transition: width 0.2s, height 0.2s, background-color 0.2s;
            box-shadow: 0 0 10px var(--accent-cyan);
        }
        #custom-cursor::before, #custom-cursor::after {
            content: '';
            position: absolute;
            background: var(--accent-cyan);
            transition: background-color 0.2s, transform 0.2s;
        }
        /* Fadenkreuz horizontal */
        #custom-cursor::before {
            top: 4px; left: -10px; width: 30px; height: 2px;
        }
        /* Fadenkreuz vertikal */
        #custom-cursor::after {
            left: 4px; top: -10px; width: 2px; height: 30px;
        }
        /* Cursor-Style beim Hovern auf Buttons/Links */
        body.cursor-hover #custom-cursor {
            width: 16px;
            height: 16px;
            background: transparent;
            border: 2px solid var(--accent-purple);
            box-shadow: 0 0 15px var(--accent-purple);
        }
        body.cursor-hover #custom-cursor::before {
            background: var(--accent-purple);
            transform: scaleX(0.5);
        }
        body.cursor-hover #custom-cursor::after {
            background: var(--accent-purple);
            transform: scaleY(0.5);
        }
 
        /* PARTIKEL */
        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
 
        .app-wrapper { position: relative; z-index: 1; }
 
        /* Navbar */
        .navbar {
            background-color: rgba(11, 17, 30, 0.92);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .brand-logo { font-size: 22px; font-weight: 900; letter-spacing: 1.5px; cursor: pointer; color: #fff; }
        .brand-logo span { color: var(--accent-cyan); }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: .5px; transition: color .2s; }
        .nav-link.active, .nav-link:hover { color: var(--accent-cyan); }
        .nav-right { display: flex; align-items: center; gap: 15px; }
 
        /* Sub-Nav */
        .sub-nav {
            display: flex; justify-content: center; gap: 25px;
            background-color: rgba(11, 17, 30, 0.8);
            padding: 16px; border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px); flex-wrap: wrap;
        }
        .mode-btn {
            background: none; border: none; color: var(--text-secondary);
            font-weight: 700; font-size: 13px; letter-spacing: 1px;
            cursor: pointer; text-transform: uppercase; padding: 4px 2px;
            position: relative; transition: color .2s;
        }
        .mode-btn:hover { color: var(--text-main); }
        .mode-btn.active { color: var(--accent-cyan); }
        .mode-btn.active::after {
            content: ''; position: absolute; bottom: -18px; left: 0;
            width: 100%; height: 3px;
            background-color: var(--accent-cyan);
            box-shadow: 0 0 12px var(--accent-cyan);
        }
 
        .main-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
 
        /* Buttons */
        .btn {
            background-color: #0e1726; border: 1px solid var(--border-color);
            color: var(--text-main); padding: 8px 16px; border-radius: 6px;
            cursor: pointer; font-weight: 700; font-size: 12px;
            display: inline-flex; align-items: center; gap: 6px; transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-cyan { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .btn-cyan:hover { background: rgba(0, 191, 255, .1); box-shadow: 0 0 10px rgba(0,191,255,.2); }
        .btn-purple { border-color: var(--accent-purple); color: var(--accent-purple); }
        .btn-purple:hover { background: rgba(168, 85, 247, .1); box-shadow: 0 0 10px rgba(168,85,247,.2); }
        .btn-danger { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-danger:hover { background: rgba(255, 42, 116, .1); box-shadow: 0 0 10px rgba(255,42,116,.2); }
        
        .search-bar {
            background-color: #060913; border: 1px solid var(--border-color);
            color: var(--text-main); padding: 8px 14px; border-radius: 6px;
            width: 180px; font-size: 13px;
        }
 
        /* Leaderboard */
        .leaderboard-table {
            width: 100%; border-collapse: collapse;
            background-color: #080d1a; border: 1px solid var(--border-color);
            border-radius: 8px; overflow: hidden; margin-top: 20px;
            animation: fadeIn .3s ease;
        }
        .leaderboard-table th {
            background-color: rgba(23,37,59,.4); padding: 14px 20px;
            text-align: left; font-size: 11px; text-transform: uppercase;
            color: var(--text-secondary); border-bottom: 1px solid var(--border-color);
        }
        .leaderboard-table td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .leaderboard-table tr:hover { background-color: rgba(23,37,59,.25); }
 
        .rank-number { font-weight: 900; font-size: 16px; color: var(--text-secondary); }
        .rank-1 { color: #ffaa00; } .rank-2 { color: #cbd5e1; } .rank-3 { color: #b45309; }
        .username { font-weight: 700; color: #fff; display: inline-flex; align-items: center; gap: 8px; }

        /* Custom Admin Tags in Leaderboard */
        .name-tag {
            font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .tag-l4lyx {
            background: rgba(168, 85, 247, 0.15); color: var(--accent-purple); border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.3);
        }
        .tag-willi {
            background: rgba(0, 191, 255, 0.15); color: var(--accent-cyan); border: 1px solid rgba(0, 191, 255, 0.4);
            box-shadow: 0 0 8px rgba(0, 191, 255, 0.3);
        }
 
        /* Badges */
        .badge-list { display: flex; gap: 12px; flex-wrap: wrap; }
        .tier-badge-container { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 44px; }
        .icon-wrapper {
            width: 36px; height: 36px; border-radius: 8px;
            background-color: #0e1726; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 8px rgba(0,0,0,.6);
        }
        .mode-logo-img { width: 24px; height: 24px; object-fit: contain; image-rendering: pixelated; }
        .border-t1 { border: 1.5px solid #ffaa00; box-shadow: 0 0 8px rgba(255,170,0,.25); color: #ffaa00; }
        .border-t2 { border: 1.5px solid #cbd5e1; box-shadow: 0 0 8px rgba(203,213,225,.25); color: #cbd5e1; }
        .border-t3 { border: 1.5px solid #ff7b1a; box-shadow: 0 0 8px rgba(249,115,22,.25); color: #ff7b1a; }
        .border-t4 { border: 1.5px solid #38bdf8; box-shadow: 0 0 8px rgba(56,189,248,.25); color: #38bdf8; }
        .border-t5 { border: 1.5px solid #94a3b8; box-shadow: 0 0 8px rgba(148,163,184,.25); color: #94a3b8; }
        .tier-text { font-weight: 800; font-size: 11px; text-transform: uppercase; }
 
        /* Gamemode Tier Leiste Überschriften */
        .gamemode-headers-row {
            display: flex; gap: 15px; margin-top: 25px; padding: 0 5px; animation: fadeIn .3s ease;
        }
        .gamemode-header-tab {
            flex: 1; padding: 12px; background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 6px; text-align: center; font-weight: 800; font-size: 13px; text-transform: uppercase;
        }
        .gh-t1 { color: #ffaa00; border-color: rgba(255,170,0,0.3); }
        .gh-t2 { color: #cbd5e1; border-color: rgba(203,213,225,0.3); }
        .gh-t3 { color: #ff7b1a; border-color: rgba(255,123,26,0.3); }
        .gh-t4 { color: #38bdf8; border-color: rgba(56,189,248,0.3); }
        .gh-t5 { color: #94a3b8; border-color: rgba(148,163,184,0.3); }

        /* Tier Spalten */
        .tier-columns { display: grid; grid-template-columns: repeat(5,1fr); gap: 15px; margin-top: 15px; animation: fadeIn .3s ease; }
        .tier-column { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .tier-header { padding: 15px; text-align: center; font-weight: 800; font-size: 13px; border-bottom: 1px solid var(--border-color); background: rgba(23,37,59,.3); }
        .t1-h { color: #ffaa00; } .t2-h { color: #cbd5e1; } .t3-h { color: #ff7b1a; } .t4-h { color: #38bdf8; } .t5-h { color: #94a3b8; }
        .tier-list-content { padding: 10px; min-height: 200px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Spieler-Karten Hover-Upgrade */
        .tier-user-card { 
            background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; 
            padding: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s, box-shadow 0.25s;
        }
        .tier-user-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: var(--accent-cyan);
            box-shadow: 0 5px 15px rgba(0, 191, 255, 0.3);
        }
        .avatar { 
            width: 32px; height: 32px; border-radius: 4px; image-rendering: pixelated;
            transition: transform 0.2s ease;
        }
        .tier-user-card:hover .avatar {
            transform: scale(1.2);
        }
 
        /* Modals Overlay */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.85); backdrop-filter: blur(5px);
            justify-content: center; align-items: center; z-index: 2000;
            opacity: 0; transition: opacity 0.2s ease;
        }
        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }
 
        /* Modal Boxen mit Bounce-Effekt */
        .points-modal-box, .profile-card, .login-modal-box {
            transform: scale(0.7);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.open .points-modal-box, 
        .modal-overlay.open .profile-card, 
        .modal-overlay.open .login-modal-box {
            transform: scale(1);
        }

        /* Error Shake Animation für Falscheingabe */
        @keyframes errorShake {
            0%, 100% { transform: scale(1) translateX(0); border-color: var(--border-color); box-shadow: 0 15px 50px rgba(0,0,0,.8); }
            20%, 60% { transform: scale(1) translateX(-10px); border-color: var(--neon-red); box-shadow: 0 0 25px var(--neon-red); }
            40%, 80% { transform: scale(1) translateX(10px); border-color: var(--neon-red); box-shadow: 0 0 25px var(--neon-red); }
        }
        .login-modal-box.shake-error {
            animation: errorShake 0.4s ease-in-out;
        }

        /* Rank Points Modal */
        .points-modal-box {
            background-color: #080d19; border: 1.5px solid #1a2a42; border-radius: 16px;
            padding: 30px; width: 480px; position: relative;
        }
        .points-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
        .points-row-box {
            background-color: #0b1220; border: 1px solid #16243d; border-radius: 10px;
            padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
        }
        .points-value-badge {
            background-color: #070b14; border: 1px solid #142036; border-radius: 6px;
            padding: 4px 10px; font-size: 12px; font-weight: 700; color: #fff;
        }
 
        /* Mini Profile Modal */
        .profile-card {
            background-color: #060b13; border: 1.5px solid #111e33; border-radius: 20px;
            width: 440px; padding: 30px; position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,.8);
            display: flex; flex-direction: column; align-items: center;
        }
        .profile-avatar-wrapper {
            width: 80px; height: 80px; border-radius: 16px; border: 2px solid #111e33;
            overflow: hidden; margin-bottom: 15px; background: #0b111e;
        }
        .profile-avatar { width: 100%; height: 100%; image-rendering: pixelated; }
        .profile-name { font-size: 22px; font-weight: 800; color: #fff; margin: 0 0 15px 0; }
        .profile-stats-box { background: #09101d; border: 1px solid #152640; border-radius: 12px; padding: 8px 30px; text-align: center; margin-bottom: 25px; }
        .profile-stats-label { font-size: 10px; text-transform: uppercase; color: #435875; font-weight: 800; letter-spacing: 1px; }
        .profile-stats-value { font-size: 18px; font-weight: 800; color: #fff; }
        .profile-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; width: 100%; border-top: 1px solid #13223a; padding-top: 25px; margin-bottom: 20px; }
        .profile-mode-card { background: #09101d; border: 1px solid #132238; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .profile-mode-img { width: 26px; height: 26px; image-rendering: pixelated; object-fit: contain; }
        .profile-mode-name { font-size: 9px; text-transform: uppercase; color: #4b5f7a; font-weight: 700; }
        .profile-mode-tier { font-size: 15px; font-weight: 800; text-transform: uppercase; }
 
        /* Staff */
        .staff-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 20px; animation: fadeIn .3s ease; }
        .staff-card {
            background-color: #060b14; border: 1.5px solid #121d30; border-radius: 14px;
            padding: 16px; display: flex; align-items: center; gap: 14px;
            transition: border-color .2s, box-shadow .2s;
        }
        .staff-card:hover { border-color: #1e3557; box-shadow: 0 4px 15px rgba(0,0,0,.4); }
        .staff-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #162235; border: 1px solid #1f304a; }
        .staff-info { display: flex; flex-direction: column; gap: 4px; }
        .staff-name { font-weight: 800; color: #fff; font-size: 14px; }
        .staff-badge { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; text-transform: uppercase; letter-spacing: .5px; width: fit-content; }
        .badge-owner   { background: rgba(239,68,68,.15);  color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
        .badge-coowner { background: rgba(249,115,22,.15); color: #f97316; border: 1px solid rgba(249,115,22,.3); }
        .badge-overseer{ background: rgba(168,85,247,.15); color: #a855f7; border: 1px solid rgba(168,85,247,.3); }
        .badge-manager { background: rgba(234,179,8,.15);  color: #eab308; border: 1px solid rgba(234,179,8,.3); }
        .badge-dev     { background: rgba(6,182,212,.15);  color: #06b6d4; border: 1px solid rgba(6,182,212,.3); }
        .badge-admin   { background: rgba(34,197,94,.15);  color: #22c55e; border: 1px solid rgba(34,197,94,.3); }
        .badge-tester  { background: rgba(148,163,184,.15);color: #94a3b8; border: 1px solid rgba(148,163,184,.3); }
 
        /* Admin */
        .admin-panel { background-color: var(--panel-bg); border: 1px solid var(--accent-purple); border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .admin-sections { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-top: 15px; }
        .admin-box-sub { background: rgba(0,0,0,.2); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; }
        .admin-form { display: flex; flex-direction: column; gap: 12px; }
        .admin-form input, .admin-form select { background-color: #060913; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; }
        .admin-player-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
 
<div id="custom-cursor"></div>

<canvas id="particle-canvas"></canvas>
 
<div class="app-wrapper">
    <nav class="navbar">
        <div class="nav-left">
            <div class="brand-logo" onclick="changeMainView('rankings')">LOAD<span>TIERS</span></div>
            <div class="nav-links">
                <div class="nav-link active" id="nav-rankings" onclick="changeMainView('rankings')">Rankings</div>
                <div class="nav-link" id="nav-staff" onclick="changeMainView('staff')">Staff</div>
                <a class="nav-link" href="https://discord.gg/x7eV3amhFA" target="_blank" style="text-decoration: none;">Discord</a>
            </div>
        </div>
        <div class="nav-right">
            <div id="admin-status-text" style="font-size:12px;color:var(--text-secondary); cursor:pointer;" onclick="openModal('login-modal')">Status: Guest</div>
            <button class="btn btn-cyan" onclick="openModal('points-modal')">⚡ Rank Points</button>
            <input type="text" class="search-bar" id="search-input" placeholder="Search..." oninput="handleSearch()">
        </div>
    </nav>
 
    <div class="sub-nav" id="modes-sub-nav">
        <button class="mode-btn active" id="mode-overall"  onclick="switchMode('overall')">Overall</button>
        <button class="mode-btn" id="mode-sword"   onclick="switchMode('sword')">Sword</button>
        <button class="mode-btn" id="mode-cpvp"    onclick="switchMode('cpvp')">CPvP</button>
        <button class="mode-btn" id="mode-axe"     onclick="switchMode('axe')">Axe</button>
        <button class="mode-btn" id="mode-smp"     onclick="switchMode('smp')">SMP</button>
        <button class="mode-btn" id="mode-diapot"  onclick="switchMode('diapot')">Diapot</button>
        <button class="mode-btn" id="mode-mace"    onclick="switchMode('mace')">Mace</button>
        <button class="mode-btn" id="mode-uhc"     onclick="switchMode('uhc')">UHC</button>
        <button class="mode-btn" id="mode-nethpot" onclick="switchMode('nethpot')">Nethpot</button>
    </div>
 
    <div class="main-container">
 
        <div id="admin-panel" class="admin-panel" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-color);padding-bottom:10px;">
                <h3 style="margin:0;color:var(--accent-purple);">Admin Dashboard</h3>
                <div style="display:flex;gap:10px;align-items:center;">
                    <span id="save-status" style="font-size:11px;color:#22c55e;"></span>
                    <button class="btn btn-danger" onclick="logoutAdmin()" style="padding:5px 12px;">Logout</button>
                </div>
            </div>
            <div class="admin-sections">
                <div class="admin-box-sub">
                    <h4 style="margin-top:0;color:var(--accent-cyan);">Spieler verwalten</h4>
                    <div class="admin-form">
                        <input type="text" id="new-player-name" placeholder="Minecraft Name">
                        <select id="new-player-mode">
                            <option value="sword">Sword</option><option value="cpvp">CPvP</option><option value="axe">Axe</option><option value="smp">SMP</option><option value="diapot">Diapot</option><option value="mace">Mace</option><option value="uhc">UHC</option><option value="nethpot">Nethpot</option>
                        </select>
                        <select id="new-player-tier">
                            <option value="LT5">LT5</option>
                            <option value="HT5">HT5</option>
                            <option value="LT4">LT4</option>
                            <option value="HT4">HT4</option>
                            <option value="LT3">LT3</option>
                            <option value="HT3">HT3</option>
                            <option value="LT2">LT2</option>
                            <option value="HT2">HT2</option>
                            <option value="LT1">LT1</option>
                            <option value="HT1">HT1</option>
                        </select>
                        <button class="btn btn-cyan" onclick="addOrUpdatePlayer()">Speichern</button>
                    </div>
                    <div id="admin-delete-list" style="max-height:150px;overflow-y:auto;margin-top:10px;border-top:1px solid var(--border-color);padding-top:10px;"></div>
                </div>
                <div class="admin-box-sub">
                    <h4 style="margin-top:0;color:#22c55e;">Staff verwalten</h4>
                    <div class="admin-form">
                        <input type="text" id="staff-name-in" placeholder="Anzeige-Name">
                        <input type="text" id="staff-discord-in" placeholder="Discord ID">
                        <select id="staff-title-in">
                            <option value="NETWORK OWNER">Network Owner</option>
                            <option value="CO OWNER">Co Owner</option>
                            <option value="NETWORK OVERSEER">Network Overseer</option>
                            <option value="MANAGER">Manager</option>
                            <option value="DEVELOPER">Developer</option>
                            <option value="ADMINISTRATOR">Administrator</option>
                            <option value="TESTER">Tester</option>
                        </select>
                        <button class="btn btn-cyan" style="border-color:#22c55e;color:#22c55e;" onclick="addStaff()">Staff Hinzufügen</button>
                    </div>
                    <div id="admin-staff-delete-list" style="max-height:150px;overflow-y:auto;margin-top:10px;border-top:1px solid var(--border-color);padding-top:10px;"></div>
                </div>

// ═══════════════════════════════════════════════════════
//  PARTIKEL HINTERGRUND
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resizeCanvas() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
const COLORS = ['#00bfff', '#a855f7', '#ff7b1a', '#38bdf8', '#ffffff'];
const particles = [];
for (let i = 0; i < 130; i++) {
    particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 1.8 + 0.3,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: Math.random() * 0.45 + 0.08
    });
}
function animParticles() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.fill();
    });
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y; const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 100) {
                ctx.beginPath(); ctx.strokeStyle = '#00bfff'; ctx.globalAlpha = (1 - d / 100) * 0.07; ctx.lineWidth = 0.5;
                ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
            }
        }
    }
    ctx.globalAlpha = 1; requestAnimationFrame(animParticles);
}
animParticles();

// ═══════════════════════════════════════════════════════

const modeIcons = {
    sword: 'https://i.imgur.com/f4TGbi9.png', cpvp: 'https://i.imgur.com/rXpkFYb.png',
    axe: 'https://i.imgur.com/yDimAH6.png', smp: 'https://i.imgur.com/XBvvJBS.png',

const pointValues = { 
    "HT1": 60, "LT1": 45, 
    "HT2": 30, "LT2": 20, 
    "HT3": 10, "LT3": 6,

};

let players = [];
let staffList = [];
let currentView = 'rankings';
let currentMode = 'overall';
let searchQuery = '';
let isAdminLoggedIn = false;
let loggedInUser = '';

function calculateOverallPoints(playerRanks) {
    let total = 0;
    if (!playerRanks) return total;
    Object.values(playerRanks).forEach(tier => {
        if (pointValues[tier]) {
            total += pointValues[tier];
        }
    });
    return total;
}

// Modals Open/Close mit Animationen
function openModal(id) {

}

function closeModal(id) {

// ═══════════════════════════════════════════════════════
//  REALTIME CLOUD INTERACTION
// ═══════════════════════════════════════════════════════
db.collection("players").onSnapshot((snapshot) => {
    players = [];
    snapshot.forEach((doc) => {
        players.push({ name: doc.id, ranks: doc.data().ranks || {} });
    });
    render();
    if(isAdminLoggedIn) updateAdminLists();
});

db.collection("staff").onSnapshot((snapshot) => {
    staffList = [];
    snapshot.forEach((doc) => {
        staffList.push({ id: doc.id, ...doc.data() });
    });
    render();
    if(isAdminLoggedIn) updateAdminLists();
});

function addOrUpdatePlayer() {
    const name = document.getElementById('new-player-name').value.trim();
    const mode = document.getElementById('new-player-mode').value;
    const tier = document.getElementById('new-player-tier').value;
    if(!name) return;

    let existing = players.find(p => p.name.toLowerCase() === name.toLowerCase());
    let updatedRanks = existing ? { ...existing.ranks } : {};
    updatedRanks[mode] = tier;

    db.collection("players").doc(name).set({ ranks: updatedRanks })
    .then(() => {
        document.getElementById('new-player-name').value = '';
        showSaveStatus();
    });
}

function deletePlayerMode(name, mode) {
    let existing = players.find(p => p.name.toLowerCase() === name.toLowerCase());
    if (!existing) return;
    
    let updatedRanks = { ...existing.ranks };
    delete updatedRanks[mode];
    
    if (Object.keys(updatedRanks).length === 0) {
        db.collection("players").doc(name).delete().then(() => showSaveStatus());
    } else {
        db.collection("players").doc(name).set({ ranks: updatedRanks }).then(() => showSaveStatus());
    }
}

function addStaff() {
    const name = document.getElementById('staff-name-in').value.trim();
    const discord = document.getElementById('staff-discord-in').value.trim();
    const title = document.getElementById('staff-title-in').value;
    if(!name) return;

    db.collection("staff").add({ name, discord, title })
    .then(() => {
        document.getElementById('staff-name-in').value = '';
        document.getElementById('staff-discord-in').value = '';
        showSaveStatus();
    });
}

function deleteStaff(id) {
    db.collection("staff").doc(id).delete().then(() => showSaveStatus());

function changeMainView(view) {
    currentView = view;

function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`mode-${mode}`).classList.add('active');
    render();

function handleSearch() {
    searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
    if(searchQuery === 'login') {
        openModal('login-modal');
        document.getElementById('search-input').value = '';
        searchQuery = '';
    }
    render();

function showPlayerProfile(name) {
    let p = players.find(pl => pl.name.toLowerCase() === name.toLowerCase());
    if(!p) return;

    document.getElementById('p-modal-name').innerText = p.name;
    document.getElementById('p-modal-avatar').src = `https://minotar.net/armor/bust/${p.name}/100.png`;
    document.getElementById('p-modal-points').innerText = calculateOverallPoints(p.ranks) + " PTS";

    let gridHtml = "";
    Object.keys(modeIcons).forEach(m => {
        let t = p.ranks[m] || "NONE";
        let styleCls = tierStyleMapping[t] || "border-t5";
        gridHtml += `<div class="profile-mode-card">
            <img class="profile-mode-img" src="${modeIcons[m]}">
            <div class="profile-mode-name">${m}</div>
            <div class="profile-mode-tier ${styleCls.replace('border-', '')}">${t}</div>
        </div>`;
    });
    document.getElementById('p-modal-grid').innerHTML = gridHtml;
    
    let sortedList = [...players].sort((a,b) => calculateOverallPoints(b.ranks) - calculateOverallPoints(a.ranks));
    let rankNum = sortedList.findIndex(pl => pl.name.toLowerCase() === name.toLowerCase()) + 1;
    document.getElementById('p-modal-rank-num').innerText = `Global Network Rank: #${rankNum}`;

    openModal('profile-modal');
}

function render() {
    const area = document.getElementById('content-area');
    
    if(currentView === 'staff') {
        let html = `<div class="staff-grid">`;
        staffList.forEach(s => {
            let badgeClass = "badge-tester";
            let title = s.title.toLowerCase();
            if(title.includes('owner')) badgeClass = "badge-owner";
            else if(title.includes('coowner') || title.includes('co owner')) badgeClass = "badge-coowner";
            else if(title.includes('overseer')) badgeClass = "badge-overseer";
            else if(title.includes('manager')) badgeClass = "badge-manager";
            else if(title.includes('developer') || title.includes('dev')) badgeClass = "badge-dev";
            else if(title.includes('admin')) badgeClass = "badge-admin";

            html += `<div class="staff-card">
                <img class="staff-img" src="https://minotar.net/avatar/${s.name}/44.png">
                <div class="staff-info">
                    <div class="staff-name">${s.name}</div>
                    <div class="staff-badge ${badgeClass}">${s.title}</div>
                </div>
            </div>`;
        });
        html += `</div>`;
        area.innerHTML = html;
        setTimeout(setupCursorHovers, 50);
        return;
    }

    // FILTER PLAYERS FOR SEARCH
    let filtered = players.filter(p => p.name.toLowerCase().includes(searchQuery));

    if(currentMode === 'overall') {
        // LIST VIEW (OVERALL LEADERBOARD)
        filtered.sort((a,b) => calculateOverallPoints(b.ranks) - calculateOverallPoints(a.ranks));
        
        let html = `<table class="leaderboard-table">
            <thead>
                <tr>
                    <th style="width: 70px;">Rank</th>
                    <th>Player</th>
                    <th>Tier Ranks</th>
                    <th style="text-align: right; width: 150px;">Points</th>
                </tr>
            </thead>
            <tbody>`;
        
        filtered.forEach((p, index) => {
            let pts = calculateOverallPoints(p.ranks);
            let rankCls = (index === 0) ? "rank-1" : (index === 1) ? "rank-2" : (index === 2) ? "rank-3" : "";
            
            // Custom Name Tags einbauen
            let adminTag = "";
            if (p.name.toLowerCase() === "l4lyx") {
                adminTag = `<span class="name-tag tag-l4lyx">[Admin]</span>`;
            } else if (p.name.toLowerCase() === "willi") {
                adminTag = `<span class="name-tag tag-willi">[Owner]</span>`;
            }

            let badgesHtml = "";
            Object.keys(p.ranks).forEach(m => {
                let tier = p.ranks[m];
                let borderCls = tierStyleMapping[tier] || "border-t5";
                badgesHtml += `<div class="tier-badge-container">
                    <div class="icon-wrapper ${borderCls}"><img class="mode-logo-img" src="${modeIcons[m]}"></div>
                    <div class="tier-text">${tier}</div>
                </div>`;
            });

            html += `<tr onclick="showPlayerProfile('${p.name}')" style="cursor:pointer;">
                <td><span class="rank-number ${rankCls}">#${index + 1}</span></td>
                <td>
                    <div class="username">
                        <img src="https://minotar.net/avatar/${p.name}/22.png" style="image-rendering:pixelated;border-radius:2px;">
                        ${p.name} ${adminTag}
                    </div>
                </td>
                <td><div class="badge-list">${badgesHtml || '<span style="color:var(--text-secondary);font-size:12px;">Keine Tiers eingetragen</span>'}</div></td>
                <td style="text-align: right; font-weight: 800; color: var(--accent-cyan); font-size:15px;">${pts} PTS</td>
            </tr>`;
        });
        
        html += `</tbody></table>`;
        area.innerHTML = html;

    } else {
        // COLUMNS VIEW FOR SPECIFIC GAMEMODES
        const tiers = ["HT1", "LT1", "HT2", "LT2", "HT3", "LT3", "HT4", "LT4", "HT5", "LT5"];
        const grouped = { T1:[], T2:[], T3:[], T4:[], T5:[] };

        filtered.forEach(p => {
            let t = p.ranks[currentMode];
            if(t) {
                if(t.includes("1")) grouped.T1.push({ name: p.name, tier: t });
                else if(t.includes("2")) grouped.T2.push({ name: p.name, tier: t });
                else if(t.includes("3")) grouped.T3.push({ name: p.name, tier: t });
                else if(t.includes("4")) grouped.T4.push({ name: p.name, tier: t });
                else if(t.includes("5")) grouped.T5.push({ name: p.name, tier: t });
            }
        });

        // Sort inside columns: High Tier first
        Object.keys(grouped).forEach(k => {
            grouped[k].sort((a,b) => b.tier.localeCompare(a.tier));
        });

        let headers = `<div class="gamemode-headers-row">
            <div class="gamemode-header-tab gh-t1">Tier 1</div>
            <div class="gamemode-header-tab gh-t2">Tier 2</div>
            <div class="gamemode-header-tab gh-t3">Tier 3</div>
            <div class="gamemode-header-tab gh-t4">Tier 4</div>
            <div class="gamemode-header-tab gh-t5">Tier 5</div>
        </div>`;

        let html = `<div class="tier-columns">`;
        ["T1","T2","T3","T4","T5"].forEach(tKey => {
            html += `<div class="tier-column"><div class="tier-list-content">`;
            
            if(grouped[tKey].length === 0) {
                html += `<span style="color:var(--text-secondary);text-align:center;font-size:12px;margin-top:20px;">Keine</span>`;
            } else {
                grouped[tKey].forEach(item => {
                    let subStyle = item.tier.startsWith("HT") ? "color:#fff;font-weight:800;" : "color:var(--text-secondary);";
                    let badgeColorClass = tierStyleMapping[item.tier] || "border-t5";
                    
                    html += `<div class="tier-user-card" onclick="showPlayerProfile('${item.name}')">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <img class="avatar" src="https://minotar.net/avatar/${item.name}/32.png">
                            <span style="font-size:13px;font-weight:700;">${item.name}</span>
                        </div>
                        <span style="font-size:11px; font-weight:900; ${subStyle}" class="${badgeColorClass.replace('border-', '')}">${item.tier}</span>
                    </div>`;
                });
            }
            html += `</div></div>`;
        });
        html += `</div>`;
        
        area.innerHTML = headers + html;
    }
    setTimeout(setupCursorHovers, 50);
}
</script>
</body>
</html>
