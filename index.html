<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadCf - Tiers & Rankings</title>
    <style>
        :root {
            --bg-dark: #050811;
            --panel-bg: rgba(11, 17, 30, 0.75);
            --card-bg: #0e1726;
            --border-color: #17253b;
            --text-main: #f0f6fc;
            --text-secondary: #62758d;
            --accent-cyan: #00bfff;
            --accent-purple: #a855f7;
            --neon-orange: #ff7b1a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Particle Background System */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 191, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
        }
        .particles::before, .particles::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(rgba(0, 191, 255, 0.4) 1px, transparent 1px),
                radial-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 550px 550px, 400px 400px;
            background-position: 0 0, 150px 250px;
            animation: particleDrive 120s linear infinite;
        }
        .particles::after {
            background-size: 300px 300px;
            background-position: 80px 120px;
            animation: particleDrive 80s linear infinite reverse;
            opacity: 0.7;
        }

        .app-wrapper {
            position: relative;
            z-index: 1;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(11, 17, 30, 0.85);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .brand-logo { font-size: 22px; font-weight: 900; letter-spacing: 1.5px; cursor: pointer; color: #ffffff; text-shadow: 0 0 10px rgba(0, 191, 255, 0.3); }
        .brand-logo span { color: var(--accent-cyan); }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 0.5px; transition: color 0.3s ease, text-shadow 0.3s ease; }
        .nav-link.active, .nav-link:hover { color: var(--accent-cyan); text-shadow: 0 0 8px rgba(0,191,255,0.5); }
        .nav-right { display: flex; align-items: center; gap: 15px; }

        /* Sub-Nav Tabs */
        .sub-nav { display: flex; justify-content: center; gap: 25px; background-color: rgba(6, 11, 20, 0.7); padding: 16px; border-bottom: 1px solid var(--border-color); backdrop-filter: blur(10px); }
        .mode-btn { background: none; border: none; color: var(--text-secondary); font-weight: 700; font-size: 13px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; padding: 4px 2px; position: relative; transition: color 0.2s; }
        .mode-btn:hover { color: var(--text-main); }
        .mode-btn.active { color: var(--accent-cyan); }
        .mode-btn.active::after { content: ''; position: absolute; bottom: -18px; left: 0; width: 100%; height: 3px; background-color: var(--accent-cyan); box-shadow: 0 0 12px var(--accent-cyan); border-radius: 2px; transition: all 0.3s ease; }

        .main-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }

        /* Buttons & Search */
        .btn { background-color: #0e1726; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 6px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .btn:hover { transform: translateY(-2px); background: #132035; border-color: var(--text-secondary); }
        .btn-cyan { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .btn-cyan:hover { background: rgba(0, 191, 255, 0.15); box-shadow: 0 0 15px rgba(0, 191, 255, 0.3); border-color: var(--accent-cyan); }
        .btn-purple { border-color: var(--accent-purple); color: var(--accent-purple); }
        .btn-purple:hover { background: rgba(166, 85, 247, 0.15); box-shadow: 0 0 15px rgba(166, 85, 247, 0.3); }
        .btn-danger { border-color: #ff2a74; color: #ff2a74; }
        .search-bar { background-color: #060913; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 14px; border-radius: 6px; width: 180px; font-size: 13px; transition: all 0.3s ease; }
        .search-bar:focus { outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0,191,255,0.2); width: 220px; }

        /* Leaderboard Table Animiert */
        .leaderboard-table { width: 100%; border-collapse: collapse; background-color: rgba(8, 13, 26, 0.85); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; margin-top: 20px; backdrop-filter: blur(8px); animation: superEntrance 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .leaderboard-table th { background-color: rgba(23, 37, 59, 0.5); padding: 16px 20px; text-align: left; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); letter-spacing: 0.5px; }
        .leaderboard-table td { padding: 14px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; cursor: pointer; transition: background-color 0.2s ease; }
        .leaderboard-table tr { transition: transform 0.2s ease, background-color 0.2s ease; }
        .leaderboard-table tr:hover { background-color: rgba(23, 37, 59, 0.4); transform: scale(1.003); }

        .rank-number { font-weight: 900; font-size: 16px; color: var(--text-secondary); }
        .rank-1 { color: #ffaa00; text-shadow: 0 0 8px rgba(255,170,0,0.3); } 
        .rank-2 { color: #cbd5e1; text-shadow: 0 0 8px rgba(203,213,225,0.3); } 
        .rank-3 { color: #b45309; text-shadow: 0 0 8px rgba(180,83,9,0.3); }
        .username { font-weight: 700; color: #ffffff; transition: color 0.2s; }
        .leaderboard-table tr:hover .username { color: var(--accent-cyan); }

        /* Badges & Rahmen */
        .badge-list { display: flex; gap: 12px; }
        .tier-badge-container { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 44px; transition: transform 0.2s; }
        .tier-badge-container:hover { transform: translateY(-3px); }
        .icon-wrapper { width: 36px; height: 36px; border-radius: 8px; background-color: #0e1726; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 8px rgba(0,0,0,0.6); transition: box-shadow 0.2s; }
        .mode-logo-img { width: 24px; height: 24px; object-fit: contain; image-rendering: pixelated; }
        
        .border-ht { border: 1.5px solid #ff7b1a; box-shadow: 0 0 8px rgba(249, 115, 22, 0.25); }
        .border-line-ht { color: #ff7b1a; font-weight: 800; font-size: 11px; }
        .border-lt { border: 1.5px solid #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.25); }
        .border-line-lt { color: #38bdf8; font-weight: 800; font-size: 11px; }

        /* Tiers Grid */
        .tier-columns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 20px; animation: superEntrance 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .tier-column { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; backdrop-filter: blur(8px); }
        .tier-header { padding: 15px; text-align: center; font-weight: 800; font-size: 13px; border-bottom: 1px solid var(--border-color); background: rgba(23, 37, 59, 0.4); }
        .t1-h { color: #ffaa00; } .t2-h { color: #cbd5e1; } .t3-h { color: #ff7b1a; } .t4-h { color: #38bdf8; } .t5-h { color: #94a3b8; }
        .tier-list-content { padding: 10px; min-height: 450px; display: flex; flex-direction: column; gap: 8px; }
        
        .tier-user-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s ease; }
        .tier-user-card:hover { transform: translateX(2px); border-color: var(--accent-cyan); background-color: #121d30; }
        .avatar { width: 32px; height: 32px; border-radius: 6px; image-rendering: pixelated; transition: transform 0.2s; }
        .tier-user-card:hover .avatar { transform: scale(1.1); }

        /* Premium Modals Design */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 5, 10, 0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 2000; animation: fadeInModal 0.25s linear; }
        
        /* Rank Points Panel */
        .points-modal-box { background-color: #080d19; border: 1.5px solid #1a2a42; border-radius: 20px; padding: 30px; width: 460px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6); animation: modalBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .points-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
        .points-row-box { background-color: #0b1220; border: 1px solid #16243d; border-radius: 10px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
        .points-row-box:hover { border-color: #243b61; }
        .points-value-badge { background-color: #070b14; border: 1px solid #142036; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; color: #6c7f99; }

        /* MINI PROFILE MODAL (image_b70736.png Style) */
        .profile-card {
            background-color: #060b13; border: 1.5px solid #111e33; border-radius: 24px; width: 440px; padding: 35px; position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 30px rgba(0,191,255,0.05);
            animation: modalBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            display: flex; flex-direction: column; align-items: center;
        }
        .profile-avatar-wrapper { width: 84px; height: 84px; border-radius: 18px; border: 2px solid #1c2e4a; overflow: hidden; margin-bottom: 16px; background: #0b111e; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .profile-avatar { width: 100%; height: 100%; image-rendering: pixelated; }
        .profile-name { font-size: 24px; font-weight: 800; color: #ffffff; margin: 0 0 15px 0; display: flex; align-items: center; gap: 6px; }
        .profile-stats-box { background: #09101d; border: 1px solid #152640; border-radius: 14px; padding: 10px 35px; text-align: center; margin-bottom: 25px; }
        .profile-stats-label { font-size: 10px; text-transform: uppercase; color: #435875; font-weight: 800; letter-spacing: 1px; margin-bottom: 2px; }
        .profile-stats-value { font-size: 20px; font-weight: 800; color: var(--accent-cyan); text-shadow: 0 0 10px rgba(0,191,255,0.3); }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; border-top: 1px solid #13223a; padding-top: 25px; margin-bottom: 15px; }
        .profile-mode-card { background: #09101d; border: 1px solid #132238; border-radius: 14px; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: transform 0.2s; }
        .profile-mode-card:hover { transform: translateY(-2px); }
        .profile-mode-img { width: 26px; height: 26px; image-rendering: pixelated; object-fit: contain; }
        .profile-mode-name { font-size: 9px; text-transform: uppercase; color: #4b5f7a; font-weight: 700; }
        .profile-mode-tier { font-size: 15px; font-weight: 800; }
        .profile-rank-bottom { font-size: 36px; font-weight: 900; color: rgba(255,255,255,0.15); margin-top: 15px; letter-spacing: -1px; }

        /* STAFF GRID LOOK */
        .staff-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 20px; animation: superEntrance 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .staff-card { background-color: rgba(6, 11, 20, 0.85); border: 1.5px solid #121d30; border-radius: 16px; padding: 18px; display: flex; align-items: center; gap: 14px; backdrop-filter: blur(8px); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .staff-card:hover { border-color: #243c61; transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.5); }
        .staff-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #162235; border: 2px solid #1f304a; transition: transform 0.3s ease; }
        .staff-card:hover .staff-img { transform: rotate(6px) scale(1.05); }
        .staff-info { display: flex; flex-direction: column; gap: 4px; }
        .staff-name { font-weight: 800; color: #ffffff; font-size: 14px; }
        
        .staff-badge { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; text-transform: uppercase; letter-spacing: 0.5px; width: fit-content; }
        .badge-owner { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-coowner { background: rgba(249, 115, 22, 0.15); color: #f97316; border: 1px solid rgba(249, 115, 22, 0.3); }
        .badge-overseer { background: rgba(168, 85, 247, 0.15); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); }
        .badge-manager { background: rgba(234, 179, 8, 0.15); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3); }
        .badge-dev { background: rgba(6, 182, 212, 0.15); color: #06b6d4; border: 1px solid rgba(6, 182, 212, 0.3); }
        .badge-admin { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .badge-tester { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.3); }

        /* Admin Dashboard Layout */
        .admin-panel { background-color: var(--panel-bg); border: 1px solid var(--accent-purple); border-radius: 12px; padding: 20px; margin-bottom: 25px; backdrop-filter: blur(10px); animation: superEntrance 0.4s ease; }
        .admin-sections { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 15px; }
        .admin-box-sub { background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; }
        .admin-form { display: flex; flex-direction: column; gap: 12px; }
        .admin-form input, .admin-form select { background-color: #060913; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; }
        .admin-player-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 6px; font-size:12px; }

        /* Keyframe Animations */
        @keyframes particleDrive { from { background-position: 0 0, 150px 250px; } to { background-position: 550px 1100px, 950px 1050px; } }
        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }
        @keyframes modalBounce { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes superEntrance { from { opacity: 0; transform: translateY(15px); filter: blur(4px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
    </style>
</head>
<body>

    <!-- Die Partikel im Hintergrund -->
    <div class="particles"></div>

    <div class="app-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <div class="brand-logo" onclick="changeMainView('rankings')">LOAD<span>TIERS</span></div>
                <div class="nav-links">
                    <div class="nav-link active" id="nav-rankings" onclick="changeMainView('rankings')">RANKINGS</div>
                    <div class="nav-link" id="nav-staff" onclick="changeMainView('staff')">STAFF</div>
                    <div class="nav-link">DISCORD</div>
                </div>
            </div>
            <div class="nav-right">
                <div id="admin-status-text" style="font-size: 12px; color: var(--text-secondary)">Status: Guest</div>
                <button class="btn btn-cyan" onclick="openModal('points-modal')">⚡ Rank Points</button>
                <input type="text" class="search-bar" id="search-input" placeholder="Search player..." oninput="handleSearch()">
            </div>
        </nav>

        <div class="sub-nav" id="modes-sub-nav">
            <button class="mode-btn active" id="mode-overall" onclick="switchMode('overall')">Overall</button>
            <button class="mode-btn" id="mode-sword" onclick="switchMode('sword')">Sword</button>
            <button class="mode-btn" id="mode-cpvp" onclick="switchMode('cpvp')">CPvP</button>
            <button class="mode-btn" id="mode-axe" onclick="switchMode('axe')">Axe</button>
            <button class="mode-btn" id="mode-smp" onclick="switchMode('smp')">SMP</button>
            <button class="mode-btn" id="mode-diapot" onclick="switchMode('diapot')">Diapot</button>
            <button class="mode-btn" id="mode-mace" onclick="switchMode('mace')">Mace</button>
            <button class="mode-btn" id="mode-uhc" onclick="switchMode('uhc')">UHC</button>
            <button class="mode-btn" id="mode-nethpot" onclick="switchMode('nethpot')">Nethpot</button>
        </div>

        <div class="main-container">
            <!-- Admin Dashboard -->
            <div id="admin-panel" class="admin-panel" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                    <h3 style="margin:0; color: var(--accent-purple);">Admin Dashboard</h3>
                    <button class="btn btn-danger" onclick="logoutAdmin()" style="padding: 5px 12px;">Logout</button>
                </div>
                <div class="admin-sections">
                    <div class="admin-box-sub">
                        <h4 style="margin-top:0; color: var(--accent-cyan);">Spieler verwalten</h4>
                        <div class="admin-form">
                            <input type="text" id="new-player-name" placeholder="Minecraft Name">
                            <select id="new-player-mode">
                                <option value="sword">Sword</option><option value="cpvp">CPvP</option><option value="axe">Axe</option><option value="smp">SMP</option><option value="diapot">Diapot</option><option value="mace">Mace</option><option value="uhc">UHC</option><option value="nethpot">Nethpot</option>
                            </select>
                            <select id="new-player-tier">
                                <option value="HT1">HT1</option><option value="LT1">LT1</option><option value="HT2">HT2</option><option value="LT2">LT2</option><option value="HT3">HT3</option><option value="LT3">LT3</option><option value="HT4">HT4</option><option value="LT4">LT4</option><option value="HT5">HT5</option><option value="LT5">LT5</option>
                            </select>
                            <button class="btn btn-cyan" onclick="addOrUpdatePlayer()">Speichern</button>
                        </div>
                        <div id="admin-delete-list" style="max-height: 110px; overflow-y: auto; margin-top:10px;"></div>
                    </div>
                    <div class="admin-box-sub">
                        <h4 style="margin-top:0; color: #22c55e;">Staff verwalten</h4>
                        <div class="admin-form">
                            <input type="text" id="staff-name-in" placeholder="Anzeige-Name">
                            <input type="text" id="staff-discord-in" placeholder="Discord ID">
                            <select id="staff-title-in">
                                <option value="NETWORK OWNER">Network Owner</option>
                                <option value="CO OWNER">Co Owner</option>
                                <option value="NETWORK OVERSEER">Network Overseer</option>
                                <option value="MANAGER">Manager</option>
                                <option value="DEVELOPER">Developer</option>
                                <option value="ADMINISTRATOR">Administrator</option>
                                <option value="TESTER">Tester</option>
                            </select>
                            <button class="btn btn-cyan" style="border-color:#22c55e; color:#22c55e;" onclick="addStaff()">Staff Hinzufügen</button>
                        </div>
                        <div id="admin-staff-delete-list" style="max-height: 110px; overflow-y: auto; margin-top:10px;"></div>
                    </div>
                    <div class="admin-box-sub" id="l4lyx-only-section" style="display: none;">
                        <h4 style="margin-top:0; color: var(--accent-purple);">👑 Neue Admins</h4>
                        <div class="admin-form">
                            <input type="text" id="new-admin-user" placeholder="Admin Username">
                            <input type="password" id="new-admin-pass" placeholder="Passwort">
                            <button class="btn btn-purple" onclick="createNewAdminAccount()">Erstellen</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div id="content-area"></div>
        </div>
    </div>

    <!-- PROFILE MODAL -->
    <div id="profile-modal" class="modal-overlay" onclick="closeModal('profile-modal')">
        <div class="profile-card" onclick="event.stopPropagation()">
            <div class="profile-avatar-wrapper">
                <img id="p-modal-avatar" class="profile-avatar" src="">
            </div>
            <h2 class="profile-name" id="p-modal-name"></h2>
            <div class="profile-stats-box">
                <div class="profile-stats-label">Overall Balance</div>
                <div class="profile-stats-value" id="p-modal-points"></div>
            </div>
            <div class="profile-grid" id="p-modal-grid"></div>
            <div class="profile-rank-bottom" id="p-modal-rank-num"></div>
        </div>
    </div>

    <!-- RANK POINTS MODAL -->
    <div id="points-modal" class="modal-overlay" onclick="closeModal('points-modal')">
        <div class="points-modal-box" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:25px;">
                <span style="color:#ffaa00; font-size:18px;">⚡</span>
                <h2 style="margin:0; font-size:20px; font-weight:800; text-transform:uppercase;">Rank Points</h2>
            </div>
            <div class="points-grid">
                <div class="points-row-box"><span style="color:#ff7b1a; font-weight:800;">HT1</span><div class="points-value-badge">60 PTS</div></div>
                <div class="points-row-box"><span style="color:#38bdf8; font-weight:800;">LT1</span><div class="points-value-badge">45 PTS</div></div>
                <div class="points-row-box"><span style="color:#ff7b1a; font-weight:800;">HT2</span><div class="points-value-badge">30 PTS</div></div>
                <div class="points-row-box"><span style="color:#38bdf8; font-weight:800;">LT2</span><div class="points-value-badge">20 PTS</div></div>
                <div class="points-row-box"><span style="color:#ff7b1a; font-weight:800;">HT3</span><div class="points-value-badge">10 PTS</div></div>
                <div class="points-row-box"><span style="color:#38bdf8; font-weight:800;">LT3</span><div class="points-value-badge">6 PTS</div></div>
                <div class="points-row-box"><span style="color:#ff7b1a; font-weight:800;">HT4</span><div class="points-value-badge">4 PTS</div></div>
                <div class="points-row-box"><span style="color:#38bdf8; font-weight:800;">LT4</span><div class="points-value-badge">3 PTS</div></div>
                <div class="points-row-box"><span style="color:#ff7b1a; font-weight:800;">HT5</span><div class="points-value-badge">2 PTS</div></div>
                <div class="points-row-box"><span style="color:#38bdf8; font-weight:800;">LT5</span><div class="points-value-badge">1 PTS</div></div>
            </div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div style="background-color: #0b111e; border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; width: 360px; box-shadow:0 20px 40px rgba(0,0,0,0.5);" onclick="event.stopPropagation()">
            <h3 style="text-align:center; margin-top:0; color:var(--accent-purple);">🔑 Admin Login</h3>
            <input type="text" id="login-user" placeholder="Username" style="width:100%; padding:11px; margin-bottom:12px; background:#060913; border:1px solid var(--border-color); color:white; border-radius:6px; box-sizing:border-box;">
            <input type="password" id="login-pass" placeholder="Passwort" style="width:100%; padding:11px; margin-bottom:18px; background:#060913; border:1px solid var(--border-color); color:white; border-radius:6px; box-sizing:border-box;">
            <button class="btn btn-purple" style="width:100%; justify-content:center;" onclick="submitLogin()">Einloggen</button>
        </div>
    </div>

    <script>
        const modeIcons = {
            sword: "https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png",
            cpvp: "https://minecraft.wiki/images/End_Crystal_JE2_BE2.png",
            axe: "https://minecraft.wiki/images/Diamond_Axe_JE3_BE3.png",
            smp: "https://minecraft.wiki/images/Oak_Log_%28UD%29_JE5_BE3.png",
            diapot: "https://minecraft.wiki/images/Splash_Potion_of_Healing_JE2_BE2.png",
            mace: "https://minecraft.wiki/images/Mace_JE1_BE1.png",
            uhc: "https://minecraft.wiki/images/Golden_Apple_JE2_BE2.png",
            nethpot: "https://minecraft.wiki/images/Netherite_Chestplate_JE3_BE2.png"
        };

        const pointValues = { 'HT1': 60, 'LT1': 45, 'HT2': 30, 'LT2': 20, 'HT3': 10, 'LT3': 6, 'HT4': 4, 'LT4': 3, 'HT5': 2, 'LT5': 1 };

        const defaultStaff = [
            { name: "TheRealJero @for help", discord: "111111111111111111", title: "NETWORK OWNER" },
            { name: "Lucky @for timeout", discord: "222222222222222222", title: "NETWORK OWNER" },
            { name: "Sebastian @ for Tech Supp...", discord: "333333333333333333", title: "CO OWNER" },
            { name: "FleXy @ For alL", discord: "444444444444444444", title: "CO OWNER" }
        ];

        // Deine exakte, vollständige Spielerliste aus dem Backup
        const defaultPlayers = [
            { name: "Ayko", ranks: { sword: "HT1", cpvp: "LT1", axe: "HT2" } },
            { name: "vance", ranks: { sword: "LT1", cpvp: "HT2", axe: "LT2" } },
            { name: "frezzo", ranks: { sword: "HT2", cpvp: "LT2", smp: "HT3" } },
            { name: "zLuy", ranks: { sword: "LT2", cpvp: "HT3", smp: "LT3" } },
            { name: "frame", ranks: { sword: "HT3", cpvp: "LT3", diapot: "HT4" } },
            { name: "simple", ranks: { sword: "LT3", cpvp: "HT4", diapot: "LT4" } },
            { name: "fixed", ranks: { sword: "HT4", cpvp: "LT4", mace: "HT5" } },
            { name: "slow", ranks: { sword: "LT4", cpvp: "HT5", mace: "LT5" } },
            { name: "raw", ranks: { sword: "HT5", uhc: "HT1", nethpot: "LT1" } },
            { name: "nils", ranks: { sword: "LT5", uhc: "LT1", nethpot: "HT2" } },
            { name: "unlegit", ranks: { cpvp: "HT1", uhc: "LT2", axe: "HT3" } },
            { name: "unreall", ranks: { cpvp: "LT1", uhc: "HT3", axe: "LT3" } },
            { name: "pre", ranks: { cpvp: "HT2", smp: "LT3", diapot: "HT4" } },
            { name: "block", ranks: { cpvp: "LT2", smp: "HT4", diapot: "LT4" } },
            { name: "qute", ranks: { cpvp: "HT3", mace: "LT4", uhc: "HT5" } },
            { name: "zicx", ranks: { cpvp: "LT3", mace: "HT5", uhc: "LT5" } },
            { name: "fvct", ranks: { axe: "HT1", nethpot: "LT4", sword: "HT2" } },
            { name: "kili", ranks: { axe: "LT1", nethpot: "HT5", sword: "LT2" } },
            { name: "kian", ranks: { smp: "HT1", sword: "HT4", cpvp: "LT4" } },
            { name: "tian", ranks: { smp: "LT1", sword: "LT4", cpvp: "HT5" } },
            { name: "noname", ranks: { diapot: "HT1", axe: "HT5" } }
        ];

        let players = JSON.parse(localStorage.getItem('loadtiers_players')) || defaultPlayers;
        let staffList = JSON.parse(localStorage.getItem('loadtiers_staff')) || defaultStaff;
        let adminAccounts = JSON.parse(localStorage.getItem('loadtiers_admins')) || { "L4lyx": "Tini2013!" };
        
        let currentView = 'rankings'; 
        let currentMode = 'overall';
        let loggedInUser = null;

        function save() {
            localStorage.setItem('loadtiers_players', JSON.stringify(players));
            localStorage.setItem('loadtiers_staff', JSON.stringify(staffList));
            localStorage.setItem('loadtiers_admins', JSON.stringify(adminAccounts));
        }

        function calculateTotalPoints(player) {
            let total = 0;
            for (let mode in player.ranks) total += pointValues[player.ranks[mode]] || 0;
            return total;
        }

        function changeMainView(view) {
            currentView = view;
            document.getElementById('nav-rankings').classList.remove('active');
            document.getElementById('nav-staff').classList.remove('active');
            
            if(view === 'rankings') {
                document.getElementById('nav-rankings').classList.add('active');
                document.getElementById('modes-sub-nav').style.display = 'flex';
            } else {
                document.getElementById('nav-staff').classList.add('active');
                document.getElementById('modes-sub-nav').style.display = 'none';
            }
            render();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            render();
        }

        function render() {
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            if (currentView === 'rankings') {
                if (currentMode === 'overall') { renderLeaderboard(searchVal); } else { renderColumns(searchVal); }
            } else {
                renderStaff(searchVal);
            }
            if (loggedInUser) { renderAdminLists(); }
        }

        function renderLeaderboard(filter = "") {
            const contentArea = document.getElementById('content-area');
            let sorted = [...players].map(p => ({ ...p, totalPts: calculateTotalPoints(p) })).sort((a, b) => b.totalPts - a.totalPts);
            if (filter) sorted = sorted.filter(p => p.name.toLowerCase().includes(filter));

            let html = `<table class="leaderboard-table"><thead><tr><th>#</th><th>Player</th><th>Tiers</th><th style="text-align:right;">Pts</th></tr></thead><tbody>`;
            sorted.forEach((p, index) => {
                let rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
                let badgesHtml = '';
                for (let mode in p.ranks) {
                    let tier = p.ranks[mode]; if(!tier) continue;
                    let isHT = tier.startsWith('HT');
                    badgesHtml += `
                        <div class="tier-badge-container">
                            <div class="icon-wrapper ${isHT ? 'border-ht' : 'border-lt'}">
                                <img src="${modeIcons[mode] || modeIcons.sword}" class="mode-logo-img">
                            </div>
                            <span class="${isHT ? 'border-line-ht' : 'border-line-lt'}">${tier}</span>
                        </div>
                    `;
                }
                html += `
                    <tr onclick="openProfile('${p.name}', ${index + 1})">
                        <td class="rank-number ${rankClass}">#${index + 1}</td>
                        <td><div style="display:flex; align-items:center; gap:12px;"><img class="avatar" src="https://minotar.net/avatar/${p.name}/32"><span class="username">${p.name}</span></div></td>
                        <td><div class="badge-list">${badgesHtml}</div></td>
                        <td style="text-align:right; font-weight:900; color:var(--accent-cyan); font-size:16px;">${p.totalPts}</td>
                    </tr>
                `;
            });
            contentArea.innerHTML = html + `</tbody></table>`;
        }

        function openProfile(username, rankNumber) {
            let p = players.find(player => player.name === username);
            if(!p) return;

            document.getElementById('p-modal-avatar').src = `https://minotar.net/avatar/${p.name}/80`;
            document.getElementById('p-modal-name').innerHTML = `${p.name} ★`;
            document.getElementById('p-modal-points').innerText = `${calculateTotalPoints(p)} PTS`;
            document.getElementById('p-modal-rank-num').innerText = `#${rankNumber}`;

            let gridHtml = '';
            for(let mode in modeIcons) {
                let tier = p.ranks[mode] || '—';
                let isHT = tier.startsWith('HT');
                let borderStyle = tier !== '—' ? (isHT ? 'border: 1px solid #ff7b1a; box-shadow: 0 0 10px rgba(249,115,22,0.25);' : 'border: 1px solid #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.25);') : '';
                let colorStyle = tier !== '—' ? (isHT ? 'color:#ff7b1a;' : 'color:#38bdf8;') : 'color:#4b5f7a;';

                gridHtml += `
                    <div class="profile-mode-card" style="${borderStyle}">
                        <img src="${modeIcons[mode]}" class="profile-mode-img" style="${tier === '—' ? 'opacity:0.25;' : ''}">
                        <span class="profile-mode-name">${mode}</span>
                        <span class="profile-mode-tier" style="${colorStyle}">${tier}</span>
                    </div>
                `;
            }
            document.getElementById('p-modal-grid').innerHTML = gridHtml;
            openModal('profile-modal');
        }

        function renderColumns(filter = "") {
            const contentArea = document.getElementById('content-area');
            let html = `<div class="tier-columns">`;
            for (let i = 1; i <= 5; i++) {
                html += `<div class="tier-column"><div class="tier-header t${i}-h">TIER ${i}</div><div class="tier-list-content">`;
                players.filter(p => p.ranks[currentMode] && p.ranks[currentMode].includes(i.toString()) && p.name.toLowerCase().includes(filter)).forEach(p => {
                    let tier = p.ranks[currentMode];
                    html += `
                        <div class="tier-user-card">
                            <div style="display:flex; align-items:center; gap:8px;"><img class="avatar" src="https://minotar.net/avatar/${p.name}/32"><span style="font-weight:600; font-size:13px;">${p.name}</span></div>
                            <span style="color:${tier.startsWith('HT') ? '#ff7b1a':'#38bdf8'}; font-weight:800; font-size:11px;">${tier}</span>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            contentArea.innerHTML = html + `</div>`;
        }

        function renderStaff(filter = "") {
            const contentArea = document.getElementById('content-area');
            let list = [...staffList];
            if (filter) list = list.filter(s => s.name.toLowerCase().includes(filter));

            let html = `<div class="staff-grid">`;
            list.forEach(s => {
                let badgeClass = "badge-tester";
                let t = s.title.toUpperCase();
                if(t.includes("OWNER")) badgeClass = "badge-owner";
                else if(t.includes("CO")) badgeClass = "badge-coowner";
                else if(t.includes("OVERSEER")) badgeClass = "badge-overseer";
                else if(t.includes("MANAGER")) badgeClass = "badge-manager";
                else if(t.includes("DEV")) badgeClass = "badge-dev";
                else if(t.includes("ADMIN")) badgeClass = "badge-admin";

                let discordAvatarUrl = `https://cdn.discordapp.com/embed/avatars/0.png`; 
                if(s.discord && s.discord.length > 10) {
                    discordAvatarUrl = `https://images.discordapp.net/avatars/${s.discord}/a_0.png?size=64`;
                }

                html += `
                    <div class="staff-card">
                        <img class="staff-img" src="${discordAvatarUrl}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/1.png'">
                        <div class="staff-info">
                            <div class="staff-name">${s.name}</div>
                            <div style="font-size:11px; color:var(--text-secondary); margin-bottom:2px;">ID: ${s.discord}</div>
                            <div class="staff-badge ${badgeClass}">♦ ${s.title}</div>
                        </div>
                    </div>
                `;
            });
            contentArea.innerHTML = html + `</div>`;
        }

        function renderAdminLists() {
            const pList = document.getElementById('admin-delete-list'); pList.innerHTML = '';
            players.forEach(p => {
                let d = document.createElement('div'); d.className = 'admin-player-row';
                d.innerHTML = `<span>${p.name}</span><button class="btn btn-danger" style="padding:2px 6px;" onclick="deletePlayer('${p.name}')">X</button>`;
                pList.appendChild(d);
            });

            const sList = document.getElementById('admin-staff-delete-list'); sList.innerHTML = '';
            staffList.forEach(s => {
                let d = document.createElement('div'); d.className = 'admin-player-row';
                d.innerHTML = `<span>${s.name}</span><button class="btn btn-danger" style="padding:2px 6px;" onclick="deleteStaff('${s.name}')">X</button>`;
                sList.appendChild(d);
            });
        }

        function addStaff() {
            let name = document.getElementById('staff-name-in').value.trim();
            let dc = document.getElementById('staff-discord-in').value.trim();
            let title = document.getElementById('staff-title-in').value;
            if(!name || !dc) return;

            staffList.push({ name: name, discord: dc, title: title });
            save(); render();
            document.getElementById('staff-name-in').value = '';
            document.getElementById('staff-discord-in').value = '';
        }

        function deleteStaff(name) { staffList = staffList.filter(s => s.name !== name); save(); render(); }
        
        function addOrUpdatePlayer() {
            let name = document.getElementById('new-player-name').value.trim();
            let mode = document.getElementById('new-player-mode').value;
            let tier = document.getElementById('new-player-tier').value;
            if(!name) return;
            let ex = players.find(p => p.name.toLowerCase() === name.toLowerCase());
            if(ex) ex.ranks[mode] = tier; else { let n = { name: name, ranks: {} }; n.ranks[mode] = tier; players.push(n); }
            save(); render(); document.getElementById('new-player-name').value = '';
        }
        
        function deletePlayer(name) { players = players.filter(p => p.name !== name); save(); render(); }
        
        function handleSearch() { 
            let val = document.getElementById('search-input').value.trim(); 
            if(val.toLowerCase() === 'login') { 
                document.getElementById('search-input').value = ''; 
                openModal('login-modal'); 
            } else { 
                render(); 
            } 
        }
        
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function submitLogin() {
            let u = document.getElementById('login-user').value.trim();
            let p = document.getElementById('login-pass').value;
            if (adminAccounts[u] && adminAccounts[u] === p) {
                loggedInUser = u;
                document.getElementById('admin-status-text').innerText = `Status: ${u}`;
                document.getElementById('admin-panel').style.display = 'block';
                if(u === 'L4lyx') document.getElementById('l4lyx-only-section').style.display = 'block';
                closeModal('login-modal'); render();
            }
        }
        
        function logoutAdmin() { loggedInUser = null; document.getElementById('admin-panel').style.display = 'none'; document.getElementById('admin-status-text').innerText = "Status: Guest"; render(); }
        function createNewAdminAccount() { let u = document.getElementById('new-admin-user').value.trim(); let p = document.getElementById('new-admin-pass').value; if(!u || !p) return; adminAccounts[u] = p; save(); alert(`Admin ${u} erstellt!`); }

        render();
    </script>
</body>
</html>
