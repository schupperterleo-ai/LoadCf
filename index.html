<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadSpace | The Ultimate bio.link & guns.lol Clone</title>
    <style>
        /* --- DESIGN CONFIG & MATRIX RED THEME --- */
        :root {
            --bg-dark: #050202;
            --panel-bg: rgba(12, 3, 3, 0.85);
            --panel-border: rgba(255, 51, 51, 0.2);
            --neon-red: #ff3333;
            --neon-glow: rgba(255, 51, 51, 0.5);
            --text-main: #ffffff;
            --text-muted: #835252;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; cursor: none; }
        body, html { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- BACKGROUND & CURSOR --- */
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255, 51, 51, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 51, 51, 0.02) 1px, transparent 1px); background-size: 50px 50px; z-index: 1; pointer-events: none; }
        #main-cursor { width: 22px; height: 22px; border: 2px solid var(--neon-red); border-radius: 50%; position: fixed; transform: translate(-50%, -50%); pointer-events: none; z-index: 10000; box-shadow: 0 0 10px var(--neon-glow); }
        #main-cursor::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }
        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* --- VIEW 1: LANDING PAGE (STARTSEITE) --- */
        .landing-container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        .hero-title { font-size: 48px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
        .hero-title span { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }
        .hero-sub { color: var(--text-muted); font-size: 14px; font-weight: 600; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        
        .search-box { background: var(--panel-bg); border: 1px solid var(--panel-border); padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .url-input-row { display: flex; background: #000; border: 1px solid var(--panel-border); border-radius: 6px; padding: 10px; align-items: center; margin-bottom: 20px; }
        .url-prefix { color: var(--text-muted); font-weight: 700; font-size: 14px; margin-right: 5px; }
        .url-input-row input { background: transparent; border: none; color: #fff; font-size: 14px; font-weight: 700; width: 100%; }
        .url-input-row input:focus { outline: none; }
        
        .action-btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: 800; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; transition: all 0.2s; margin-bottom: 10px; }
        .btn-claim { background: var(--neon-red); color: #fff; box-shadow: 0 0 15px var(--neon-glow); }
        .btn-claim:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--neon-red); }
        .btn-login { background: #120505; border: 1px solid var(--panel-border); color: #fff; }

        /* --- VIEW 2: ECHTE PROFIL-SEITE (THE BIO PAGE) --- */
        #bio-view-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; display: none; background-size: cover; background-position: center; justify-content: center; align-items: center; }
        .bio-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4,2,2,0.5); backdrop-filter: blur(4px); z-index: 1; }
        
        /* Audio Unmute Overlay */
        .unmute-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,2,2,0.98); z-index: 100; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); }

        .bio-card { position: relative; z-index: 10; width: 100%; max-width: 400px; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 12px; padding: 35px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.9); }
        .bio-avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--neon-red); box-shadow: 0 0 15px var(--neon-glow); object-fit: cover; margin-bottom: 15px; }
        .bio-name { font-size: 26px; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 10px var(--neon-red); margin-bottom: 5px; }
        .bio-tagline { font-size: 12px; color: var(--text-muted); margin-bottom: 25px; font-weight: 600; }
        
        .bio-links-container { display: flex; flex-direction: column; gap: 12px; }
        .bio-link-button { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,51,51,0.15); padding: 14px; color: #fff; text-decoration: none; border-radius: 6px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
        .bio-link-button:hover { border-color: var(--neon-red); background: rgba(255,51,51,0.05); transform: translateY(-2px); }
        
        .edit-floating-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,51,51,0.1); border: 1px solid var(--neon-red); color: #fff; padding: 8px 15px; font-size: 10px; font-weight: 800; text-transform: uppercase; border-radius: 4px; z-index: 80; }

        /* --- VIEW 3: LIVE EDITOR PANEL --- */
        #editor-panel { position: fixed; top: 0; left: 0; width: 420px; height: 100%; background: #080202; border-right: 1px solid var(--panel-border); z-index: 200; display: none; padding: 30px; overflow-y: auto; }
        .editor-title { font-size: 20px; font-weight: 900; text-transform: uppercase; color: var(--neon-red); margin-bottom: 25px; }
        .input-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
        .input-group input, .input-group select { background: #000; border: 1px solid var(--panel-border); padding: 10px; color: #fff; border-radius: 4px; font-weight: 600; font-size: 13px; }
        .input-group input:focus { outline: none; border-color: var(--neon-red); }
        
        .link-builder-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div id="main-cursor"></div>

    <!-- ---------------- VIEW 1: STARTSEITE ---------------- -->
    <div class="landing-container" id="view-landing">
        <div class="hero-title">Load<span>Space</span></div>
        <div class="hero-sub">The Ultimate Link-In-Bio Network</div>

        <div class="search-box">
            <div class="url-input-row">
                <span class="url-prefix">load.space/</span>
                <input type="text" id="search-username" placeholder="wunschname">
            </div>
            <button class="action-btn btn-claim" onclick="lookupOrCreateProfile()">Claim / Visit Link</button>
        </div>
    </div>

    <!-- ---------------- VIEW 2: ECHTE BIO SEITE (GUNS.LOL LOOK) ---------------- -->
    <div id="bio-view-page">
        <button class="edit-floating-btn" id="editor-trigger" onclick="openEditor()">⚙ Edit Profile</button>
        <div class="bio-overlay"></div>
        <canvas id="particle-canvas"></canvas>
        <audio id="bio-audio" loop></audio>

        <!-- Unmute Click Wall -->
        <div class="unmute-overlay" id="click-unmute-wall" onclick="playBioMusic()">
            <button class="action-btn btn-claim" style="max-width: 200px;">Click to Enter</button>
        </div>

        <div class="bio-card">
            <img src="https://via.placeholder.com/150" alt="Avatar" class="bio-avatar" id="view-avatar">
            <div class="bio-name" id="view-name">NAME</div>
            <div class="bio-tagline" id="view-tagline">TAGLINE</div>
            
            <!-- Hier spawnen die Custom Links -->
            <div class="bio-links-container" id="view-links-holder"></div>
        </div>
    </div>

    <!-- ---------------- VIEW 3: LIVE EDITOR SIDEBAR ---------------- -->
    <div id="editor-panel">
        <div class="editor-title">⚡ Control Center</div>
        
        <div class="input-group">
            <label>Anzeige-Name</label>
            <input type="text" id="edit-name" oninput="liveRefresh()">
        </div>
        <div class="input-group">
            <label>Beschreibung / Bio</label>
            <input type="text" id="edit-tagline" oninput="liveRefresh()">
        </div>
        <div class="input-group">
            <label>Avatar Bild-URL</label>
            <input type="text" id="edit-avatar" oninput="liveRefresh()">
        </div>
        <div class="input-group">
            <label>Hintergrund-Banner-URL</label>
            <input type="text" id="edit-banner" oninput="liveRefresh()">
        </div>
        <div class="input-group">
            <label>Hintergrundmusik-URL (Direkt-Link .mp3)</label>
            <input type="text" id="edit-music" oninput="liveMusicRefresh()">
        </div>
        <div class="input-group">
            <label>Effekt-Partikel</label>
            <select id="edit-particles" onchange="liveParticleRefresh()">
                <option value="none">Keine</option>
                <option value="snow">Schnee-Flocken</option>
                <option value="matrix">Rote Matrix-Codes</option>
            </select>
        </div>

        <!-- CUSTOM LINK BUILDER SECTION (Nr. 1) -->
        <div class="input-group" style="margin-top: 25px;">
            <label style="color: var(--neon-red); margin-bottom: 10px;">🔗 Custom Links & Buttons</label>
            
            <div id="links-builder-area">
                <!-- Spawnt Reihen für Link-Namen + Link-URLs -->
            </div>
            <button class="action-btn btn-login" style="font-size: 10px; padding: 6px;" onclick="addNewLinkRow('', '')">+ Add Custom Link</button>
        </div>

        <div class="control-btns" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px;">
            <button class="action-btn btn-login" onclick="closeEditorAndExit()">Exit</button>
            <button class="action-btn btn-claim" onclick="saveData()">Save Changes</button>
        </div>
    </div>

    <!-- ---------------- APPLICATION JAVASCRIPT ENGINE ---------------- -->
    <script>
        // Fadenkreuz-Steuerung
        const cursor = document.getElementById('main-cursor');
        document.addEventListener('mousemove', (e) => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });

        let currentUsername = "";
        let profileData = {};

        // 1. LOGIN & LEITUNG ZUM SYSTEM
        function lookupOrCreateProfile() {
            const user = document.getElementById('search-username').value.trim().toLowerCase();
            if(!user) return alert("Bitte gib einen Namen ein!");

            currentUsername = user;
            let database = JSON.parse(localStorage.getItem('loadspace_network')) || {};

            // Falls das Profil neu ist, legen wir ein echtes Guns.lol Template an
            if(!database[user]) {
                database[user] = {
                    name: user.toUpperCase(),
                    tagline: 'Welcome to my space Node.',
                    avatar: 'https://via.placeholder.com/150',
                    banner: '', music: '', particles: 'none',
                    customLinks: [
                        { name: 'My Discord', url: 'https://discord.com' },
                        { name: 'My GitHub', url: 'https://github.com' }
                    ]
                };
                localStorage.setItem('loadspace_network', JSON.stringify(database));
            }

            profileData = database[user];
            
            // Wechsel zur echten Profil-Ansicht
            document.getElementById('view-landing').style.display = 'none';
            document.getElementById('bio-view-page').style.display = 'flex';
            
            renderBioPage();
        }

        // 2. RENDERN DER ISOLIERTEN BIO-SEITE
        function renderBioPage() {
            document.getElementById('view-name').innerText = profileData.name;
            document.getElementById('view-tagline').innerText = profileData.tagline;
            document.getElementById('view-avatar').src = profileData.avatar;
            
            const bgPage = document.getElementById('bio-view-page');
            bgPage.style.backgroundImage = profileData.banner ? `url('${profileData.banner}')` : 'none';

            // Custom Links mit ihren Namen laden!
            const holder = document.getElementById('view-links-holder');
            holder.innerHTML = '';
            profileData.customLinks.forEach(link => {
                if(link.name && link.url) {
                    const btn = document.createElement('a');
                    btn.className = 'bio-link-button';
                    btn.href = link.url;
                    btn.target = '_blank';
                    btn.innerText = link.name; // Hier wird der eigene Name gesetzt!
                    holder.appendChild(btn);
                }
            });

            liveParticleRefresh();
        }

        // 3. SOUND AKTIVIEREN WIE BEI PREMIUM GUNS.LOL
        function playBioMusic() {
            document.getElementById('click-unmute-wall').style.display = 'none';
            const audio = document.getElementById('bio-audio');
            if(profileData.music) {
                audio.src = profileData.music;
                audio.volume = 0.3;
                audio.play().catch(() => console.log("Musik-Autoplay geblockt"));
            }
        }

        // 4. EDITOR MODUS ÖFFNEN
        function openEditor() {
            document.getElementById('edit-name').value = profileData.name;
            document.getElementById('edit-tagline').value = profileData.tagline;
            document.getElementById('edit-avatar').value = profileData.avatar;
            document.getElementById('edit-banner').value = profileData.banner;
            document.getElementById('edit-music').value = profileData.music;
            document.getElementById('edit-particles').value = profileData.particles;

            // Link-Builder Reihen füllen
            const builder = document.getElementById('links-builder-area');
            builder.innerHTML = '';
            profileData.customLinks.forEach(link => {
                addNewLinkRow(link.name, link.url);
            });

            document.getElementById('editor-panel').style.display = 'block';
            // Verschiebe die Karte nach rechts, damit das Menü Platz hat
            document.querySelector('.bio-card').style.marginLeft = '440px';
        }

        function addNewLinkRow(name, url) {
            const area = document.getElementById('links-builder-area');
            const row = document.createElement('div');
            row.className = 'link-builder-row';
            row.innerHTML = `
                <input type="text" class="link-name-input" placeholder="Button Name" value="${name}" oninput="liveRefresh()">
                <input type="text" class="link-url-input" placeholder="https://..." value="${url}" oninput="liveRefresh()">
            `;
            area.appendChild(row);
        }

        // 5. ECHTZEIT-REFRESH BEIM TIPPEN
        function liveRefresh() {
            profileData.name = document.getElementById('edit-name').value;
            profileData.tagline = document.getElementById('edit-tagline').value;
            profileData.avatar = document.getElementById('edit-avatar').value;
            profileData.banner = document.getElementById('edit-banner').value;

            // Links aus dem Grid auslesen
            const rows = document.querySelectorAll('.link-builder-row');
            profileData.customLinks = [];
            rows.forEach(row => {
                const name = row.querySelector('.link-name-input').value;
                const url = row.querySelector('.link-url-input').value;
                profileData.customLinks.push({ name, url });
            });

            renderBioPage();
        }

        function liveMusicRefresh() {
            profileData.music = document.getElementById('edit-music').value;
            const audio = document.getElementById('bio-audio');
            if(profileData.music) {
                audio.src = profileData.music;
                audio.play().catch(() => {});
            } else {
                audio.pause();
            }
        }

        // 6. SPEICHERN & SCHLIESSEN
        function saveData() {
            let database = JSON.parse(localStorage.getItem('loadspace_network')) || {};
            database[currentUsername] = profileData;
            localStorage.setItem('loadspace_network', JSON.stringify(database));
            alert("🔒 Profile Settings successfully deployed!");
        }

        function closeEditorAndExit() {
            document.getElementById('bio-audio').pause();
            location.reload();
        }

        // --- VISUAL DYNAMIC CANVAS ENGINE (PARTIKEL) ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        let pInterval = null;

        function liveParticleRefresh() {
            clearInterval(pInterval);
            particlesArray = [];
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
            
            const mode = document.getElementById('edit-particles') ? document.getElementById('edit-particles').value : profileData.particles;
            if(!mode || mode === 'none') { ctx.clearRect(0,0,canvas.width,canvas.height); return; }

            pInterval = setInterval(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if(particlesArray.length < 50) {
                    particlesArray.push({ x: Math.random() * canvas.width, y: 0, speed: Math.random() * 2 + 1, size: mode === 'snow' ? Math.random() * 3 + 1 : Math.random() * 2 + 8 });
                }
                particlesArray.forEach((p, i) => {
                    p.y += p.speed;
                    if(p.y > canvas.height) particlesArray.splice(i, 1);
                    ctx.beginPath();
                    if(mode === 'snow') { ctx.fillStyle = '#fff'; ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }
                    else { ctx.fillStyle = '#ff3333'; ctx.font = p.size + 'px monospace'; ctx.fillText(Math.floor(Math.random()*2), p.x, p.y); }
                });
            }, 35);
        }
    </script>
</body>
</html>
