<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadTiers - Rankings & Staff</title>
    <style>
        :root {
            --bg-dark: #050811;
            --panel-bg: rgba(11, 17, 30, 0.75);
            --card-bg: #0e1726;
            --border-color: #17253b;
            --text-main: #f0f6fc;
            --text-secondary: #62758d;
            --accent-cyan: #00bfff;
            --accent-purple: #a855f7;
            --neon-orange: #ff7b1a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Particle Background System */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 191, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
        }
        .particles::before, .particles::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(rgba(0, 191, 255, 0.4) 1px, transparent 1px),
                radial-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 550px 550px, 400px 400px;
            background-position: 0 0, 150px 250px;
            animation: particleDrive 120s linear infinite;
        }
        .particles::after {
            background-size: 300px 300px;
            background-position: 80px 120px;
            animation: particleDrive 80s linear infinite reverse;
            opacity: 0.7;
        }

        .app-wrapper {
            position: relative;
            z-index: 1;
        }

        /* Navbar Layout */
        .navbar {
            background-color: rgba(11, 17, 30, 0.85);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .brand-logo { font-size: 22px; font-weight: 900; letter-spacing: 1.5px; cursor: pointer; color: #ffffff; text-shadow: 0 0 10px rgba(0, 191, 255, 0.3); }
        .brand-logo span { color: var(--accent-cyan); }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 0.5px; transition: color 0.3s ease, text-shadow 0.3s ease; }
        .nav-link.active, .nav-link:hover { color: var(--accent-cyan); text-shadow: 0 0 8px rgba(0,191,255,0.5); }
        .nav-right { display: flex; align-items: center; gap: 15px; }

        /* Discord Button oben rechts */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #5865F2;
            color: #ffffff;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 18px;
            border-radius: 8px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .discord-btn svg { width: 16px; height: 16px; fill: #ffffff; transition: transform 0.2s ease; }
        .discord-btn:hover { background-color: #4752c4; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4); }
        .discord-btn:hover svg { transform: scale(1.1) rotate(-5deg); }

        /* Sub-Nav Game Modes Tabs */
        .sub-nav { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            background-color: rgba(6, 11, 20, 0.7); 
            padding: 16px; 
            border-bottom: 1px solid var(--border-color); 
            backdrop-filter: blur(10px); 
            flex-wrap: wrap;
        }
        .mode-btn { background: none; border: none; color: var(--text-secondary); font-weight: 700; font-size: 13px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; padding: 4px 2px; position: relative; transition: color 0.2s; }
        .mode-btn:hover { color: var(--text-main); }
        .mode-btn.active { color: var(--accent-cyan); }
        .mode-btn::after { 
            content: ''; 
            position: absolute; 
            bottom: -18px; 
            left: 0; 
            width: 100%; 
            height: 3px; 
            background-color: var(--accent-cyan); 
            box-shadow: 0 0 12px var(--accent-cyan); 
            border-radius: 2px; 
            transform: scaleX(0);
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .mode-btn.active::after { transform: scaleX(1); }

        .main-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }

        /* Buttons & Controls */
        .btn { background-color: #0e1726; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 6px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .btn:hover { transform: translateY(-2px); background: #132035; border-color: var(--text-secondary); }
        .btn-cyan { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .btn-cyan:hover { background: rgba(0, 191, 255, 0.15); box-shadow: 0 0 15px rgba(0, 191, 255, 0.3); }
        .btn-purple { border-color: var(--accent-purple); color: var(--accent-purple); }
        .btn-purple:hover { background: rgba(166, 85, 247, 0.15); box-shadow: 0 0 15px rgba(166, 85, 247, 0.3); }
        .btn-danger { border-color: #ff2a74; color: #ff2a74; }
        
        .search-bar { background-color: #060913; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 14px; border-radius: 6px; width: 180px; font-size: 13px; transition: all 0.3s ease; }
        .search-bar:focus { outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0,191,255,0.2); width: 220px; }

        /* Leaderboard Table Main Layout */
        .leaderboard-table { width: 100%; border-collapse: collapse; background-color: rgba(8, 13, 26, 0.85); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; margin-top: 20px; backdrop-filter: blur(8px); }
        .leaderboard-table th { background-color: rgba(23, 37, 59, 0.5); padding: 16px 20px; text-align: left; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); letter-spacing: 0.5px; }
        .leaderboard-table td { padding: 14px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .leaderboard-table tr { transition: transform 0.15s ease, background-color 0.15s ease; cursor: pointer; }
        .leaderboard-table tr:hover { background-color: rgba(23, 37, 59, 0.4); transform: scale(1.002); }

        /* Stagger In Animationen für Zeilen */
        .leaderboard-table tbody tr { opacity: 0; transform: translateY(10px); animation: fastFadeInRow 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .leaderboard-table tbody tr:nth-child(1) { animation-delay: 20ms; }
        .leaderboard-table tbody tr:nth-child(2) { animation-delay: 40ms; }
        .leaderboard-table tbody tr:nth-child(3) { animation-delay: 60ms; }
        @keyframes fastFadeInRow { to { opacity: 1; transform: translateY(0); } }

        .rank-number { font-weight: 900; font-size: 16px; }
        .rank-1 { color: #ffaa00; text-shadow: 0 0 8px rgba(255,170,0,0.3); } 
        .rank-2 { color: #cbd5e1; text-shadow: 0 0 8px rgba(203,213,225,0.3); } 
        .rank-3 { color: #b45309; text-shadow: 0 0 8px rgba(180,83,9,0.3); }
        .username { font-weight: 700; color: #ffffff; transition: color 0.15s; }
        .leaderboard-table tr:hover .username { color: var(--accent-cyan); }

        /* Tiers Spalten Grid Layout */
        .tier-columns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 20px; animation: superEntrance 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .tier-column { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; backdrop-filter: blur(8px); }
        .tier-header { padding: 15px; text-align: center; font-weight: 800; font-size: 13px; border-bottom: 1px solid var(--border-color); background: rgba(23, 37, 59, 0.4); }
        .t1-h { color: #ffaa00; } .t2-h { color: #cbd5e1; } .t3-h { color: #ff7b1a; } .t4-h { color: #38bdf8; } .t5-h { color: #94a3b8; }
        .tier-list-content { padding: 10px; min-height: 450px; display: flex; flex-direction: column; gap: 8px; }
        
        .tier-user-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s ease; }
        .tier-user-card:hover { transform: translateX(2px); border-color: var(--accent-cyan); background-color: #121d30; }
        .avatar { width: 32px; height: 32px; border-radius: 6px; image-rendering: pixelated; }

        /* Badge Icon Styles */
        .badge-list { display: flex; gap: 12px; }
        .tier-badge-container { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 44px; }
        .icon-wrapper { width: 36px; height: 36px; border-radius: 8px; background-color: #0e1726; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 8px rgba(0,0,0,0.6); }
        .mode-logo-img { width: 24px; height: 24px; object-fit: contain; image-rendering: pixelated; }
        
        .border-ht { border: 1.5px solid #ff7b1a; box-shadow: 0 0 8px rgba(249, 115, 22, 0.25); }
        .border-line-ht { color: #ff7b1a; font-weight: 800; font-size: 11px; }
        .border-lt { border: 1.5px solid #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.25); }
        .border-line-lt { color: #38bdf8; font-weight: 800; font-size: 11px; }

        /* Admin Dashboard & Views */
        .admin-panel { background-color: var(--panel-bg); border: 1px solid var(--accent-purple); border-radius: 12px; padding: 20px; margin-top: 20px; backdrop-filter: blur(10px); }
        .admin-sections { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 15px; }
        .admin-box-sub { background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; }
        .admin-form { display: flex; flex-direction: column; gap: 12px; }
        .admin-form input, .admin-form select { background-color: #060913; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; }

        /* Staff Elements */
        .staff-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 20px; }
        .staff-card { background-color: rgba(6, 11, 20, 0.85); border: 1.5px solid #121d30; border-radius: 16px; padding: 18px; display: flex; align-items: center; gap: 14px; backdrop-filter: blur(8px); }
        .staff-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid #1f304a; }
        .staff-info { display: flex; flex-direction: column; gap: 4px; }
        .staff-name { font-weight: 800; color: #ffffff; font-size: 14px; }
        .staff-particle-sub { font-size: 11px; font-weight: 600; color: var(--accent-cyan); opacity: 0.85; }

        /* Modals Overlay System */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 5, 10, 0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 2000; }
        .points-modal-box { background-color: #080d19; border: 1.5px solid #1a2a42; border-radius: 20px; padding: 30px; width: 460px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }

        @keyframes particleDrive { from { background-position: 0 0, 150px 250px; } to { background-position: 550px 1100px, 950px 1050px; } }
        @keyframes superEntrance { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="particles"></div>

    <div class="app-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <div class="brand-logo" onclick="switchView('rankings')">LOAD<span>TIERS</span></div>
                <div class="nav-links">
                    <div class="nav-link active" id="nav-rankings" onclick="switchView('rankings')">RANKINGS</div>
                    <div class="nav-link" id="nav-staff" onclick="switchView('staff')">STAFF</div>
                    <div class="nav-link" id="nav-admin" onclick="switchView('admin')">ADMIN</div>
                </div>
            </div>
            <div class="nav-right">
                <div style="font-size: 12px; color: var(--text-secondary)">Status: Guest</div>
                <button class="btn btn-cyan" onclick="openPointsModal()">⚡ Rank Points</button>
                <input type="text" class="search-bar" id="search-input" placeholder="Search player..." oninput="handleSearch()">
                
                <a href="https://discord.gg/DEIN_LINK" class="discord-btn" target="_blank">
                    <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
                        <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.67-10.85,68.43,68.43,0,0,1-10.5-5c.9-.65,1.76-1.34,2.58-2a75.58,75.58,0,0,0,73,0c.83.68,1.69,1.37,2.58,2a68.43,68.43,0,0,1-10.5,5,74.37,74.37,0,0,0,6.67,10.85,105.73,105.73,0,0,0,31.06-18.83C129.87,48.42,123.77,25.63,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
                    </svg>
                    Join Discord
                </a>
            </div>
        </nav>

        <div class="sub-nav" id="modes-sub-nav">
            <button class="mode-btn active" id="mode-overall" onclick="switchMode('overall')">Overall</button>
            <button class="mode-btn" id="mode-sword" onclick="switchMode('sword')">Sword</button>
            <button class="mode-btn" id="mode-cpvp" onclick="switchMode('cpvp')">CPvP</button>
            <button class="mode-btn" id="mode-axe" onclick="switchMode('axe')">Axe</button>
            <button class="mode-btn" id="mode-smp" onclick="switchMode('smp')">SMP</button>
            <button class="mode-btn" id="mode-diapot" onclick="switchMode('diapot')">Diapot</button>
            <button class="mode-btn" id="mode-mace" onclick="switchMode('mace')">Mace</button>
            <button class="mode-btn" id="mode-uhc" onclick="switchMode('uhc')">UHC</button>
            <button class="mode-btn" id="mode-nethpot" onclick="switchMode('nethpot')">Nethpot</button>
            <button class="mode-btn" id="mode-cart" onclick="switchMode('cart')">Cart</button>
            <button class="mode-btn" id="mode-hugokit" onclick="switchMode('hugokit')">HugoKit</button>
        </div>

        <div class="main-container">
            <!-- Rankings View -->
            <div id="view-rankings">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;"># Rank</th>
                            <th>Player</th>
                            <th style="text-align: right;">Points</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <tr>
                            <td><span class="rank-number rank-1">1</span></td>
                            <td><span class="username">octryx ★</span></td>
                            <td style="text-align: right; color: var(--accent-cyan); font-weight:700;">206</td>
                        </tr>
                        <tr>
                            <td><span class="rank-number rank-2">2</span></td>
                            <td><span class="username">zNiclas_</span></td>
                            <td style="text-align: right; color: var(--accent-cyan); font-weight:700;">116</td>
                        </tr>
                        <tr>
                            <td><span class="rank-number rank-3">3</span></td>
                            <td><span class="username">Peentin 爱</span></td>
                            <td style="text-align: right; color: var(--accent-cyan); font-weight:700;">111</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Staff View -->
            <div id="view-staff" style="display: none;">
                <div class="staff-grid">
                    <div class="staff-card">
                        <div class="staff-img"></div>
                        <div class="staff-info">
                            <span class="staff-name">Willi</span>
                            <span class="staff-particle-sub">Network Owner</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Admin Panel View -->
            <div id="view-admin" style="display: none;">
                <div class="admin-panel">
                    <h3 style="margin:0 0 15px 0; color: var(--accent-purple);">Admin Engine</h3>
                    <div class="admin-sections">
                        <div class="admin-box-sub">
                            <h4 style="margin:0 0 10px 0; color: var(--accent-cyan);">Spieler hinzufügen</h4>
                            <div class="admin-form">
                                <input type="text" placeholder="Minecraft Name">
                                <select>
                                    <option value="sword">Sword</option>
                                    <option value="cpvp">CPvP</option>
                                </select>
                                <button class="btn btn-cyan">Hinzufügen</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals Layout -->
    <div class="modal-overlay" id="points-modal">
        <div class="points-modal-box">
            <h3 style="margin-top:0;">⚡ Rank Points System</h3>
            <p style="color: var(--text-secondary); font-size:13px;">Verteilung der Rangpunkte basierend auf Tiers.</p>
            <button class="btn btn-danger" onclick="closePointsModal()">Schließen</button>
        </div>
    </div>

    <script>
        function switchView(view) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('nav-' + view).classList.add('active');
            
            document.getElementById('view-rankings').style.display = view === 'rankings' ? 'block' : 'none';
            document.getElementById('view-staff').style.display = view === 'staff' ? 'block' : 'none';
            document.getElementById('view-admin').style.display = view === 'admin' ? 'block' : 'none';
            
            document.getElementById('modes-sub-nav').style.display = view === 'rankings' ? 'flex' : 'none';
        }

        function switchMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
        }

        function openPointsModal() { document.getElementById('points-modal').style.display = 'flex'; }
        function closePointsModal() { document.getElementById('points-modal').style.display = 'none'; }
        function handleSearch() {}
    </script>
</body>
</html>
