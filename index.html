<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadCf - Tiers & Rankings</title>
    <style>
        /* --- DESIGN IM ICON-TIERS LOOK --- */
        :root {
            --bg-dark: #06090e;
            --panel-bg: #0b111a;
            --card-bg: #111924;
            --border-color: #1b2736;
            --text-main: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-cyan: #38bdf8;
            --accent-purple: #a855f7;
            --neon-orange: #f97316;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Partikel Canvas */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .app-wrapper {
            position: relative;
            z-index: 2;
        }

        /* Top Navigation */
        .navbar {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .brand-logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
        }

        .brand-logo:hover {
            transform: scale(1.05);
        }

        .brand-logo span {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            padding: 5px 10px;
            transition: color 0.2s;
        }

        .nav-link.active, .nav-link:hover {
            color: var(--accent-cyan);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Sub-Navigation für Spielmodi (Exakt wie im Bildschirmfoto) */
        .sub-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background-color: rgba(11, 17, 26, 0.7);
            padding: 14px;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(5px);
        }

        .mode-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            padding: 4px 8px;
            position: relative;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .mode-btn:hover {
            color: var(--text-main);
        }

        .mode-btn.active {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
        }

        .mode-btn.active::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: lineGlow 0.3s ease-out;
        }

        /* Haupt-Inhalt */
        .main-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Action Buttons */
        .btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-cyan {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 5px rgba(56, 189, 248, 0.2);
        }
        .btn-cyan:hover {
            background: rgba(56, 189, 248, 0.1);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .btn-purple {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }
        .btn-purple:hover {
            background: rgba(168, 85, 247, 0.1);
        }

        .btn-danger {
            border-color: #ff2a74;
            color: #ff2a74;
            background: transparent;
        }
        .btn-danger:hover {
            background: rgba(255, 42, 116, 0.1);
        }

        /* Suchfeld */
        .search-bar {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            width: 200px;
            transition: border-color 0.2s;
        }
        .search-bar:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        /* SPALTEN-ANSICHT ANIMATIONEN */
        .tier-columns {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .tier-column {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Gestaffeltes Hereinfliegen der Spalten */
        .tier-column:nth-child(1) { animation-delay: 0.05s; }
        .tier-column:nth-child(2) { animation-delay: 0.1s; }
        .tier-column:nth-child(3) { animation-delay: 0.15s; }
        .tier-column:nth-child(4) { animation-delay: 0.2s; }
        .tier-column:nth-child(5) { animation-delay: 0.25s; }

        .tier-header {
            padding: 15px;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(27, 39, 54, 0.2);
        }

        .t1-h { color: #f59e0b; }
        .t2-h { color: #e2e8f0; }
        .t3-h { color: #f97316; }
        .t4-h { color: #38bdf8; }
        .t5-h { color: #94a3b8; }

        .tier-list-content {
            padding: 10px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tier-user-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: cardPulse 3s infinite ease-in-out;
            transition: transform 0.2s, border-color 0.2s;
        }

        .tier-user-card:hover {
            transform: scale(1.02);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #30363d;
        }

        .username {
            font-size: 13px;
            font-weight: 600;
        }

        /* LEADERBOARD ANIMATION */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 0.4s ease-out forwards;
        }

        .leaderboard-table th {
            background-color: rgba(27, 39, 54, 0.3);
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .leaderboard-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .leaderboard-table tr {
            transition: background-color 0.2s;
        }

        .leaderboard-table tr:hover {
            background-color: rgba(56, 189, 248, 0.03);
        }

        .rank-number { font-weight: 800; width: 40px; }
        .rank-1 { color: #f59e0b; text-shadow: 0 0 5px rgba(245, 158, 11, 0.5); }
        .rank-2 { color: #cbd5e1; }
        .rank-3 { color: #b45309; }

        .badge-list { display: flex; gap: 6px; }
        .badge {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .badge-ht { background-color: rgba(249, 115, 22, 0.15); color: #ff7b1a; border: 1px solid rgba(249, 115, 22, 0.3); }
        .badge-lt { background-color: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }

        /* MODAL ANIMATIONEN (Bild 3 / Login) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.3s ease;
        }

        .modal-box {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            width: 360px;
            position: relative;
            transform: scale(0.7);
            opacity: 0;
            animation: zoomIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .modal-points-box {
            width: 450px;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.2);
        }

        .modal-header {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .points-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .points-row {
            display: flex;
            justify-content: space-between;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
        }

        /* Admin Management List */
        .admin-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--accent-purple);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            animation: fadeUp 0.3s ease;
        }

        .admin-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .admin-form input, .admin-form select {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 6px;
        }

        .admin-player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 6px;
        }

        /* KEYFRAME ANIMATIONEN */
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes lineGlow {
            from { width: 0; opacity: 0; }
            to { width: 100%; opacity: 1; }
        }

        @keyframes cardPulse {
            0%, 100% { border-color: var(--border-color); }
            50% { border-color: rgba(56, 189, 248, 0.3); }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="app-wrapper">

    <!-- POP-UP 1: RANK POINTS OVERLAY -->
    <div id="points-modal" class="modal-overlay" onclick="closeModal('points-modal')">

                <div class="points-row"><span style="color:#38bdf8">LT2</span><span style="color:var(--accent-cyan)">20 PTS</span></div>
                <div class="points-row"><span style="color:#ff7b1a">HT3</span><span style="color:var(--accent-cyan)">10 PTS</span></div>
                <div class="points-row"><span style="color:#38bdf8">LT3</span><span style="color:var(--accent-cyan)">6 PTS</span></div>
                <div class="points-row"><span style="color:#ff7b1a">HT4</span><span style="color:var(--accent-cyan)">4 PTS</span></div>

    <!-- POP-UP 2: LOGIN MODAL -->
    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">

            <div class="modal-header">🔑 Admin Login</div>

    <script>
        // --- BACKGROUND PARTICLES SYSTEM ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * -0.4 - 0.1; // Float upwards
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#38bdf8';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 65; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        initParticles();
        animateParticles();


        // --- LOGIK & DATEN ---
        const pointValues = {
            'HT1': 60, 'LT1': 45, 'HT2': 30, 'LT2': 20, 'HT3': 10,
            'LT3': 6,  'HT4': 4,  'LT4': 3,  'HT5': 2,  'LT5': 1
        };

        let players = [
            { name: "octryx ★", ranks: { sword: "HT1", cpvp: "HT1", axe: "HT2", nethpot: "LT1" } },
            { name: "zNiclas_", ranks: { sword: "HT1", cpvp: "LT2", smp: "HT3" } },
            { name: "Peentin 爱", ranks: { sword: "LT1", cpvp: "LT2", diapot: "HT1" } },
            { name: "why¿lxo?🍄", ranks: { sword: "LT2", mace: "HT3", nethpot: "HT3" } },
            { name: "D2rx", ranks: { sword: "LT2", uhc: "HT3" } },
            { name: "Elan @ for ss", ranks: { sword: "HT2", cpvp: "HT3" } },
            { name: "TheRealJero @for help", ranks: { sword: "HT3", smp: "LT1" } },
            { name: "Frosch", ranks: { sword: "HT3", nethpot: "LT3" } }
        ];

        let currentMode = 'overall';
        let isAdmin = false;

        function calculateTotalPoints(player) {
            let total = 0;
            for (let mode in player.ranks) {
                total += pointValues[player.ranks[mode]] || 0;
            }
            return total;
        }

        function getTierGroup(tierStr) {
            if (!tierStr) return null;
            return tierStr.replace('HT', '').replace('LT', '');
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            render();
        }

        function render() {
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            if (currentMode === 'overall') {
                renderLeaderboard(searchVal);
            } else {
                renderColumns(searchVal);
            }
            if (isAdmin) renderAdminDeleteList();
        }

        // Columns Ansicht
        function renderColumns(filter = "") {
            const contentArea = document.getElementById('content-area');
            let html = `<div class="tier-columns">`;
            for (let i = 1; i <= 5; i++) {
                let tierTitle = i <= 3 ? `?? Tier ${i}` : `Tier ${i}`;
                html += `
                    <div class="tier-column">
                        <div class="tier-header t${i}-h">${tierTitle}</div>
                        <div class="tier-list-content">
                `;

                let columnPlayers = players.filter(p => {
                    let pTier = p.ranks[currentMode];
                    return pTier && getTierGroup(pTier) == i && p.name.toLowerCase().includes(filter);
                });

                columnPlayers.forEach(p => {
                    let specificTier = p.ranks[currentMode];
                    let arrow = specificTier.startsWith('HT') ? '▲' : '▼';
                    let arrowColor = specificTier.startsWith('HT') ? '#f97316' : '#38bdf8';
                    
                    html += `
                        <div class="tier-user-card">
                            <div class="user-info">
                                <div class="avatar"></div>
                                <span class="username">${p.name}</span>
                            </div>
                            <span style="color: ${arrowColor}; font-weight:bold; font-size:11px;">${specificTier} ${arrow}</span>
                        </div>
                    `;
                });

                html += `</div></div>`;
            }
            html += `</div>`;
            contentArea.innerHTML = html;
        }

        // Leaderboard Tabelle
        function renderLeaderboard(filter = "") {
            const contentArea = document.getElementById('content-area');
            let sorted = [...players].map(p => ({ ...p, totalPts: calculateTotalPoints(p) })).sort((a, b) => b.totalPts - a.totalPts);
            if (filter) sorted = sorted.filter(p => p.name.toLowerCase().includes(filter));

            let html = `
                <table class="leaderboard-table">
                    <thead>
                        <tr><th style="width:50px;">#</th><th>Player</th><th>Tiers</th><th style="text-align:right;">Pts</th></tr>
                    </thead>
                    <tbody>
            `;

            sorted.forEach((p, index) => {
                let rankClass = index < 3 ? `rank-${index + 1}` : '';
                let badgesHtml = '';
                for (let mode in p.ranks) {
                    let t = p.ranks[mode];
                    badgesHtml += `<span class="badge ${t.startsWith('HT') ? 'badge-ht' : 'badge-lt'}">${mode}:${t}</span> `;
                }

                html += `
                    <tr>
                        <td class="rank-number ${rankClass}">${index + 1}</td>
                        <td>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="avatar"></div>
                                <span style="font-weight:600;">${p.name}</span>
                            </div>
                        </td>
                        <td><div class="badge-list">${badgesHtml}</div></td>
                        <td style="text-align:right; font-weight:800; color:var(--accent-cyan);">${p.totalPts}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            contentArea.innerHTML = html;
        }

        // Admin-Löschliste im Dashboard rendern
        function renderAdminDeleteList() {
            const listDiv = document.getElementById('admin-delete-list');
            listDiv.innerHTML = '';
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'admin-player-row';
                div.innerHTML = `
                    <span style="font-size:13px; font-weight:600;">${p.name}</span>
                    <button class="btn btn-danger" style="padding:2px 8px; font-size:11px;" onclick="deletePlayer('${p.name}')">Löschen</button>
                `;
                listDiv.appendChild(div);
            });
        }

        function handleSearch() {
            const val = document.getElementById('search-input').value.trim();
            if (val.toLowerCase() === 'login') {
                document.getElementById('search-input').value = '';
                openModal('login-modal');
            } else {
                render();
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function submitLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            if (u === 'L4lyx' && p === 'Tini2013!') {
                isAdmin = true;
                document.getElementById('admin-status-text').innerText = "Status: L4lyx (Admin)";
                document.getElementById('admin-status-text').style.color = "var(--accent-purple)";
                document.getElementById('admin-panel').style.display = 'block';
                closeModal('login-modal');
                render();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logoutAdmin() {
            isAdmin = false;
            document.getElementById('admin-status-text').innerText = "Status: Guest";
            document.getElementById('admin-status-text').style.color = "var(--text-secondary)";
            document.getElementById('admin-panel').style.display = 'none';
            render();
        }

        function addOrUpdatePlayer() {
            const name = document.getElementById('new-player-name').value.trim();
            const mode = document.getElementById('new-player-mode').value;
            const tier = document.getElementById('new-player-tier').value;
            if (!name) return;

            let existing = players.find(p => p.name.toLowerCase() === name.toLowerCase());
            if (existing) {
                existing.ranks[mode] = tier;
            } else {
                let newP = { name: name, ranks: {} };
                newP.ranks[mode] = tier;
                players.push(newP);
            }
            document.getElementById('new-player-name').value = '';
            render();
        }

        function deletePlayer(name) {
            players = players.filter(p => p.name !== name);
            render();
        }

        render();
    </script>
</body>
</html>
