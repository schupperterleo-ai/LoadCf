<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadTiers Leaderboard</title>
    <style>
        /* ==========================================
           1. CORE STYLES & THEME (Neon Blau/Dunkel)
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050b14;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* Hauptcontainer mit relativer Position für den Discord-Button */
        .leaderboard-container {
            width: 100%;
            max-width: 1100px;
            background: rgba(10, 20, 38, 0.6);
            border: 1px solid rgba(0, 191, 255, 0.15);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative; /* Wichtig für absolute Platzierung des Buttons */
            backdrop-filter: blur(10px);
        }

        /* ==========================================
           2. JOIN DISCORD BUTTON (Exakt wie Bild 2)
           ========================================== */
        .discord-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #5865F2;
            color: #ffffff;
            font-weight: 700;
            font-size: 14px;
            padding: 10px 22px;
            border-radius: 8px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
            
            /* Ultra-smoother Übergang */
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .discord-btn svg {
            width: 18px;
            height: 18px;
            fill: #ffffff;
            transition: transform 0.25s ease;
        }

        /* Knackiger Hover-Effekt */
        .discord-btn:hover {
            background-color: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
        }

        .discord-btn:hover svg {
            transform: scale(1.1) rotate(-5deg);
        }

        .discord-btn:active {
            transform: translateY(1px);
        }

        /* ==========================================
           3. TABS (Inklusive Cart & HugoKit)
           ========================================== */
        .tabs-nav {
            display: flex;
            gap: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
            margin-bottom: 25px;
            max-width: 70%; /* Damit die Tabs nicht in den Discord Button laufen */
        }

        .tab-item {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            position: relative;
            padding: 5px 0;
            user-select: none;
            transition: color 0.2s ease;
        }

        .tab-item:hover {
            color: #ffffff;
        }

        .tab-item.active {
            color: #00bfff;
            text-shadow: 0 0 10px rgba(0, 191, 255, 0.3);
        }

        /* Schneller, flüssiger Glow-Strich unter den Tabs */
        .tab-item::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #00bfff;
            box-shadow: 0 0 12px #00bfff;
            border-radius: 2px;
            transform: scaleX(0);
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tab-item.active::after {
            transform: scaleX(1);
        }

        /* ==========================================
           4. TABELLE & SHOMTERE ANIMATIONEN
           ========================================== */
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .ranking-table th {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Die Tabellenzeilen animieren sich blitzschnell rein */
        .ranking-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            opacity: 0;
            transform: translateY(12px);
            animation: fastFadeInRow 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Hover-Effekt für die Reihen */
        .ranking-table tbody tr:hover {
            background: rgba(0, 191, 255, 0.03);
            transition: background 0.15s ease;
        }

        .ranking-table td {
            padding: 16px;
            font-size: 15px;
            vertical-align: middle;
        }

        /* Schneller Delay-Stagger, damit es flüssig nacheinander aufbaut */
        .ranking-table tbody tr:nth-child(1) { animation-delay: 20ms; }
        .ranking-table tbody tr:nth-child(2) { animation-delay: 40ms; }
        .ranking-table tbody tr:nth-child(3) { animation-delay: 60ms; }
        .ranking-table tbody tr:nth-child(4) { animation-delay: 80ms; }
        .ranking-table tbody tr:nth-child(5) { animation-delay: 100ms; }

        @keyframes fastFadeInRow {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Platzhalter für Spielernamen und Punkte */
        .player-name {
            font-weight: 600;
            color: #ffffff;
        }
        .points {
            color: #00bfff;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        
        <!-- EXAKTER DISCORD BUTTON AUS BILD 2 -->
        <a href="https://discord.gg/DEIN_LINK" class="discord-btn" target="_blank">
            <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.67-10.85,68.43,68.43,0,0,1-10.5-5c.9-.65,1.76-1.34,2.58-2a75.58,75.58,0,0,0,73,0c.83.68,1.69,1.37,2.58,2a68.43,68.43,0,0,1-10.5,5,74.37,74.37,0,0,0,6.67,10.85,105.73,105.73,0,0,0,31.06-18.83C129.87,48.42,123.77,25.63,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
            </svg>
            Join Discord
        </a>

        <!-- NAVIGATION MIT DEN ZWEI NEUEN GAMODES -->
        <div class="tabs-nav">
            <div class="tab-item active" onclick="switchTab(this)">OVERALL</div>
            <div class="tab-item" onclick="switchTab(this)">SWORD</div>
            <div class="tab-item" onclick="switchTab(this)">CPVP</div>
            <div class="tab-item" onclick="switchTab(this)">CART</div> <!-- Neu hinzugefügt! -->
            <div class="tab-item" onclick="switchTab(this)">HUGOKIT</div> <!-- Neu hinzugefügt! -->
        </div>

        <!-- LEADERBOARD TABELLE -->
        <table class="ranking-table">
            <thead>
                <tr>
                    <th style="width: 80px;">#</th>
                    <th>Player</th>
                    <th style="text-align: right;">Points</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- Die Zeilen laden beim Tab-Wechsel neu und triggern die CSS-Animation -->
                <tr>
                    <td><strong>1</strong></td>
                    <td class="player-name">octryx ★</td>
                    <td class="points" style="text-align: right;">206</td>
                </tr>
                <tr>
                    <td><strong>2</strong></td>
                    <td class="player-name">zNiclas_</td>
                    <td class="points" style="text-align: right;">116</td>
                </tr>
                <tr>
                    <td><strong>3</strong></td>
                    <td class="player-name">Peentin 爱</td>
                    <td class="points" style="text-align: right;">111</td>
                </tr>
                <tr>
                    <td><strong>4</strong></td>
                    <td class="player-name">why¿lxo?🍄</td>
                    <td class="points" style="text-align: right;">74</td>
                </tr>
                <tr>
                    <td><strong>5</strong></td>
                    <td class="player-name">D2rx</td>
                    <td class="points" style="text-align: right;">74</td>
                </tr>
            </tbody>
        </table>

    </div>

    <!-- SMALL SCRIPT FÜR DAS SCHNELLE SYSTEM BEIM KLICKEN -->
    <script>
        function switchTab(element) {
            // Alle aktiven Klassen entfernen
            document.querySelectorAll('.tab-item').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Geklicktes Tab aktivieren
            element.classList.add('active');
            
            // Trick um die Animationen der Zeilen bei jedem Klick neu zu triggern (shomter!)
            const tbody = document.getElementById('leaderboard-body');
            const rows = tbody.innerHTML;
            tbody.innerHTML = '';
            setTimeout(() => {
                tbody.innerHTML = rows;
            }, 10);
        }
    </script>
</body>
</html>
